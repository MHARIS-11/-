    function totalLaborValue(view) {
      return periodsForView(view).reduce((sum, period) => sum + period.items.reduce((inner, item) => inner + n(item.laborValue), 0), 0);
    }

    function periodLaborValue(period) {
      return (period?.items || []).reduce((sum, item) => sum + n(item.laborValue), 0);
    }

    function periodMainNo(period) {
      return String(period?.mainNo || mainNoFromNo(period?.no)).trim();
    }

    function periodMainKey(period) {
      return `${period?.building || ""}|${periodMainNo(period)}`;
    }

    function updatePeriodPercent(period) {
      period.periodPercent = n(period.mainValue) ? n(period.periodValue) / n(period.mainValue) * 100 : 0;
    }

    function setPeriodMainValue(period, value) {
      const mainNo = periodMainNo(period);
      const amount = n(value);
      const rows = fullMainGroup(period);
      const singleMain = rows.length === 1 && !hasSubPeriods(rows);
      const subTotal = rows.reduce((sum, row) => sum + (row.id === period.id && singleMain ? amount : n(row.periodValue)), 0);
      if (!singleMain && amount > 0 && Math.abs(subTotal - amount) > 0.01) {
        const ok = confirm(`มูลค่างวดหลัก ${money(amount, 0)} ไม่เท่ารวมงวดย่อย ${money(subTotal, 0)} ต้องการบันทึกไว้ก่อนหรือไม่?`);
        if (!ok) return false;
      }
      rows.forEach((row) => {
        row.mainNo = mainNo;
        addPeriodValueHistory(row, "mainValue", row.mainValue, amount, "แก้มูลค่างวดหลัก");
        row.mainValue = amount;
        if (singleMain) {
          addPeriodValueHistory(row, "periodValue", row.periodValue, amount, "แก้มูลค่างวดเดี่ยว");
          row.periodValue = amount;
        }
        updatePeriodPercent(row);
      });
      return true;
    }

    function setPeriodValue(period, value) {
      const amount = n(value);
      const rows = fullMainGroup(period);
      const singleMain = rows.length === 1 && !hasSubPeriods(rows);
      const previous = n(period.periodValue);
      if (!singleMain) {
        const nextTotal = rows.reduce((sum, row) => sum + (row.id === period.id ? amount : n(row.periodValue)), 0);
        if (n(period.mainValue) && nextTotal > n(period.mainValue) + 0.01) {
          showToast(`รวมงวดย่อย ${money(nextTotal, 0)} เกินมูลค่างวดหลัก ${money(period.mainValue, 0)}`);
          return false;
        }
      }
      addPeriodValueHistory(period, "periodValue", previous, amount, "แก้มูลค่างวด");
      period.periodValue = amount;
      if (singleMain) {
        addPeriodValueHistory(period, "mainValue", period.mainValue, amount, "แก้มูลค่างวดเดี่ยว");
        period.mainValue = amount;
      }
      updatePeriodPercent(period);
      return true;
    }

    function setPeriodPercent(period, value) {
      const amount = n(period.mainValue) * n(value) / 100;
      if (setPeriodValue(period, amount) === false) return false;
      period.periodPercent = n(value);
      return true;
    }

    function mainPeriodSummaries(building) {
      const map = new Map();
      state.periods.filter((period) => period.building === building).forEach((period) => {
        const mainNo = periodMainNo(period);
        const key = `${building}|${mainNo}`;
        const summary = map.get(key) || { building, mainNo, mainValue: n(period.mainValue), subValue: 0, laborValue: 0, count: 0, activeCount: 0 };
        summary.mainValue = n(period.mainValue) || summary.mainValue;
        summary.subValue += n(period.periodValue);
        summary.laborValue += periodLaborValue(period);
        summary.count++;
        if (periodEnabled(period)) summary.activeCount++;
        map.set(key, summary);
      });
      return [...map.values()].sort((a, b) => naturalSort(a.mainNo, b.mainNo));
    }

    function naturalSort(a, b) {
      return String(a).localeCompare(String(b), "th-TH", { numeric: true, sensitivity: "base" });
    }

    function periodPlanUnits(period) {
      return (period?.items || []).reduce((sum, item) => sum + Object.values(ensurePlanItemData(item).plan || {}).reduce((inner, value) => inner + n(value), 0), 0);
    }

    function periodActualUnits(period) {
      return (period?.items || []).reduce((sum, item) => sum + Object.keys(ensurePlanItemData(item).actual || {}).reduce((inner, date) => inner + itemActualUnits(item, date), 0), 0);
    }

    function periodLaborActual(period) {
      const dates = getDates().filter((date) => date <= planUpdateDate());
      return (period?.items || []).reduce((sum, item) => sum + dates.reduce((inner, date) => inner + itemLaborCost(item, date), 0), 0);
    }

    function periodLaborActualOnDate(period, date) {
      return (period?.items || []).reduce((sum, item) => sum + itemLaborCost(item, date), 0);
    }

    function buildingLaborActualOnDate(building, date) {
      return periodsForBuilding(building).reduce((sum, period) => sum + periodLaborActualOnDate(period, date), 0);
    }

    function periodMachineActual(period) {
      if (!period?.building) return 0;
      return getDates().filter((date) => date <= planUpdateDate()).reduce((sum, date) => {
        const machine = totalMachineCost(period.building, date);
        if (!machine) return sum;
        const buildingLabor = buildingLaborActualOnDate(period.building, date);
        const periodLabor = periodLaborActualOnDate(period, date);
        if (!buildingLabor || !periodLabor) return sum;
        return sum + machine * periodLabor / buildingLabor;
      }, 0);
    }

    function totalPeriodValue(view) {
      const groups = new Map();
      periodsForView(view).forEach((period) => {
        const key = periodMainKey(period);
        const current = groups.get(key) || { mainValue: n(period.mainValue), subValue: 0 };
        current.mainValue = n(period.mainValue) || current.mainValue;
        current.subValue += n(period.periodValue);
        groups.set(key, current);
      });
      return [...groups.values()].reduce((sum, group) => sum + (n(group.mainValue) || n(group.subValue)), 0);
    }

    function costStatus(ratio) {
      if (ratio >= 1) return "danger";
      if (ratio >= 0.85) return "warning";
      return "normal";
    }

    function summaryFor(view) {
      const dates = getDates().filter((date) => date <= planUpdateDate());
      const periodValue = totalPeriodValue(view);
      const laborValue = totalLaborValue(view);
      const laborActual = dates.reduce((sum, date) => sum + totalLaborCost(view, date), 0);
      const machineActual = dates.reduce((sum, date) => sum + totalMachineCost(view, date), 0);
      const total = laborActual + machineActual;
      const control = laborValue * n(state.settings.controlPercent) / 100;
      const plan = activeWorkPlan();
      const manual = accumulatedTotalsFor(view, plan);
      return {
        view,
        periodValue,
        laborValue,
        control,
        laborActual,
        machineActual,
        total,
        balance: control - total,
        costRatio: control ? total / control : 0,
        currentRatio: laborValue ? total / laborValue : 0,
        manual,
        manualRatio: n(manual.contractLaborCost) ? n(manual.costToUpdate) / n(manual.contractLaborCost) : 0
      };
    }

    function workerAssignedInfo(workerId, date, ignore) {
      for (const period of periodsForView("ALL")) {
        for (const item of period.items) {
          const entries = actualEntries(item, date);
          for (let index = 0; index < entries.length; index++) {
            const entry = entries[index];
            const sameCell = ignore && ignore.periodId === period.id && ignore.itemId === item.id && ignore.date === date;
            if (entry.workerId === workerId && !sameCell) {
              return { period, item, entry, index, date };
            }
          }
        }
      }
      return null;
    }

    function workerListMode() {
      return state.ui?.workerListMode === "move" ? "move" : "hide";
    }

    function assignedLabel(assigned) {
      return `${buildingLabel(assigned.period.building)} งวด ${assigned.period.no} · ${assigned.item.name}`;
    }

    function removeWorkerFromAssignment(assigned, date) {
      if (!assigned?.item || !date) return;
      const entries = actualEntries(assigned.item, date);
      const nextRows = entries.filter((row) => row.workerId !== assigned.entry.workerId);
      const data = ensurePlanItemData(assigned.item);
      if (nextRows.length) data.actual[date] = nextRows;
      else delete data.actual[date];
    }

    function transferToken(assigned) {
      return assigned ? `${assigned.period.id}|${assigned.item.id}|${assigned.index}` : "";
    }

    function confirmWorkerMove(worker, assigned) {
      return confirm(`${worker.code} · ${worker.name} ถูกใช้แล้วที่ ${assignedLabel(assigned)}\nต้องการย้ายมาช่องนี้แทนหรือไม่?`);
    }

    function workerOption(worker, assigned, selected = false, disabled = false, extraLabel = "", borrowed = null) {
      const status = borrowed ? "borrowed" : (assigned || extraLabel ? "used" : "");
      const style = status === "borrowed"
        ? `style="background:#dbeafe;color:#075985;font-weight:800"`
        : status === "used"
          ? `style="background:#d9fbe8;color:#064e3b;font-weight:800"`
          : "";
      return `<option value="${worker.id}" ${selected ? "selected" : ""} ${disabled ? "disabled" : ""} ${style}>${esc(worker.code)} · ${esc(worker.name)}</option>`;
    }

    function duplicateWorkerInDraft(workerId) {
      return cellDraft.assignments.filter((row) => row.workerId === workerId).length > 1;
    }

    function availableAttendanceMonths() {
      const seen = new Map();
      getDates().forEach((date) => {
        const key = date.slice(0, 7);
        if (!seen.has(key)) seen.set(key, date);
      });
      return [...seen.entries()].map(([key, date]) => ({ key, label: monthYearLabel(date) }));
    }

    function monthYearLabel(date) {
      const d = new Date(`${date}T00:00:00`);
      return d.toLocaleDateString("th-TH", { month: "long", year: "numeric" });
    }

    function selectedAttendanceMonth() {
      const months = availableAttendanceMonths();
      if (!months.length) return "";
      const current = state.ui.attendanceMonth || planUpdateDate().slice(0, 7);
      if (months.some((month) => month.key === current)) return current;
      const updateMonth = planUpdateDate().slice(0, 7);
      return months.some((month) => month.key === updateMonth) ? updateMonth : months[0].key;
    }

    function attendanceDates(monthKey = selectedAttendanceMonth()) {
      return getDates().filter((date) => date.startsWith(`${monthKey}-`));
    }

    function attendanceView() {
      const options = buildingViewOptions();
      return options.includes(state.ui.attendanceView) ? state.ui.attendanceView : (options.at(-1) || options[0] || "ALL");
    }

    function attendanceViewLabel(view = attendanceView()) {
      return viewLabel(view);
    }

    function attendanceExportMode() {
      return state.ui?.attendanceExportMode === "noWage" ? "noWage" : "full";
    }

    function borrowView() {
      const options = ["ALL", ...allBuildings().filter(Boolean)];
      return options.includes(state.ui.borrowView) ? state.ui.borrowView : "ALL";
    }

    function selectedBorrowMonth() {
      const current = state.ui.borrowMonth || selectedAttendanceMonth();
      const months = availableAttendanceMonths();
      if (months.some((month) => month.key === current)) return current;
      return months[0]?.key || "";
    }

    function borrowDraft() {
      const draft = state.ui.borrowDraft && typeof state.ui.borrowDraft === "object" ? state.ui.borrowDraft : {};
      const firstBuilding = allBuildings().filter(Boolean)[0] || "";
      const firstWorker = state.workers[0]?.id || "";
      draft.date = draft.date || planUpdateDate() || isoToday();
      draft.fromBuilding = draft.fromBuilding || firstBuilding;
      draft.toBuilding = draft.toBuilding || "";
      draft.workerId = draft.workerId || firstWorker;
      draft.unit = ["full", "half", "hours"].includes(draft.unit) ? draft.unit : "full";
      draft.hours = n(draft.hours || state.settings.dayHours);
      if (draft.amount === undefined || draft.amount === null || draft.amount === "") draft.amount = borrowedAmount(draft);
      draft.note = draft.note || "";
      state.ui.borrowDraft = draft;
      return draft;
    }

    function refreshBorrowDraftAmount(draft = borrowDraft()) {
      draft.amount = borrowedAmount({ ...draft, amount: "" });
      return draft.amount;
    }

    function attendanceData(view = attendanceView(), monthKey = selectedAttendanceMonth()) {
      const dates = attendanceDates(monthKey);
      const dateSet = new Set(dates);
      const cutoff = planUpdateDate();
      const workerDayMap = new Map();
      const dayWorkers = new Map(dates.map((date) => [date, new Set()]));
      const dayCosts = new Map(dates.map((date) => [date, 0]));
      periodsForView(view).forEach((period) => {
        period.items.forEach((item) => {
          const actual = ensurePlanItemData(item).actual || {};
          Object.entries(actual).forEach(([date, entries]) => {
            if (!dateSet.has(date)) return;
            (entries || []).forEach((entry) => {
              if (!entry.workerId) return;
              const worker = getWorker(entry.workerId);
              if (!worker) return;
              const workerDays = workerDayMap.get(entry.workerId) || new Map();
              const current = workerDays.get(date) || { units: 0, cost: 0 };
              current.units += laborUnits(entry);
              current.cost += laborAmount(entry);
              workerDays.set(date, current);
              workerDayMap.set(entry.workerId, workerDays);
              dayWorkers.get(date)?.add(entry.workerId);
              dayCosts.set(date, (dayCosts.get(date) || 0) + laborAmount(entry));
            });
          });
        });
      });
      borrowedRowsForView(view, monthKey).forEach((row) => {
        if (!dateSet.has(row.date)) return;
        const worker = getWorker(row.workerId);
        if (!worker) return;
        const workerDays = workerDayMap.get(row.workerId) || new Map();
        const current = workerDays.get(row.date) || { units: 0, cost: 0 };
        current.units += laborUnits(row);
        current.cost += borrowedAmount(row);
        current.borrowedTo = row.toBuilding || "";
        workerDays.set(row.date, current);
        workerDayMap.set(row.workerId, workerDays);
        dayWorkers.get(row.date)?.add(row.workerId);
        dayCosts.set(row.date, (dayCosts.get(row.date) || 0) + borrowedAmount(row));
      });
      const rows = [...state.workers]
        .sort((a, b) => naturalSort(a.code, b.code) || naturalSort(a.name, b.name))
        .map((worker) => {
          const days = workerDayMap.get(worker.id) || new Map();
          const workedDays = dates.filter((date) => days.has(date) && date <= cutoff).length;
          const absentDays = dates.filter((date) => !isHoliday(date) && date <= cutoff && !days.has(date)).length;
          return {
            worker,
            days,
            workedCount: days.size,
            workedDays,
            absentDays: days.size ? absentDays : 0,
            monthCost: [...days.values()].reduce((sum, row) => sum + row.cost, 0)
          };
        });
      return {
        view,
        monthKey,
        dates,
        cutoff,
        rows,
        activeWorkers: rows.filter((row) => row.workedCount > 0).length,
        holidays: dates.filter(isHoliday).length,
        dayWorkers,
        dayCosts
      };
    }

    function attendanceMark(row, date, cutoff = planUpdateDate()) {
      if (isHoliday(date)) return "holiday";
      const day = row.days.get(date);
      if (day?.borrowedTo) return `borrowed:${day.borrowedTo}`;
      if (row.days.has(date)) return "worked";
      if (!row.workedCount) return "inactive";
      if (date <= cutoff) return "absent";
      return "blank";
    }

    function renderDashboard() {
      const el = $("#tab-dashboard");
      const viewOptions = buildingViewOptions();
      const mainView = viewOptions.includes(combinedViewValue()) ? combinedViewValue() : (viewOptions[0] || "ALL");
      const main = summaryFor(mainView);
      const balanceClass = main.balance < 0 ? "danger" : "";
      const kpis = [
        ["มูลค่างวดงานรวม", money(main.periodValue, 0)],
        ["มูลค่าค่าแรงรวม", money(main.laborValue, 0)],
        [`ค่าแรงควบคุม ${money(state.settings.controlPercent, 0)}%`, money(main.control, 0)],
        ["ค่าแรงจริงสะสม", money(main.laborActual, 0)],
        ["ค่าเครื่องจักรสะสม", money(main.machineActual, 0)],
        [main.balance < 0 ? "เกินงบควบคุม" : "คงเหลืองบควบคุม", money(Math.abs(main.balance), 0)]
      ];
      const comparison = viewOptions.map((view) => {
        const s = summaryFor(view);
        const label = viewLabel(view);
        const usedPct = s.laborValue ? s.total / s.laborValue * 100 : 0;
        const controlPct = s.laborValue ? s.control / s.laborValue * 100 : n(state.settings.controlPercent);
        const status = s.laborValue && s.total > s.laborValue ? "danger" : s.total > s.control ? "warning" : "normal";
        return `
          <div class="comparison-card">
            <header>
              <h3>${label}</h3>
            </header>
            <div class="labor-budget-wrap">
              <div class="labor-budget ${status}" style="--used:${Math.min(100, usedPct)};--control:${Math.min(100, controlPct)}">
                <span class="labor-budget-fill"></span>
                <span class="labor-budget-percent">${money(usedPct, 1)}%</span>
                <span class="labor-budget-control"><em>งบควบคุม ${money(controlPct, 0)}%</em></span>
              </div>
              <div class="comparison-readout">
                ใช้แล้ว <strong>${money(s.total, 0)}</strong> / <strong>${money(s.laborValue, 0)}</strong>
              </div>
            </div>
            <div class="comparison-metrics">
              <div><span>ค่าแรงจริง</span><strong>${money(s.laborActual, 0)}</strong></div>
              <div><span>ค่าเครื่องจักร</span><strong>${money(s.machineActual, 0)}</strong></div>
              <div><span class="metric-nowrap">งบควบคุม (${money(controlPct, 0)}%)</span><strong>${money(s.control, 0)}</strong></div>
              <div class="remaining-metric"><span>${s.balance < 0 ? "เกิน" : "คงเหลือ"}</span><strong class="${s.balance < 0 ? "danger-text" : ""}">${money(Math.abs(s.balance), 0)}</strong></div>
            </div>
          </div>
        `;
      }).join("");
      const initialTotal = n(main.manual.initialLaborCost) + n(main.manual.initialMachineCost);
      const mixTotal = main.laborActual + main.machineActual + initialTotal;
      const mix = {
        labor: mixTotal ? main.laborActual / mixTotal * 100 : 0,
        machine: mixTotal ? main.machineActual / mixTotal * 100 : 0,
        manual: mixTotal ? initialTotal / mixTotal * 100 : 0
      };
      const periodRows = periodsForView(mainView).map((period) => {
        const laborValue = periodLaborValue(period);
        const laborActual = periodLaborActual(period);
        const machineActual = periodMachineActual(period);
        const used = laborActual + machineActual;
        const ratio = laborValue ? used / laborValue : 0;
        const status = laborValue && used > laborValue ? "danger" : used > laborValue * n(state.settings.controlPercent) / 100 ? "warning" : "normal";
        return `
          <tr>
            <td><span class="status-dot ${status === "normal" ? "" : status}"></span>${esc(buildingLabel(period.building))}</td>
            <td>งวดงานที่ ${esc(period.no)}</td>
            <td class="num">${money(period.periodValue, 0)}</td>
            <td class="num">${money(laborValue, 0)}</td>
            <td class="num">${money(used, 0)}</td>
            <td class="num">${money(ratio * 100, 1)}%</td>
          </tr>
        `;
      }).join("") || `<tr><td colspan="6" class="muted">ยังไม่ได้เลือกงวดงานสำหรับรอบนี้</td></tr>`;
      const updateDates = getDates().filter((date) => date <= planUpdateDate());

    function monthGroups(dates) {
      const groups = [];
      dates.forEach((date) => {
        const label = monthLabel(date);
        const last = groups[groups.length - 1];
        if (last?.label === label) last.count++;
        else groups.push({ label, count: 1 });
      });
      return groups;
    }

    function buildPlanTable(view, dates) {
      const editable = !["GI", "ALL"].includes(view);
      const activePeriods = periodsForView(view);
      const totalCols = dates.length + 4;
      let body = "";
      if (!activePeriods.length) {
        body = `<tr class="empty-row"><td colspan="${totalCols}">ยังไม่ได้เลือกงวดงานสำหรับรอบนี้</td></tr>`;
      } else {
        for (const building of buildingsForView(view)) {
          const periods = periodsForBuilding(building);
          body += `<tr class="building-row"><td class="sticky col-building" colspan="4">อาคาร ${building}</td>${dates.map((date) => `<td class="date-cell ${dateClass(date)}" data-date-col="${esc(date)}"></td>`).join("")}</tr>`;
          for (const period of periods) {
            body += `<tr class="period-row"><td class="sticky col-building"></td><td class="sticky col-period">${esc(period.title)}</td><td class="sticky col-item" colspan="2">${esc(period.description)}</td>${dates.map((date) => `<td class="date-cell ${dateClass(date)}" data-date-col="${esc(date)}"></td>`).join("")}</tr>`;
            for (const item of period.items) {
              body += `
                <tr>
                  <td class="sticky col-building">${esc(period.building)}</td>
                  <td class="sticky col-period">งวด ${esc(period.no)}</td>
                  <td class="sticky col-item">${esc(item.name)} <span class="pill">${money(item.progressPct, 0)}%</span></td>
                  <td class="sticky col-value num">${money(item.laborValue, 0)}</td>
                  ${dates.map((date) => {
                    const planned = itemPlanValue(item, date);
                    const units = itemActualUnits(item, date);
                    const cost = itemLaborCost(item, date);
                    const workClass = units > 0 ? "actual" : "";
                    const dayClass = dateClass(date);
                    const planRef = { periodId: period.id, itemId: item.id, date, part: "plan" };
                    const actualRef = { periodId: period.id, itemId: item.id, date, part: "actual" };
                    const planSelected = editable && isCellSelected(planRef);
                    const actualSelected = editable && isCellSelected(actualRef);
                    const anySelected = planSelected || actualSelected;
                    const planPrimary = editable && cellMatches(state.ui.selectedCell, planRef);
                    const actualPrimary = editable && cellMatches(state.ui.selectedCell, actualRef);
                    const attrs = editable ? `data-action="edit-cell" data-period-id="${period.id}" data-item-id="${item.id}" data-date="${date}" title="คลิกเพื่อเลือก ดับเบิลคลิกเพื่อแก้ไข"` : "";
                    return `<td class="date-cell ${dayClass}" data-date-col="${esc(date)}">
                      <button class="date-btn ${workClass} ${anySelected ? "selected" : ""} ${editable ? "" : "readonly"}" ${attrs} aria-selected="${anySelected ? "true" : "false"}">
                        <span class="cell-part plan-part ${planned ? "has-plan-cell" : ""} ${planSelected ? "part-selected" : ""} ${planPrimary ? "part-primary" : ""}" data-cell-part="plan" title="จำนวนแรงตามแผน">
                          <span class="plan-line">${planned ? qty(planned) : ""}</span>
                          ${editable ? `<span class="fill-handle" data-action="fill-handle" aria-hidden="true"></span>` : ""}
                        </span>
                        <span class="cell-part actual-part ${units ? "has-actual-cell" : ""} ${actualSelected ? "part-selected" : ""} ${actualPrimary ? "part-primary" : ""}" data-cell-part="actual" title="จำนวนแรงจริง + ค่าแรง">
                          <span class="actual-line">${units ? qty(units) : ""}</span>
                          <span class="cost-line">${cost ? money(cost, 0) : ""}</span>
                          ${editable ? `<span class="fill-handle" data-action="fill-handle" aria-hidden="true"></span>` : ""}
                        </span>
                      </button>
                    </td>`;
                  }).join("")}
                </tr>
              `;
            }
          }
        }
      }
      const summaryRows = activePeriods.length ? [
        ["จำนวนแรงที่ใช้ตามแผน", (date) => totalPlanned(view, date), "qty"],
        ["จำนวนแรงที่ใช้จริง", (date) => totalActualUnits(view, date), "qty"],
        ["ค่าแรงที่ใช้ต่อวัน", (date) => totalLaborCost(view, date), 0],
        ["ค่าเครื่องจักรที่ใช้ต่อวัน", (date) => totalMachineCost(view, date), 0],
        ["รวมค่าใช้จ่ายต่อวัน", (date) => totalSpend(view, date), 0]
      ].map(([label, getter, digits]) => `
        <tr class="summary-row">
          <td class="sticky col-building" colspan="4">${label}</td>
          ${dates.map((date) => `<td class="date-cell ${dateClass(date)}" data-date-col="${esc(date)}">${getter(date) ? (digits === "qty" ? qty(getter(date)) : money(getter(date), digits)) : "0"}</td>`).join("")}
        </tr>
      `).join("") : "";
      return `
        <table class="work-table">
          <thead>
            <tr>
              <th class="sticky col-building">อาคาร</th>
              <th class="sticky col-period">งวด</th>
              <th class="sticky col-item">รายการ</th>
              <th class="sticky col-value">มูลค่า</th>
              ${monthGroups(dates).map((group) => `<th class="month-cell" colspan="${group.count}">${esc(group.label)}</th>`).join("")}
            </tr>
            <tr>
              <th class="sticky col-building"></th>
              <th class="sticky col-period"></th>
              <th class="sticky col-item"></th>
              <th class="sticky col-value"></th>
              ${dates.map((date) => `<th class="day-cell date-cell ${dateClass(date)}" data-date-col="${esc(date)}">${dayNumber(date)}</th>`).join("")}
            </tr>
          </thead>
          <tbody>${body}${summaryRows}</tbody>
        </table>
      `;
    }

    function renderPeriods() {
      const el = $("#tab-periods");
      const editingId = state.ui.editingPeriodId || "";
      if (editingId === "__new__") {
        el.innerHTML = renderNewPeriodEditor();
        return;
      }
      const mainRows = periodMainViewRows();
      if (mainRows.length) {
        el.innerHTML = renderMainPeriodOverview(mainRows);
        return;
      } else if (state.ui.editingMainPeriodKey) {
        state.ui.editingMainPeriodKey = "";
      }
      const editingPeriod = getPeriod(editingId);
      if (editingPeriod) {
        el.innerHTML = renderPeriodEditor(editingPeriod);
        return;
      }
      if (editingId) state.ui.editingPeriodId = "";

      const filters = periodFilters();
      const visiblePeriods = state.periods.filter((period) => periodMatchesFilters(period, filters));
      const selectedVisible = visiblePeriods.filter(periodEnabled);
      const buildings = allBuildings().filter((building) => filters.building === "all" || filters.building === building);
      const buildingOptions = [`<option value="all">ทุกอาคาร</option>`, ...allBuildings().map((building) => `<option value="${esc(building)}" ${filters.building === building ? "selected" : ""}>${esc(buildingLabel(building))}</option>`)].join("");
      el.innerHTML = `
        <div class="section period-manager">
          <div class="panel">
            <div class="panel-head">
              <div>
                <h2>งวดงานทั้งหมด</h2>
                <p class="muted">แสดงเฉพาะข้อมูลที่ต้องตัดสินใจ กดแถวเพื่อเปิดหน้าแก้เต็มหน้า</p>
              </div>
              <button class="primary" data-action="open-new-period">เพิ่มงวด</button>
            </div>
            <div class="panel-body">
              <div class="period-filter-row">
                <label><span>ค้นหาเลขงวด</span><input data-period-filter="search" value="${esc(state.ui.periodSearch || "")}" placeholder="เช่น 5, 5.1, 9"></label>
                <label><span>อาคาร</span><select data-period-filter="building">${buildingOptions}</select></label>
                <button data-action="apply-period-filter">ค้นหา</button>
              </div>
              <div class="period-summary-strip" style="margin-top:12px">
                <div class="metric"><span>งวดที่แสดง</span><strong>${visiblePeriods.length}</strong></div>
                <div class="metric"><span>เลือกใช้รอบนี้</span><strong>${selectedVisible.length}</strong></div>
                <div class="metric"><span>มูลค่างวดที่เลือก</span><strong>${money(selectedVisible.reduce((sum, row) => sum + n(row.periodValue), 0), 0)}</strong></div>
                <div class="metric"><span>ค่าแรงงวดที่เลือก</span><strong>${money(selectedVisible.reduce((sum, row) => sum + periodLaborValue(row), 0), 0)}</strong></div>
              </div>
              <p class="period-mini-note" style="margin-top:10px">กดแถวงวดหลักเพื่อดูภาพรวมงวดย่อย หรือกดแถวงวดเดียว/งวดย่อยเพื่อเปิดหน้าแก้เต็ม</p>
            </div>
          </div>
          <div class="period-board">
            ${buildings.map((building) => renderPeriodBuilding(building, filters)).join("") || `<div class="panel"><div class="period-empty">ยังไม่มีงวดตามตัวกรองนี้</div></div>`}
          </div>
        </div>
      `;
    }

    function renderPeriodBuilding(building, filters) {
      const all = state.periods.filter((period) => period.building === building);
      const groups = periodGroupRows(building, filters);
      const activeCount = all.filter(periodEnabled).length;
      return `
        <div class="panel">
          <div class="panel-head">
            <div class="inline-list">
              <h2>${esc(buildingLabel(building))}</h2>
              <span class="pill">เลือกใช้ ${activeCount}/${all.length} งวด</span>
            </div>
            <div class="inline-list">
              <button data-action="enable-building-periods" data-building="${esc(building)}">เลือกใช้ทั้งหมด</button>

                    <th>งวดงาน</th>
                    <th>ชื่องวด</th>

          </div>
        </div>

    function renderPeriodGroup(group) {
      const summary = groupSummary(group.rows);
      const percent = n(summary.mainValue) ? summary.subValue / summary.mainValue * 100 : 0;
      const over = summary.mainValue > 0 && summary.subValue > summary.mainValue;
      const first = group.rows[0];
      const hasSubs = hasSubPeriods(group.rows);
      if (!hasSubs) return renderSingleMainPeriodRow(first);
      return `
        <tr class="period-main-row period-overview-row" data-period-main-row="${esc(group.building)}|${esc(group.mainNo)}">
          <td></td>
          <td><span class="period-no">${esc(group.mainNo)}</span></td>
          <td></td>
          <td class="num">${money(summary.mainValue, 0)}</td>
          <td class="num">${money(summary.laborValue, 0)}</td>
          <td><span class="pill ${over ? "red" : "green"}">${over ? "มูลค่าย่อยเกิน" : `ใช้ ${money(percent, 1)}%`}</span></td>
          <td><div class="period-actions"><button data-action="open-period-main" data-period-main-key="${esc(group.building)}|${esc(group.mainNo)}">เปิด</button></div></td>
        </tr>
        ${group.rows.map(renderPeriodRow).join("")}
      `;
    }

    function renderSingleMainPeriodRow(period) {
      const laborValue = periodLaborValue(period);
      const statusClass = periodStatusClass(period.status);
      const value = n(period.periodValue) || n(period.mainValue);
      const percent = n(period.mainValue) ? value / n(period.mainValue) * 100 : n(period.periodPercent);
      return `
        <tr class="period-sub-row ${periodEnabled(period) ? "is-selected" : "is-disabled"}" data-period-row="${period.id}">
          <td>
            <label class="check-row" title="เลือกใช้ในแผนเบิกงวดรอบนี้">

            </label>
          </td>
          <td><span class="period-no">${esc(periodMainNo(period))}</span></td>
          <td><strong>${esc(periodUserTitle(period))}</strong></td>
          <td class="num">${money(value, 0)}</td>
          <td class="num">${money(laborValue, 0)}</td>
          <td><span class="pill ${statusClass}">${esc(period.status || "รอทำ")}</span> <span class="period-mini-note">${money(percent, 1)}%</span></td>

        </tr>

          <td>
            <label class="check-row" title="เลือกใช้ในแผนเบิกงวดรอบนี้">

            </label>
          </td>
          <td class="period-indent" style="padding-left:${indent}px"><span class="period-no">${esc(period.no)}</span></td>
          <td><strong>${esc(periodUserTitle(period))}</strong></td>
          <td class="num">${money(period.periodValue, 0)}</td>
          <td class="num">${money(laborValue, 0)}</td>
          <td><span class="pill ${statusClass}">${esc(period.status || "รอทำ")}</span></td>
          <td><div class="period-actions"><button data-action="open-period-editor" data-period-id="${period.id}">เปิด</button></div></td>

                    <th class="num">มูลค่างวด</th>

                    <th>สถานะ</th>

                <tbody>
                  <tr class="period-main-row">

                </tbody>
              </table>
            </div>
          </div>
        </div>
      `;

                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>

      const draft = state.ui.newPeriodDraft || {};
      const building = draft.building || (state.ui.periodBuilding && state.ui.periodBuilding !== "all" ? state.ui.periodBuilding : allBuildings()[0] || "");
      const showSubPeriod = Boolean(draft.no || draft.periodValue || draft.periodPercent || draft.useSubPeriod);
      const titleNo = showSubPeriod ? draft.no : draft.mainNo;
      const buildingDatalist = `<datalist id="buildingList">${allBuildings().filter(Boolean).map((row) => `<option value="${esc(row)}">${esc(buildingLabel(row))}</option>`).join("")}</datalist>`;
      const templates = periodTemplateForBuilding(building);
      const templateDatalist = `<datalist id="periodTemplateList">${templates.map((row) => `<option value="${esc(row.no)}">งวด ${esc(row.no)} · ${money(row.value, 0)}</option>`).join("")}</datalist>`;
      return `
        <div class="section period-editor">
          <div class="period-editor-head">

            <div class="period-editor-title">
              <small>เพิ่มงวดใหม่</small>

      const buildingOptions = allBuildings().filter(Boolean).map((building) => `<option value="${esc(building)}" ${draft.fromBuilding === building ? "selected" : ""}>${esc(buildingLabel(building))}</option>`).join("");
      const workerOptions = state.workers.map((worker) => `<option value="${esc(worker.id)}" ${draft.workerId === worker.id ? "selected" : ""}>${esc(worker.code)} · ${esc(worker.name)}</option>`).join("");
      const rows = borrowedRowsForView(view, monthKey).sort((a, b) => naturalSort(a.date, b.date) || naturalSort(a.toBuilding, b.toBuilding));
      const totalUnits = rows.reduce((sum, row) => sum + laborUnits(row), 0);
      const totalAmount = rows.reduce((sum, row) => sum + borrowedAmount(row), 0);
      const uniqueWorkers = new Set(rows.map((row) => row.workerId).filter(Boolean));
      const buildingGroups = new Map();
      rows.forEach((row) => {
        const key = row.toBuilding || "-";
        const group = buildingGroups.get(key) || { building: key, units: 0, amount: 0, workers: new Set(), days: new Set() };
        group.units += laborUnits(row);
        group.amount += borrowedAmount(row);
        if (row.workerId) group.workers.add(row.workerId);
        if (row.date) group.days.add(row.date);
        buildingGroups.set(key, group);
      });
      const maxAmount = Math.max(1, ...[...buildingGroups.values()].map((group) => group.amount));
      const groupCards = [...buildingGroups.values()].map((group) => `
        <div class="borrow-building-card">
          <div class="panel-head" style="padding:0;border:0">
            <h3>${esc(buildingLabel(group.building))}</h3>
            <span class="pill">${money(group.days.size, 0)} วัน</span>
          </div>
          <strong>${money(group.amount, 0)} บาท</strong>
          <div class="muted">${money(group.workers.size, 0)} คน · ${qty(group.units) || "0"} แรง</div>
          <div class="borrow-bar"><span style="--pct:${Math.max(4, group.amount / maxAmount * 100)}%"></span></div>
        </div>
      `).join("") || `<p class="muted">ยังไม่มีรายการยืมคนงานในเดือนนี้</p>`;
      const historyRows = rows.map((row, index) => {
        const worker = getWorker(row.workerId);
        return `
          <tr>
            <td class="num">${index + 1}</td>
            <td>${esc(dateLabel(row.date))}</td>
            <td>${worker ? `${esc(worker.code)} · ${esc(worker.name)}` : "ไม่พบคนงาน"}</td>
            <td>${esc(buildingLabel(row.fromBuilding))}</td>
            <td><span class="pill">${esc(buildingLabel(row.toBuilding))}</span></td>
            <td>${esc(borrowUnitLabel(row))}</td>

    function updateBorrowDraftField(target) {
      const draft = borrowDraft();
      const field = target.dataset.borrowField;
      if (!field) return;
      draft[field] = ["hours", "amount"].includes(field) ? n(target.value) : target.value;
      if (["workerId", "unit"].includes(field)) {
        if (field === "unit") {
          if (draft.unit === "full") draft.hours = n(state.settings.dayHours);
          if (draft.unit === "half") draft.hours = n(state.settings.dayHours) / 2;
        }
        refreshBorrowDraftAmount(draft);
        saveState();
        return renderBorrowedWorkers();
      }
      if (field === "hours" && draft.unit === "hours") refreshBorrowDraftAmount(draft);
      saveState();
    }

    function addBorrowedWorker() {
      const draft = borrowDraft();
      const date = draft.date || "";
      const workerId = draft.workerId || "";
      const fromBuilding = String(draft.fromBuilding || "").trim();
      const toBuilding = String(draft.toBuilding || "").trim().toUpperCase();
      if (!date) return showToast("เลือกวันที่ยืมคนงานก่อน");
      if (!workerId || !getWorker(workerId)) return showToast("เลือกคนงานก่อน");
      if (!fromBuilding) return showToast("เลือกอาคารต้นทางก่อน");
      if (!toBuilding) return showToast("กรอกอาคารที่ยืมไปก่อน");
      if (workerAssignedInfo(workerId, date)) return showToast("คนงานนี้ลงงานจริงในวันเดียวกันแล้ว");
      if (borrowedWorkerInfo(workerId, date)) return showToast("คนงานนี้ถูกยืมในวันเดียวกันแล้ว");
      const row = {
        id: uid("bw"),
        date,
        workerId,
        fromBuilding,
        toBuilding,
        unit: ["full", "half", "hours"].includes(draft.unit) ? draft.unit : "full",
        hours: n(draft.hours || state.settings.dayHours),
        amount: n(draft.amount || borrowedAmount({ ...draft, toBuilding })),
        note: String(draft.note || "").trim()
      };
      if (!row.amount) row.amount = borrowedAmount(row);
      borrowedRows().push(row);
      state.ui.borrowDraft = {
        ...draft,
        toBuilding: "",
        note: "",
        amount: borrowedAmount({ ...draft, amount: "" })

      saveState();
      renderBorrowedWorkers();
      showToast("บันทึกยืมคนงานแล้ว");

    function saveCellDraft() {
      if (!cellDraft) return;
      const period = getPeriod(cellDraft.periodId);
      const item = getItem(period, cellDraft.itemId);
      if (!period || !item) return;
      const seen = new Set();
      const moves = [];
      for (const row of cellDraft.assignments) {
        if (!row.workerId) return renderCellDialog("เลือกคนงานไม่ถูกต้อง");
        if (seen.has(row.workerId)) return renderCellDialog("คนงานซ้ำในช่องเดียวกัน");
        seen.add(row.workerId);
        const borrowed = borrowedWorkerInfo(row.workerId, cellDraft.date);
        if (borrowed) return renderCellDialog(`คนงานนี้ถูกยืมไปหลัง ${borrowed.toBuilding || "-"} แล้ว`);
        const assigned = workerAssignedInfo(row.workerId, cellDraft.date, cellDraft);
        if (assigned) {
          const worker = getWorker(row.workerId);
          if (workerListMode() !== "move") return renderCellDialog(`คนงานนี้ถูกใช้แล้วที่ ${assignedLabel(assigned)}`);
          if (row.transferFrom !== transferToken(assigned) && (!worker || !confirmWorkerMove(worker, assigned))) return renderCellDialog("ยกเลิกการย้ายคนงาน");
          moves.push(assigned);
        }
      }
      recordHistory("บันทึกช่องงาน");
      moves.forEach((assigned) => removeWorkerFromAssignment(assigned, cellDraft.date));
      const cleanAssignments = cellDraft.assignments.map(({ transferFrom, ...row }) => row);
      setPlan(item, cellDraft.date, $("#draftPlanned")?.value || 0);
      const data = ensurePlanItemData(item);
      if (cleanAssignments.length) data.actual[cellDraft.date] = cleanAssignments;
      else delete data.actual[cellDraft.date];
      const usage = activeMachineUsage();
      usage[cellDraft.building] = usage[cellDraft.building] || {};
      if (cellDraft.machineRows.length) usage[cellDraft.building][cellDraft.date] = cellDraft.machineRows;
      else delete usage[cellDraft.building][cellDraft.date];
      saveState();
      $("#cellDialog").close();
      cellDraft = null;
      if (activeTab === "plan") renderPlanPreservingScroll();
      else renderActiveTab();
      showToast("บันทึกช่องงานแล้ว");
    }

    function clearCellDraft() {
      if (!cellDraft) return;
      cellDraft.planned = 0;
      cellDraft.assignments = [];
      cellDraft.machineRows = [];
      renderCellDialog();

    function addWorkerToDraft() {
      if (!cellDraft) return;
      const workerId = $("#draftWorkerSelect").value;
      const unit = $("#draftWorkerUnit").value;
      const hours = unit === "full" ? n(state.settings.dayHours) : unit === "half" ? n(state.settings.dayHours) / 2 : n($("#draftWorkerHours").value);
      if (!workerId) return;
      const borrowed = borrowedWorkerInfo(workerId, cellDraft.date);
      if (borrowed) return renderCellDialog(`คนงานนี้ถูกยืมไปหลัง ${borrowed.toBuilding || "-"} แล้ว`);
      const assigned = workerAssignedInfo(workerId, cellDraft.date, cellDraft);
      let transferFrom = "";
      if (assigned) {
        const worker = getWorker(workerId);
        if (workerListMode() !== "move") return renderCellDialog(`คนงานนี้ถูกใช้แล้วที่ ${assignedLabel(assigned)}`);
        if (!worker || !confirmWorkerMove(worker, assigned)) return renderCellDialog("ยกเลิกการย้ายคนงาน");

      cellDraft.assignments.push({ workerId, unit, hours, transferFrom });

    function updateQuickField(field, value, rerender = true) {
      const quick = getQuickEntry();
      quick[field] = value;
      if (field === "building") {
        const period = periodsForBuilding(value)[0];
        quick.periodId = period?.id || "";
        quick.itemId = period?.items[0]?.id || "";
        state.ui.planView = value;
        delete quick.planned;
      }
      if (field === "periodId") {
        const period = getPeriod(value);
        quick.building = period?.building || quick.building;
        quick.itemId = period?.items[0]?.id || "";
        delete quick.planned;
      }
      if (field === "itemId" || field === "date") delete quick.planned;
      if (field === "unit") {
        if (value === "full") quick.hours = n(state.settings.dayHours);
        if (value === "half") quick.hours = n(state.settings.dayHours) / 2;
      }
      if (field === "machineId") quick.machineAmount = getMachine(value)?.dailyCost || 0;
      if (field === "planned") quick[field] = Math.max(0, Math.round(n(value)));
      if (field === "hours" || field === "machineAmount") quick[field] = n(value);
      saveState();
      if (rerender) renderPlan();
    }

    function dateRangeBetween(start, end) {
      const dates = getDates();
      const a = dates.indexOf(start);
      const b = dates.indexOf(end);
      if (a < 0 || b < 0 || a === b) return [];
      const step = a < b ? 1 : -1;
      const range = [];
      for (let i = a + step; step > 0 ? i <= b : i >= b; i += step) range.push(dates[i]);
      return range;
    }

    function dateSpanBetween(start, end) {
      const dates = getDates();
      const a = dates.indexOf(start);
      const b = dates.indexOf(end);
      if (a < 0 || b < 0) return [];
      const low = Math.min(a, b);
      const high = Math.max(a, b);
      return dates.slice(low, high + 1);
    }

    function cellPartFromElement(element) {
      return element?.closest?.("[data-cell-part]")?.dataset?.cellPart || "actual";
    }

    function cellPartFromEvent(button, event) {
      const explicit = event?.target?.closest?.("[data-cell-part]")?.dataset?.cellPart;
      if (explicit) return explicit;
      const rect = button?.getBoundingClientRect?.();
      if (!rect || event?.clientY === undefined) return "actual";
      return event.clientY < rect.top + rect.height * 0.45 ? "plan" : "actual";
    }

    function cellRefsFromButton(button, part = "actual") {
      if (!button?.dataset?.periodId || !button?.dataset?.itemId || !button?.dataset?.date) return null;
      return {
        periodId: button.dataset.periodId,
        itemId: button.dataset.itemId,
        date: button.dataset.date,
        part: part || "actual"
      };
    }

    function cellMatches(a, b) {
      return Boolean(a && b && a.periodId === b.periodId && a.itemId === b.itemId && a.date === b.date && (a.part || "actual") === (b.part || "actual"));
    }

    function cellKey(ref) {
      return ref ? `${ref.periodId}|${ref.itemId}|${ref.date}|${ref.part || "actual"}` : "";
    }

    function sameCellRow(a, b) {
      return Boolean(a && b && a.periodId === b.periodId && a.itemId === b.itemId && (a.part || "actual") === (b.part || "actual"));
    }

    function selectedCellRefs() {
      const refs = Array.isArray(state.ui?.selectedCells) ? state.ui.selectedCells.filter((ref) => ref?.periodId && ref?.itemId && ref?.date).map((ref) => ({ ...ref, part: ref.part || "actual" })) : [];
      if (refs.length) return refs;
      return state.ui?.selectedCell ? [{ ...state.ui.selectedCell, part: state.ui.selectedCell.part || "actual" }] : [];
    }

    function setSelectedCells(refs, primary = refs.at(-1), persist = true) {
      const seen = new Set();
      const clean = refs.filter((ref) => ref?.periodId && ref?.itemId && ref?.date && !seen.has(cellKey(ref)) && seen.add(cellKey(ref))).map((ref) => ({ ...ref, part: ref.part || "actual" }));
      state.ui.selectedCells = clean;
      state.ui.selectedCell = primary ? { ...primary } : clean.at(-1) || null;
      if (persist) saveState();
      applySelectedCellHighlight();
    }

    function rangeRefsBetween(source, target) {
      if (!sameCellRow(source, target)) return target ? [{ ...target }] : [];
      return dateSpanBetween(source.date, target.date).map((date) => ({ periodId: source.periodId, itemId: source.itemId, date, part: source.part || "actual" }));
    }

    function mergeCellRefs(base, additions) {
      return [...base, ...additions].reduce((list, ref) => {
        if (!list.some((row) => cellMatches(row, ref))) list.push({ ...ref });
        return list;
      }, []);
    }

    function toggleSelectedCell(ref) {
      const current = selectedCellRefs();
      const exists = current.some((row) => cellMatches(row, ref));
      const next = exists ? current.filter((row) => !cellMatches(row, ref)) : [...current, ref];
      setSelectedCells(next, exists ? next.at(-1) : ref);
    }

    function isCellSelected(ref) {
      return selectedCellRefs().some((row) => cellMatches(row, ref));
    }

    function fillModeParts(mode = state.ui.fillMode || "all") {
      return {
        plan: mode === "all" || mode === "plan" || mode === "planActual",
        actual: mode === "all" || mode === "actual" || mode === "planActual",
        machine: mode === "all" || mode === "machine"
      };
    }

    function fillModeLabel(mode = state.ui.fillMode || "all") {
      return {
        all: "ทั้งหมด",
        plan: "จำนวนแรงตามแผน",
        actual: "คนงานจริง + ค่าแรง",
        planActual: "แผน + คนงานจริง",
        machine: "เครื่องจักร"
      }[mode] || "ทั้งหมด";
    }

    function modeForCellRef(ref, fallback = state.ui.fillMode || "all") {
      if ((ref?.part || "") === "plan") return "plan";
      if ((ref?.part || "") === "actual") return "actual";
      return fallback;
    }

    function capturePlanGridScroll() {
      const grid = $("#tab-plan .plan-grid");
      return grid ? { left: grid.scrollLeft, top: grid.scrollTop } : null;
    }

    function restorePlanGridScroll(scroll) {
      if (!scroll) return;
      requestAnimationFrame(() => {
        const grid = $("#tab-plan .plan-grid");
        if (!grid) return;
        grid.scrollLeft = scroll.left;
        grid.scrollTop = scroll.top;
        applySelectedCellHighlight();
      });
    }

    function renderPlanPreservingScroll() {
      const scroll = capturePlanGridScroll();
      renderPlan();
      restorePlanGridScroll(scroll);
    }

    function goToToday() {
      const today = isoToday();
      if (!getDates().includes(today)) return showToast("วันนี้อยู่นอกช่วงวันของแผนนี้");
      const grid = $("#tab-plan .plan-grid");
      const cells = $$(`#tab-plan .work-table [data-date-col="${today}"]`);
      const first = cells[0];
      if (!grid || !first) return showToast("ยังไม่พบคอลัมน์วันนี้ในตาราง");
      grid.scrollLeft = Math.max(0, first.offsetLeft - 520);
      cells.forEach((cell) => {
        cell.classList.remove("today-flash");
        void cell.offsetWidth;
        cell.classList.add("today-flash");
      });
      setTimeout(() => cells.forEach((cell) => cell.classList.remove("today-flash")), 2800);
      showToast(`ไปที่วันนี้ ${dateLabel(today)}`);
    }

    function hasCellDataForMode(period, item, date, mode = state.ui.fillMode || "all") {
      const parts = fillModeParts(mode);
      const usage = activeMachineUsage();
      return (parts.plan && itemPlanValue(item, date) > 0)
        || (parts.actual && actualEntries(item, date).length > 0)
        || (parts.machine && (usage?.[period.building]?.[date] || []).length > 0);
    }

    function hasCellDataForRef(ref) {
      const period = getPeriod(ref?.periodId);
      const item = getItem(period, ref?.itemId);
      return Boolean(period && item && hasCellDataForMode(period, item, ref.date, modeForCellRef(ref)));
    }

    function clearCellData(ref) {
      const period = getPeriod(ref?.periodId);
      const item = getItem(period, ref?.itemId);
      if (!period || !item || !ref?.date) return false;
      const mode = modeForCellRef(ref);
      const parts = fillModeParts(mode);
      const hadData = hasCellDataForMode(period, item, ref.date, mode);
      if (parts.plan) setPlan(item, ref.date, 0);
      if (parts.actual) {
        const data = ensurePlanItemData(item);
        delete data.actual[ref.date];
      }
      if (parts.machine) {
        const usage = activeMachineUsage();
        if (usage?.[period.building]) delete usage[period.building][ref.date];
      }
      return hadData;
    }

    function clearSelectedCells() {
      const refs = selectedCellRefs();
      if (!refs.length) return showToast("เลือกช่องในตารางก่อน");
      const affected = refs.filter(hasCellDataForRef);
      if (!affected.length) return showToast("ช่องที่เลือกไม่มีข้อมูลให้ล้าง");
      recordHistory("ล้างข้อมูลช่องงาน");
      refs.forEach((ref) => clearCellData(ref));
      saveState();
      renderPlanPreservingScroll();
      showToast(`ล้างข้อมูล ${affected.length} ช่องแล้ว`);
    }

    function cellPartSnapshot(ref) {
      const period = getPeriod(ref?.periodId);
      const item = getItem(period, ref?.itemId);
      if (!period || !item || !ref?.date) return null;
      if ((ref.part || "actual") === "plan") {
        return { part: "plan", plan: itemPlanValue(item, ref.date) };
      }
      return { part: "actual", actual: actualEntries(item, ref.date).map((row) => ({ ...row })) };
    }

    function canPasteActual(ref, rows) {
      return !rows.some((row) =>
        workerAssignedInfo(row.workerId, ref.date, { periodId: ref.periodId, itemId: ref.itemId, date: ref.date })
        || borrowedWorkerInfo(row.workerId, ref.date)
      );
    }

    function applyCellPartSnapshot(ref, snapshot) {
      const period = getPeriod(ref?.periodId);
      const item = getItem(period, ref?.itemId);
      if (!period || !item || !snapshot) return false;
      if ((ref.part || "actual") !== snapshot.part) return false;
      if (snapshot.part === "plan") {
        setPlan(item, ref.date, snapshot.plan || 0);
        return true;
      }
      if (!canPasteActual(ref, snapshot.actual || [])) return false;
      const data = ensurePlanItemData(item);
      if (snapshot.actual?.length) data.actual[ref.date] = snapshot.actual.map((row) => ({ ...row }));
      else delete data.actual[ref.date];
      return true;
    }

    function dateOffset(fromDate, toDate) {
      const dates = getDates();
      return dates.indexOf(toDate) - dates.indexOf(fromDate);
    }

    function dateAtOffset(date, offset) {
      const dates = getDates();
      const index = dates.indexOf(date);
      return index < 0 ? "" : dates[index + offset] || "";
    }

    function copySelectedCells() {
      const refs = selectedCellRefs();
      if (!refs.length) return showToast("เลือกช่องในตารางก่อน");
      const primary = state.ui.selectedCell || refs[0];
      const cells = refs.map((ref) => ({ offset: dateOffset(primary.date, ref.date), snapshot: cellPartSnapshot(ref) })).filter((row) => row.snapshot);
      if (!cells.length) return showToast("ไม่มีข้อมูลให้คัดลอก");
      appClipboard = { primary: { ...primary }, cells };
      showToast(`คัดลอก ${cells.length} ช่องแล้ว`);
    }

    function pasteCells() {
      if (!appClipboard?.cells?.length) return showToast("ยังไม่มีข้อมูลที่คัดลอกไว้");
      const targets = selectedCellRefs();
      if (!targets.length) return showToast("เลือกช่องปลายทางก่อน");
      const primary = state.ui.selectedCell || targets[0];
      const operations = [];
      if (appClipboard.cells.length === 1 && targets.length > 1) {
        const snapshot = appClipboard.cells[0].snapshot;
        targets.forEach((target) => operations.push({ ref: target, snapshot }));
      } else {
        appClipboard.cells.forEach((cell) => {
          const date = dateAtOffset(primary.date, cell.offset);
          if (!date) return;
          operations.push({ ref: { periodId: primary.periodId, itemId: primary.itemId, date, part: cell.snapshot.part }, snapshot: cell.snapshot });
        });
      }
      const valid = operations.filter(({ ref, snapshot }) => {
        const period = getPeriod(ref.periodId);
        const item = getItem(period, ref.itemId);
        if (!period || !item || (ref.part || "actual") !== snapshot.part) return false;
        if (snapshot.part === "actual" && !canPasteActual(ref, snapshot.actual || [])) return false;
        return true;
      });
      if (!valid.length) return showToast("วางไม่ได้ เพราะชนิดช่องไม่ตรงหรือคนงานซ้ำ");
      recordHistory("วางข้อมูลช่องงาน");
      valid.forEach(({ ref, snapshot }) => applyCellPartSnapshot(ref, snapshot));
      saveState();
      renderPlanPreservingScroll();
      showToast(`วางข้อมูล ${valid.length} ช่องแล้ว`);
    }

    function selectPlanCell(ref) {
      if (!ref) return;
      setSelectedCells([ref], ref);
    }

    function applySelectedCellHighlight() {
      const selected = selectedCellRefs();
      const selectedKeys = new Set(selected.map(cellKey));
      const primary = state.ui.selectedCell;
      $$('.date-btn[data-action="edit-cell"]').forEach((button) => {
        let buttonSelected = false;
        button.querySelectorAll("[data-cell-part]").forEach((partEl) => {
          const ref = cellRefsFromButton(button, partEl.dataset.cellPart);
          const match = selectedKeys.has(cellKey(ref));
          const isPrimary = cellMatches(ref, primary);
          partEl.classList.toggle("part-selected", match);
          partEl.classList.toggle("part-primary", isPrimary);
          buttonSelected = buttonSelected || match;
        });
        button.classList.toggle("selected", buttonSelected);
        button.setAttribute("aria-selected", buttonSelected ? "true" : "false");
      });
      const openButton = $("#openSelectedCellBtn");
      if (openButton) openButton.disabled = !primary;
      const clearButton = $("#clearSelectedCellsBtn");
      if (clearButton) {
        clearButton.disabled = !selected.length;
        clearButton.textContent = `ล้าง ${selected.length || ""} ช่อง`;
      }
    }

    function openSelectedCell() {
      const selected = state.ui.selectedCell;
      if (!selected) return showToast("เลือกช่องในตารางก่อน");
      return openCellEditor(selected.periodId, selected.itemId, selected.date);
    }

    function clearFillHighlight() {
      $$(".fill-source, .fill-range, .fill-target").forEach((element) => {
        element.classList.remove("fill-source", "fill-range", "fill-target");
      });
    }

    function highlightFillRange(source, target = source) {
      clearFillHighlight();
      if (!source || !target) return;
      const span = new Set(dateSpanBetween(source.date, target.date));
      $$('.date-btn[data-action="edit-cell"]').forEach((button) => {
        const partEl = button.querySelector(`[data-cell-part="${source.part || "actual"}"]`);
        const ref = cellRefsFromButton(button, source.part || "actual");
        if (!ref || ref.periodId !== source.periodId || ref.itemId !== source.itemId) return;
        if (!span.has(ref.date)) return;
        partEl?.classList.add("fill-range");
        if (ref.date === source.date) partEl?.classList.add("fill-source");
        if (ref.date === target.date && ref.date !== source.date) partEl?.classList.add("fill-target");
      });
    }

    function copyCellRange(source, target, mode = modeForCellRef(source)) {
      if (!source || !target) return;
      if (source.periodId !== target.periodId || source.itemId !== target.itemId) {
        showToast("ลากคัดลอกได้เฉพาะรายการเดียวกัน");
        return;
      }
      const period = getPeriod(source.periodId);
      const item = getItem(period, source.itemId);
      if (!period || !item) return;
      const targetDates = dateRangeBetween(source.date, target.date);
      if (!targetDates.length) return;
      const overwrites = targetDates.filter((date) => hasCellDataForMode(period, item, date, mode));
      if (overwrites.length && !confirm(`ปลายทางมีข้อมูล ${fillModeLabel(mode)} อยู่ ${overwrites.length} วัน ต้องการเขียนทับหรือไม่?`)) return;
      const parts = fillModeParts(mode);
      const sourcePlan = itemPlanValue(item, source.date);
      const sourceActual = actualEntries(item, source.date).map((row) => ({ ...row }));
      const usage = activeMachineUsage();
      const sourceMachines = (usage?.[period.building]?.[source.date] || []).map((row) => ({ ...row }));
      const conflicts = [];
      let copied = 0;
      recordHistory(`ลากคัดลอก ${fillModeLabel(mode)}`);
      targetDates.forEach((date) => {
        const blocked = parts.actual && sourceActual.find((row) =>
          workerAssignedInfo(row.workerId, date, { periodId: period.id, itemId: item.id, date })
          || borrowedWorkerInfo(row.workerId, date)
        );
        if (blocked) {
          conflicts.push(date);
          return;
        }
        if (parts.plan) setPlan(item, date, sourcePlan);
        if (parts.actual) {
          const data = ensurePlanItemData(item);
          if (sourceActual.length) data.actual[date] = sourceActual.map((row) => ({ ...row }));
          else delete data.actual[date];
        }
        if (parts.machine) {
          usage[period.building] = usage[period.building] || {};
          if (sourceMachines.length) {
            usage[period.building][date] = sourceMachines.map((row) => ({ ...row, id: uid("mu") }));
          } else {
            delete usage[period.building][date];
          }
        }
        copied++;
      });
      saveState();
      renderPlanPreservingScroll();
      if (conflicts.length) showToast(`เติม ${fillModeLabel(mode)} ${copied} วัน, ข้าม ${conflicts.length} วันเพราะคนงานซ้ำ`);
      else showToast(`เติม ${fillModeLabel(mode)} ${copied} วันแล้ว`);
    }

    function handlePointerDown(event) {
      const handle = event.target.closest(".fill-handle");
      const button = event.target.closest('button[data-action="edit-cell"]');
      if (!button) return;
      if (!handle) {
        if (event.button !== undefined && event.button !== 0) return;
        const source = cellRefsFromButton(button, cellPartFromEvent(button, event));
        if (!source) return;
        selectDrag = {
          source,
          target: source,
          pointerId: event.pointerId,
          moved: false,
          additive: event.ctrlKey || event.metaKey,
          base: selectedCellRefs()
        };
        try { button.setPointerCapture(event.pointerId); } catch (error) {}
        return;
      }
      const source = cellRefsFromButton(button, cellPartFromElement(handle));
      if (!source) return;
      suppressCellClick = true;
      fillDrag = { source, target: source, pointerId: event.pointerId };
      selectPlanCell(source);
      highlightFillRange(source);
      try { handle.setPointerCapture(event.pointerId); } catch (error) {}
      event.preventDefault();
      event.stopPropagation();
    }

    function handlePointerMove(event) {
      if (!fillDrag && !selectDrag) return;
      const element = document.elementFromPoint(event.clientX, event.clientY);
      const button = element?.closest?.('button[data-action="edit-cell"]');
      const target = cellRefsFromButton(button, selectDrag?.source?.part || fillDrag?.source?.part || cellPartFromElement(element));
      if (selectDrag) {
        if (target && sameCellRow(target, selectDrag.source)) {
          selectDrag.target = target;
          selectDrag.moved = selectDrag.moved || !cellMatches(target, selectDrag.source);
          const range = rangeRefsBetween(selectDrag.source, target);
          const refs = selectDrag.additive ? mergeCellRefs(selectDrag.base, range) : range;
          setSelectedCells(refs, target, false);
        }
        event.preventDefault();
        return;
      }
      if (target && target.periodId === fillDrag.source.periodId && target.itemId === fillDrag.source.itemId) {
        fillDrag.target = target;
        highlightFillRange(fillDrag.source, target);
      }
      event.preventDefault();
    }

    function handlePointerUp(event) {
      if (selectDrag) {
        const { moved } = selectDrag;
        selectDrag = null;
        if (moved) {
          saveState();
          suppressCellClick = true;
          setTimeout(() => { suppressCellClick = false; }, 0);
          event.preventDefault();
        }
        return;
      }
      if (!fillDrag) return;
      const { source, target } = fillDrag;
      fillDrag = null;
      clearFillHighlight();
      if (target && target.date !== source.date) copyCellRange(source, target);
      setTimeout(() => { suppressCellClick = false; }, 0);
      event.preventDefault();
    }

    function handleDoubleClick(event) {
      const button = event.target.closest('button[data-action="edit-cell"]');
      if (!button || event.target.closest(".fill-handle")) return;
      const ref = cellRefsFromButton(button, cellPartFromEvent(button, event));
      if (!ref) return;
      selectPlanCell(ref);
      openCellEditor(ref.periodId, ref.itemId, ref.date);
    }

    function renderAll() {
      renderNav();
      renderActiveTab();
    }

    function updateSetting(key, value) {
      if (["dayHours", "controlPercent"].includes(key)) state.settings[key] = n(value);
      else state.settings[key] = value;
      saveState();
      renderAll();
    }

    function syncPeriodInputs(period) {
      if (!period) return;
      const valueInput = $(`input[data-period-field="periodValue"][data-period-id="${period.id}"]`);
      const percentInput = $(`input[data-period-field="periodPercent"][data-period-id="${period.id}"]`);
      if (valueInput) valueInput.value = Number(n(period.periodValue).toFixed(2));
      if (percentInput) percentInput.value = Number(n(period.periodPercent).toFixed(2));
    }

    function syncNewPeriodInputs(changedId) {
      const mainValue = n($("#newPeriodMainValue")?.value);
      const valueInput = $("#newPeriodValue");
      const percentInput = $("#newPeriodPercent");
      if (!mainValue || !valueInput || !percentInput) return;
      if (changedId === "newPeriodPercent") {
        valueInput.value = Number((mainValue * n(percentInput.value) / 100).toFixed(2));
      } else if (changedId === "newPeriodValue") {
        percentInput.value = Number((n(valueInput.value) / mainValue * 100).toFixed(2));
      } else if (changedId === "newPeriodMainValue") {
        if (percentInput.value) valueInput.value = Number((mainValue * n(percentInput.value) / 100).toFixed(2));
        else if (valueInput.value) percentInput.value = Number((n(valueInput.value) / mainValue * 100).toFixed(2));
      }
    }

    function syncNewMainValueFromExisting() {
      const building = $("#newPeriodBuilding")?.value;
      const mainNo = ($("#newPeriodMainNo")?.value.trim() || mainNoFromNo($("#newPeriodNo")?.value)).trim();
      const mainValueInput = $("#newPeriodMainValue");
      if (!building || !mainNo || !mainValueInput || mainValueInput.value) return;
      const existing = state.periods.find((period) => period.building === building && periodMainNo(period) === mainNo);
      if (existing?.mainValue) {
        mainValueInput.value = Number(n(existing.mainValue).toFixed(2));
        syncNewPeriodInputs("newPeriodMainValue");
      }
    }

    function applyNewPeriodTemplate(force = false) {
      const building = $("#newPeriodBuilding")?.value.trim();
      const mainNo = $("#newPeriodMainNo")?.value.trim();
      const template = findPeriodTemplate(building, mainNo);
      if (!template) return false;
      const valueInput = $("#newPeriodMainValue");
      const descInput = $("#newPeriodDescription");
      if (valueInput && (force || !valueInput.value)) valueInput.value = template.value ? Number(n(template.value).toFixed(2)) : "";
      if (descInput && (force || !descInput.value.trim())) descInput.value = template.description || "";
      syncNewPeriodInputs("newPeriodMainValue");
      return true;
    }

    function currentNewPeriodDraft() {
      return {
        building: $("#newPeriodBuilding")?.value.trim() || "",
        mainNo: $("#newPeriodMainNo")?.value.trim() || "",
        customTitle: $("#newPeriodTitle")?.value.trim() || "",
        mainValue: $("#newPeriodMainValue")?.value || "",
        no: $("#newPeriodNo")?.value.trim() || "",
        periodValue: $("#newPeriodValue")?.value || "",
        periodPercent: $("#newPeriodPercent")?.value || "",
        status: $("#newPeriodStatus")?.value || "รอทำ",
        description: $("#newPeriodDescription")?.value || "",
        useSubPeriod: $(".sub-period-disclosure")?.open || false
      };
    }

    function updatePeriodField(target) {
      const period = getPeriod(target.dataset.periodId);
      if (!period) return false;
      const field = target.dataset.periodField;
      let updated = true;
      if (field === "mainNo") {
        period.mainNo = target.value.trim() || mainNoFromNo(period.no);
      } else if (field === "building") {
        period.building = target.value.trim();
        if (period.building && !state.buildings.includes(period.building)) state.buildings.push(period.building);
        if (state.buildings.some(Boolean)) state.buildings = state.buildings.filter(Boolean);
      } else if (field === "mainValue") {
        updated = setPeriodMainValue(period, target.value);
        syncPeriodInputs(period);
      } else if (field === "periodValue") {
        updated = setPeriodValue(period, target.value);
        syncPeriodInputs(period);
      } else if (field === "periodPercent") {
        updated = setPeriodPercent(period, target.value);
        syncPeriodInputs(period);
      } else if (field === "no") {
        const previousMainFromNo = mainNoFromNo(period.no);
        period.no = target.value.trim();
        if (!period.mainNo || period.mainNo === previousMainFromNo) period.mainNo = mainNoFromNo(target.value);
        period.title = periodDisplayTitle(period);
      } else {
        period[field] = target.value;
      }
      if (updated === false) {
        syncPeriodInputs(period);
        return false;
      }
      saveState();
      renderNav();
      return true;
    }

    function scrollPageTop() {
      const reset = () => {
        const rootBehavior = document.documentElement.style.scrollBehavior;
        const bodyBehavior = document.body.style.scrollBehavior;
        document.documentElement.style.scrollBehavior = "auto";
        document.body.style.scrollBehavior = "auto";
        document.documentElement.scrollTop = 0;
        document.body.scrollTop = 0;
        window.scrollTo({ top: 0, left: 0, behavior: "auto" });
        document.documentElement.style.scrollBehavior = rootBehavior;
        document.body.style.scrollBehavior = bodyBehavior;
      };
      reset();
      requestAnimationFrame(reset);
      setTimeout(reset, 40);

    function splitDialogContext() {
      if (!splitDraft?.periodId) return null;
      const period = getPeriod(splitDraft.periodId);
      if (!period) return null;
      const rows = fullMainGroup(period);
      const mainNo = periodMainNo(period);
      const mainValue = n(period.mainValue) || n(period.periodValue);
      const firstSplit = rows.length === 1 && String(period.no) === mainNo;
      return { period, rows, mainNo, mainValue, firstSplit };
    }

    function splitModeDefaultNo(period, mode) {
      if (mode === "child") return nextChildPeriodNo(period);
      return nextSubPeriodNo(period);
    }

    function splitDialogData() {
      const ctx = splitDialogContext();
      if (!ctx) return { ok: false, message: "ไม่พบงวดงานที่ต้องการซอย" };
      const { period, mainNo, mainValue, firstSplit } = ctx;
      if (!mainValue) return { ok: false, message: "กรอกมูลค่างวดหลักก่อนซอยงวด" };
      const amount = splitAmountValue(mainValue);
      if (firstSplit) {
        const firstNo = `${mainNo}.1`;
        const secondNo = `${mainNo}.2`;
        if (!(amount > 0) || amount >= mainValue) return { ok: false, ctx, message: "มูลค่างวดแรกต้องมากกว่า 0 และน้อยกว่ามูลค่างวดหลัก" };
        const duplicate = state.periods.some((row) => row.id !== period.id && row.building === period.building && [firstNo, secondNo].includes(String(row.no)));
        if (duplicate) return { ok: false, ctx, message: `มีงวด ${firstNo} หรือ ${secondNo} อยู่แล้ว` };
        return {
          ok: true,
          ctx,
          firstNo,
          secondNo,
          firstValue: amount,
          secondValue: mainValue - amount,
          sourceAfter: amount,
          newNo: secondNo,
          newValue: mainValue - amount
        };
      }
      const sourceValue = n(period.periodValue);
      const cleanNo = String(splitDraft.newNo || "").trim();
      if (!(amount > 0) || amount >= sourceValue) return { ok: false, ctx, message: "มูลค่าที่ซอยออกต้องมากกว่า 0 และน้อยกว่ามูลค่างวดต้นทาง" };
      if (!cleanNo) return { ok: false, ctx, message: "กรอกเลขงวดใหม่ก่อน" };
      if (state.periods.some((row) => row.building === period.building && String(row.no) === cleanNo)) return { ok: false, ctx, message: `มีงวด ${cleanNo} อยู่แล้ว` };
      return {
        ok: true,
        ctx,
        sourceAfter: sourceValue - amount,
        newNo: cleanNo,
        newValue: amount
      };
    }

    function openSplitDialog(id) {
      const period = getPeriod(id);

      const defaultValue = firstSplit ? mainValue / 2 : 0;

        periodId: id,
        amountValue: firstSplit ? formatSplitInput(defaultValue) : "",

    function updateSplitDraftField(target) {
      if (!splitDraft) return;
      const field = target.dataset.splitField;
      splitDraft[field] = target.value;
      const ctx = splitDialogContext();
      if (ctx && field === "amountValue") {
        const amount = parseSplitNumber(target.value);
        const percent = ctx.mainValue ? amount / ctx.mainValue * 100 : 0;
        splitDraft.amountPercent = formatSplitInput(percent, 2);
        const percentInput = $("#splitPercentInput");
        if (percentInput) percentInput.value = splitDraft.amountPercent;
      }
      if (ctx && field === "amountPercent") {
        const percent = parseSplitNumber(target.value);
        const amount = ctx.mainValue * percent / 100;
        splitDraft.amountValue = formatSplitInput(amount, 0);
        const valueInput = $("#splitValueInput");
        if (valueInput) valueInput.value = splitDraft.amountValue;
      }
      if (field === "newNo") splitDraft.mode = "custom";
      renderSplitPreview();
    }

    function applySplitDialog() {
      const result = splitDialogData();
      if (!result.ok) {
        renderSplitPreview();
        return showToast(result.message);
      }
      const { period, mainNo, mainValue, firstSplit } = result.ctx;
      if (firstSplit) {
        const sourceEnabled = periodEnabled(period);
        recordHistory("ซอยงวดงานครั้งแรก");
        period.no = `${mainNo}.1`;
        period.title = periodDisplayTitle(period);
        period.customTitle = periodUserTitle(period);
        addPeriodValueHistory(period, "periodValue", period.periodValue, result.firstValue, `ซอยงวดเป็น ${result.firstNo}`);
        period.mainValue = mainValue;
        period.periodValue = result.firstValue;
        updatePeriodPercent(period);
        const newPeriod = {
          id: uid("p"),
          building: period.building,
          mainNo,
          mainValue,
          no: result.secondNo,
          title: periodDisplayTitle({ no: result.secondNo }),
          customTitle: "",
          description: "",
          status: "รอทำ",
          periodValue: result.secondValue,
          periodPercent: mainValue ? result.secondValue / mainValue * 100 : 0,
          enabled: true,
          items: []
        };
        state.periods.push(newPeriod);
        if (sourceEnabled) setPeriodEnabled(newPeriod.id, true);
        state.ui.editingPeriodId = period.id;

        saveState();

        renderPeriods();
        scrollPageTop();
        showToast(`ซอยงวด ${mainNo} เป็น ${result.firstNo} และ ${result.secondNo} แล้ว`);

      recordHistory("ซอยงวดงานเพิ่มเติม");

      updatePeriodPercent(period);
      const newPeriod = {
        id: uid("p"),
        building: period.building,
        mainNo,
        mainValue,

        title: periodDisplayTitle({ no: result.newNo }),
        customTitle: "",
        status: "รอทำ",
        description: "",
        periodValue: result.newValue,
        periodPercent: mainValue ? result.newValue / mainValue * 100 : 0,

        items: []
      };
      state.periods.push(newPeriod);
      if (sourceEnabled) setPeriodEnabled(newPeriod.id, true);
      state.ui.editingPeriodId = period.id;
      state.ui.editingMainPeriodKey = "";
      state.ui.newPeriodDraft = null;
      saveState();
      closeSplitDialog();
      renderPeriods();
      scrollPageTop();
      showToast(`ซอยงวด ${period.no} ออกเป็น ${result.newNo} แล้ว`);
    }

    function mergePeriodGroup(key) {
      const [building, mainNo] = String(key || "").split("|");
      const rows = mainGroupByKey(building, mainNo);
      if (!rows.length) return;
      const hasSubs = hasSubPeriods(rows);
      if (!hasSubs) return showToast("งวดนี้ยังไม่ได้ซอย");
      if (rows.length > 1 && !confirm(`รวมงวดย่อย ${rows.length} งวดกลับเป็นงวดหลัก ${mainNo}? ข้อมูลรายวันและรายการงานจะถูกรวมไว้ในงวดหลัก`)) return;
      recordHistory("รวมกลับเป็นงวดหลัก");
      const mainValue = rows.reduce((best, row) => Math.max(best, n(row.mainValue)), n(rows[0].mainValue)) || rows.reduce((sum, row) => sum + n(row.periodValue), 0);
      const base = rows[0];
      const ids = new Set(rows.map((row) => row.id));
      const mergedItems = [];
      rows.forEach((row) => {
        (row.items || []).forEach((item) => {
          if (!mergedItems.some((existing) => existing.id === item.id)) mergedItems.push(item);
        });
      });
      addPeriodValueHistory(base, "periodValue", base.periodValue, mainValue, `รวมกลับเป็นงวด ${mainNo}`);
      base.no = mainNo;
      base.mainNo = mainNo;
      base.mainValue = mainValue;
      base.periodValue = mainValue;
      base.periodPercent = 100;
      base.title = periodDisplayTitle(base);
      base.items = mergedItems;
      state.periods = state.periods.filter((row) => row.id === base.id || !ids.has(row.id));
      state.workPlans.forEach((plan) => {
        const selected = (plan.periodIds || []).some((id) => ids.has(id));
        const nextIds = (plan.periodIds || []).filter((id) => !ids.has(id));
        if (selected && !nextIds.includes(base.id)) nextIds.push(base.id);
        plan.periodIds = nextIds;
      });
      state.ui.editingPeriodId = base.id;
      state.ui.editingMainPeriodKey = "";
      state.ui.newPeriodDraft = null;
      saveState();
      renderPeriods();
      scrollPageTop();
      showToast(`รวมกลับเป็นงวด ${mainNo} แล้ว`);
    }

    function handleClick(event) {
      const button = event.target.closest("button");
      if (!button) {
        if (event.target.closest("input, select, textarea, label, a")) return;
        const mainRow = event.target.closest("[data-period-main-row]");
        if (mainRow) return openPeriodMain(mainRow.dataset.periodMainRow);
        const row = event.target.closest("[data-period-row]");
        if (row) return openPeriodEditor(row.dataset.periodRow);
        return;
      }
      const tab = button.dataset.tab;
      if (tab) return setActiveTab(tab);
      if (button.dataset.planView) {
        state.ui.planView = button.dataset.planView;
        saveState();
        return renderPlan();
      }
      if (button.dataset.attendanceView) {
        state.ui.attendanceView = button.dataset.attendanceView;
        saveState();
        return renderAttendance();
      }
      const action = button.dataset.action;
      if (!action) return;

      if (action === "open-report") return setActiveTab("report");
      if (action === "open-selected-cell") return openSelectedCell();
      if (action === "clear-selected-cells") return clearSelectedCells();
      if (action === "undo") return undo();
      if (action === "redo") return redo();
      if (action === "go-today") return goToToday();
      if (action === "add-work-plan") return addWorkPlan();
      if (action === "set-update-today") return setUpdateDateToday();
      if (action === "open-claim-dialog") return openClaimDialog();
      if (action === "delete-work-plan") return deleteWorkPlan();
      if (action === "complete-work-plan") return completeWorkPlan();
      if (action === "edit-cell") {
        if (suppressCellClick || event.target.closest(".fill-handle")) {
          suppressCellClick = false;
          return;
        }
        const ref = cellRefsFromButton(button, cellPartFromEvent(button, event));
        if (event.shiftKey && state.ui.selectedCell && sameCellRow(state.ui.selectedCell, ref)) {
          return setSelectedCells(rangeRefsBetween(state.ui.selectedCell, ref), ref);
        }
        if (event.ctrlKey || event.metaKey) return toggleSelectedCell(ref);
        return selectPlanCell(ref);
