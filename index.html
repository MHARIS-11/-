<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TMAN WorkPlan</title>
  <style>
    :root {
      --bg: oklch(1 0 0);
      --surface: oklch(0.982 0.004 160);
      --surface-2: oklch(0.955 0.007 160);
      --ink: oklch(0.18 0.018 160);
      --muted: oklch(0.43 0.018 160);
      --line: oklch(0.86 0.008 160);
      --line-strong: oklch(0.58 0.018 160);
      --primary: oklch(0.35 0.077 160);
      --primary-2: oklch(0.45 0.088 160);
      --primary-soft: oklch(0.92 0.034 160);
      --actual: oklch(0.63 0.215 28);
      --actual-soft: oklch(0.92 0.07 28);
      --warning: oklch(0.78 0.145 82);
      --purple: oklch(0.68 0.11 305);
      --success-soft: oklch(0.88 0.075 142);
      --info-soft: oklch(0.88 0.055 235);
      --borrow-soft: oklch(0.9 0.055 235);
      --borrow: oklch(0.47 0.105 235);
      --holiday: oklch(0.78 0 0);
      --holiday-dark: oklch(0.27 0 0);
      --danger: oklch(0.53 0.18 28);
      --shadow: 0 8px 18px oklch(0.16 0.02 160 / 0.08);
      --radius: 8px;
      --nav-width: 224px;
      font-family: Tahoma, "Noto Sans Thai", "Leelawadee UI", system-ui, sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-size: 14px;
      line-height: 1.45;
    }
    button, input, select, textarea {
      font: inherit;
      color: inherit;
    }
    button {
      border: 1px solid var(--line);
      background: var(--bg);
      border-radius: 7px;
      min-height: 36px;
      padding: 8px 12px;
      cursor: pointer;
    }
    button:hover { border-color: var(--primary-2); }
    button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
      outline: 3px solid oklch(0.75 0.1 160 / 0.45);
      outline-offset: 2px;
    }
    .primary {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
      font-weight: 700;
    }
    .danger {
      border-color: oklch(0.78 0.11 28);
      color: var(--danger);
      background: oklch(0.98 0.018 28);
    }
    .ghost {
      background: transparent;
      border-color: transparent;
      color: var(--muted);
    }
    .ghost:hover {
      background: var(--info-soft);
      border-color: var(--line);
      color: var(--ink);
    }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--bg);
      padding: 8px 10px;
      min-height: 36px;
    }
    textarea { min-height: 76px; resize: vertical; }
    label {
      display: grid;
      gap: 5px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }
    label span { color: var(--muted); }
    h1, h2, h3 {
      margin: 0;
      text-wrap: balance;
      line-height: 1.22;
      letter-spacing: 0;
    }
    h1 { font-size: 22px; }
    h2 { font-size: 18px; }
    h3 { font-size: 15px; }
    p { margin: 0; }
    .app {
      display: grid;
      grid-template-columns: var(--nav-width) minmax(0, 1fr);
      min-height: 100vh;
    }
    .sidebar {
      border-right: 1px solid var(--line);
      background: var(--surface);
      padding: 16px 12px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 8px 14px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 12px;
    }
    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--primary);
      color: white;
      font-weight: 800;
      letter-spacing: 0;
    }
    .brand small {
      color: var(--muted);
      font-weight: 700;
    }
    .nav {
      display: grid;
      gap: 4px;
    }
    .nav button {
      justify-content: flex-start;
      display: flex;
      align-items: center;
      gap: 9px;
      border-color: transparent;
      background: transparent;
      color: var(--muted);
      text-align: left;
      font-weight: 700;
    }
    .nav button[aria-selected="true"] {
      background: var(--primary-soft);
      color: var(--primary);
      border-color: oklch(0.82 0.05 160);
    }
    .main {
      min-width: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: oklch(1 0 0 / 0.96);
      border-bottom: 1px solid var(--line);
      padding: 12px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      backdrop-filter: blur(10px);
    }
    .topbar .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .mobile-tabs {
      display: none;
      width: 100%;
    }
    .content {
      padding: 18px;
      min-width: 0;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: grid; gap: 16px; }
    .section {
      display: grid;
      gap: 12px;
      min-width: 0;
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--bg);
      min-width: 0;
    }
    .panel-head {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .panel-body { padding: 14px; }
    .split {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 12px;
      min-width: 0;
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
      align-items: end;
      min-width: 0;
    }
    .form-grid > *,
    .split > * {
      min-width: 0;
    }
    .metric-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 10px;
    }
    .metric {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      background: var(--surface);
    }
    .metric strong {
      display: block;
      font-size: 21px;
      line-height: 1.15;
      margin-top: 4px;
    }
    .metric span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .segmented {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--surface);
    }
    .segmented button {
      border: 0;
      border-radius: 0;
      background: transparent;
      min-height: 34px;
    }
    .segmented button[aria-pressed="true"] {
      background: var(--primary);
      color: white;
      font-weight: 800;
    }
    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--bg);
      max-width: 100%;
      min-width: 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 7px 8px;
      vertical-align: middle;
      text-align: left;
    }
    th {
      background: var(--surface-2);
      color: var(--muted);
      font-weight: 800;
      white-space: nowrap;
    }
    tr:last-child td { border-bottom: 0; }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .muted { color: var(--muted); }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border-radius: 999px;
      padding: 3px 8px;
      background: var(--surface-2);
      border: 1px solid var(--line);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }
    .pill.red {
      background: var(--actual);
      border-color: var(--actual);
      color: white;
    }
    .pill.danger {
      background: var(--danger);
      border-color: var(--danger);
      color: white;
    }
    .pill.green {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }
    .pill.amber {
      background: oklch(0.92 0.09 82);
      border-color: oklch(0.82 0.13 82);
      color: oklch(0.28 0.055 82);
    }
    .dashboard-shell {
      display: grid;
      gap: 14px;
    }
    .dashboard-hero {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(135deg, oklch(0.965 0.018 160), oklch(0.99 0.004 160));
      padding: 16px;
      display: grid;
      gap: 14px;
    }
    .dashboard-hero-main {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .dashboard-hero h2 {
      font-size: 20px;
    }
    .dashboard-kpis {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 8px;
    }
    .dashboard-kpi {
      border: 1px solid oklch(0.84 0.017 160);
      border-radius: var(--radius);
      background: oklch(1 0 0 / 0.78);
      padding: 10px;
    }
    .dashboard-kpi span,
    .dashboard-card span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }
    .dashboard-kpi strong {
      display: block;
      margin-top: 4px;
      font-size: 22px;
      line-height: 1.1;
      font-variant-numeric: tabular-nums;
    }
    .dashboard-kpi.danger {
      border-color: oklch(0.78 0.12 28);
      background: oklch(0.97 0.035 28);
    }
    .dashboard-grid {
      display: grid;
      grid-template-columns: minmax(260px, 0.9fr) minmax(360px, 1.5fr);
      gap: 12px;
      align-items: stretch;
    }
    .dashboard-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--bg);
      padding: 14px;
      display: grid;
      gap: 12px;
      align-content: start;
    }
    .ring {
      width: 164px;
      aspect-ratio: 1;
      border-radius: 50%;
      display: grid;
      place-items: center;
      margin-inline: auto;
      background:
        radial-gradient(circle at center, white 0 56%, transparent 57%),
        conic-gradient(var(--primary) calc(var(--pct) * 1%), var(--surface-2) 0);
      border: 1px solid var(--line);
    }
    .ring strong {
      font-size: 28px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .ring span { text-align: center; }
    .comparison-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }
    .comparison-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px;
      background: var(--surface);
      display: grid;
      gap: 16px;
    }
    .comparison-card header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .comparison-card h3 {
      font-size: 22px;
      line-height: 1.1;
    }
    .comparison-card strong {
      font-size: 20px;
      font-variant-numeric: tabular-nums;
    }
    .labor-budget-wrap {
      padding-top: 8px;
      display: grid;
      gap: 10px;
    }
    .labor-budget {
      height: 42px;
      border-radius: 999px;
      position: relative;
      overflow: visible;
      background: var(--info-soft);
      border: 1px solid var(--line);
      box-shadow: inset 0 1px 3px oklch(0.2 0.02 160 / 0.12);
    }
    .labor-budget-fill {
      display: block;
      height: 100%;
      width: min(100%, calc(var(--used) * 1%));
      border-radius: inherit;
      background: var(--primary);
    }
    .labor-budget.warning .labor-budget-fill { background: var(--warning); }
    .labor-budget.danger .labor-budget-fill { background: var(--actual); }
    .comparison-card .labor-budget-percent {
      position: absolute;
      z-index: 3;
      left: max(34px, calc(var(--used) * 0.5%));
      top: 50%;
      transform: translate(-50%, -50%);
      display: inline-grid;
      place-items: center;
      color: white;
      font-size: 18px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 1px 2px oklch(0.16 0.02 160 / 0.45);
      pointer-events: none;
    }
    .labor-budget-control {
      position: absolute;
      z-index: 2;
      left: min(100%, calc(var(--control) * 1%));
      top: -14px;
      bottom: -10px;
      border-left: 2px dashed oklch(0.55 0.16 55);
      pointer-events: none;
    }
    .labor-budget-control em {
      position: absolute;
      top: calc(100% + 7px);
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-style: normal;
      font-size: 12px;
      font-weight: 900;
      color: oklch(0.55 0.16 55);
      background: transparent;
      border: 0;
      padding: 0;
    }
    .comparison-readout {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: oklch(0.99 0.003 160);
      padding: 9px 10px;
      margin-top: 24px;
      text-align: center;
      font-weight: 900;
      font-size: 14px;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .comparison-readout strong {
      font-size: 16px;
      color: var(--primary);
    }
    .comparison-metrics {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--bg);
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
    }
    .comparison-metrics > div {
      padding: 14px 16px;
      min-height: 86px;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }
    .comparison-metrics > div:nth-child(2n) { border-right: 0; }
    .comparison-metrics > div:nth-last-child(-n + 2) { border-bottom: 0; }
    .comparison-metrics span {
      display: block;
      color: var(--ink);
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 6px;
    }
    .comparison-metrics .metric-nowrap {
      white-space: nowrap;
      font-size: 13px;
    }
    .comparison-metrics strong {
      color: var(--primary);
      font-size: 26px;
      line-height: 1.05;
    }
    .comparison-metrics strong.danger-text {
      color: var(--danger);
    }
    .comparison-legend {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: auto auto auto minmax(0, 1fr);
      gap: 18px;
      align-items: center;
      padding: 12px 16px;
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--line);
      color: var(--muted);
      font-weight: 800;
    }
    .comparison-legend .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }
    .legend-swatch {
      width: 28px;
      height: 18px;
      border-radius: 5px;
      background: var(--primary);
      display: inline-block;
    }
    .legend-line {
      width: 34px;
      height: 0;
      border-top: 2px dashed oklch(0.55 0.16 55);
      display: inline-block;
    }
    .legend-empty {
      width: 28px;
      height: 18px;
      border-radius: 5px;
      background: var(--info-soft);
      border: 1px solid var(--line);
      display: inline-block;
    }
    .legend-note {
      justify-self: end;
      text-align: right;
    }
    .budget-bar,
    .cost-stack {
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: var(--surface-2);
      border: 1px solid var(--line);
    }
    .budget-bar span,
    .cost-stack span {
      display: block;
      height: 100%;
      width: min(100%, calc(var(--pct) * 1%));
      background: var(--primary);
    }
    .budget-bar.warning span { background: var(--warning); }
    .budget-bar.danger span { background: var(--actual); }
    .cost-stack {
      display: flex;
    }
    .cost-stack span { width: calc(var(--pct) * 1%); min-width: 0; }
    .cost-stack .labor { background: var(--actual); }
    .cost-stack .machine { background: oklch(0.62 0.12 235); }
    .cost-stack .manual { background: var(--warning); }
    .top-list {
      display: grid;
      gap: 8px;
    }
    .top-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      border-bottom: 1px solid var(--line);
      padding-bottom: 8px;
    }
    .top-row:last-child { border-bottom: 0; padding-bottom: 0; }
    .top-row strong {
      overflow-wrap: anywhere;
    }
    .period-overview th,
    .period-overview td {
      white-space: nowrap;
    }
    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--primary);
      display: inline-block;
      margin-right: 6px;
    }
    .status-dot.warning { background: var(--warning); }
    .status-dot.danger { background: var(--actual); }
    .plan-shell {
      display: grid;
      gap: 12px;
    }
    .claim-update {
      margin-top: 4px;
      color: var(--primary);
      font-weight: 900;
    }
    .claim-history {
      grid-column: 1 / -1;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 8px 10px;
    }
    .claim-history summary {
      cursor: pointer;
      font-weight: 900;
      color: var(--primary);
    }
    .claim-history ul {
      margin: 8px 0 0;
      padding-left: 18px;
      color: var(--muted);
      font-size: 12px;
    }
    .plan-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .plan-toolbar-left {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .icon-button {
      width: 38px;
      min-width: 38px;
      padding-inline: 0;
      font-size: 20px;
      line-height: 1;
      font-weight: 900;
    }
    .quick-entry {
      border: 1px solid oklch(0.82 0.05 160);
      border-radius: var(--radius);
      background: var(--primary-soft);
      overflow: hidden;
    }
    .quick-entry .panel-head {
      background: oklch(0.96 0.02 160);
    }
    .quick-entry .panel-body {
      display: grid;
      gap: 12px;
    }
    .quick-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .quick-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 8px;
    }
    .quick-summary .metric {
      background: var(--bg);
      padding: 10px;
    }
    .quick-summary .metric strong {
      font-size: 18px;
    }
    .scroll-hint {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .plan-grid {
      max-height: calc(100vh - 230px);
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--bg);
    }
    .work-table {
      min-width: 3700px;
      border-collapse: separate;
      border-spacing: 0;
      table-layout: fixed;
    }
    .work-table th, .work-table td {
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 0;
      text-align: center;
    }
    .work-table thead th {
      position: sticky;
      top: 0;
      z-index: 7;
      height: 30px;
      background: var(--surface-2);
    }
    .work-table .sticky {
      position: sticky;
      left: 0;
      z-index: 8;
      background: var(--bg);
      text-align: left;
      padding: 6px 8px;
    }
    .work-table thead .sticky { z-index: 10; background: var(--surface-2); }
    .work-table .col-building { width: 70px; left: 0; }
    .work-table .col-period { width: 96px; left: 70px; }
    .work-table .col-item { width: 210px; left: 166px; }
    .work-table .col-value { width: 112px; left: 376px; text-align: right; }
    .work-table .date-cell { width: 46px; min-width: 46px; }
    .work-table .month-cell { height: 24px; font-size: 11px; text-align: center; }
    .work-table .day-cell { height: 26px; font-size: 11px; }
    .work-table .building-row td {
      background: oklch(0.985 0.025 28);
      color: var(--danger);
      font-weight: 900;
      height: 28px;
    }
    .work-table .period-row td {
      background: var(--surface);
      font-weight: 800;
      height: 28px;
    }
    .work-table .date-btn {
      display: grid;
      grid-template-rows: 1fr 1.5fr;
      gap: 1px;
      width: 100%;
      min-height: 48px;
      border: 0;
      border-radius: 0;
      padding: 2px;
      background: white;
      font-size: 10.5px;
      line-height: 1;
      position: relative;
      touch-action: manipulation;
    }
    .work-table .date-btn:hover { outline: 2px solid var(--primary-2); outline-offset: -2px; }
    .work-table .date-btn.selected {

      .split-dialog[open] {
        animation: split-dialog-in 160ms cubic-bezier(0.16, 1, 0.3, 1);
      }
      @keyframes split-dialog-in {
        from { opacity: 0; transform: translate(-50%, -50%); }
        to { opacity: 1; transform: translate(-50%, -50%); }
      }
    }
    .notice {
      border: 1px solid oklch(0.82 0.13 82);
      background: oklch(0.96 0.055 82);
      color: oklch(0.31 0.07 82);

    .error {
      border: 1px solid oklch(0.78 0.12 28);

    }
    .report-stage {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-2);
      padding: 12px;
      max-height: calc(100vh - 260px);
    }
    #reportCanvas {
      max-width: 100%;
      height: auto;

    .backup-box textarea {
      min-height: 180px;

    .toast {
      position: fixed;

    }
    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .topbar { display: grid; align-items: stretch; }
      .mobile-tabs { display: block; }
      .content { padding: 12px; }
      .dashboard-grid { grid-template-columns: 1fr; }
      .dashboard-hero { padding: 12px; }

      .work-table .date-cell { width: 46px; min-width: 46px; }
      .fill-handle {
        width: 18px;
        height: 18px;
        right: -7px;
        bottom: -7px;
      }
    }
    @media (max-width: 560px) {
      .topbar { padding: 10px 12px; }
      .split, .metric-grid { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
      .period-filter-row,
      .new-period-primary,
      .sub-period-fields {
        grid-template-columns: 1fr;
      }
      .period-toolbar-grid { grid-template-columns: 1fr; }
      .period-dense-summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .period-dense-summary .metric { border-bottom: 1px solid var(--line); }
      .period-edit-layout { grid-template-columns: 1fr; }
      h1 { font-size: 18px; }
      .panel-head { align-items: stretch; }
      .attendance-toolbar,
      .attendance-toolbar .inline-list {
        align-items: stretch;
        width: 100%;

        min-width: 100%;
      }
      .segmented { width: 100%; }
      .segmented button { flex: 1; padding-inline: 8px; }
    }
    @media (prefers-reduced-motion: reduce) {
      * { scroll-behavior: auto !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">

  <dialog id="claimDialog">
    <form method="dialog">
      <div class="dialog-head">

    <div class="dialog-body">

      <label><span>เหตุผลที่เลื่อน</span><textarea id="claimReasonInput" placeholder="เช่น งานล่าช้า รอวัสดุ รออนุมัติ"></textarea></label>
      <div id="claimHistoryPreview" class="muted"></div>
    </div>
    <div class="dialog-actions">
      <button class="ghost" value="cancel" onclick="document.getElementById('claimDialog').close()">ยกเลิก</button>
      <button id="saveClaimBtn" class="primary">บันทึกวันเบิกงวด</button>
    </div>
  </dialog>

  <dialog id="splitDialog" class="split-dialog" aria-labelledby="splitDialogTitle">
    <div class="dialog-head">
      <div>
        <h2 id="splitDialogTitle">ซอยงวดงาน</h2>
        <p class="muted" id="splitDialogMeta"></p>
      </div>
      <button type="button" class="ghost" data-action="close-split-dialog" aria-label="ปิด">ปิด</button>
    </div>
    <div class="dialog-body" id="splitDialogBody"></div>
    <div class="dialog-actions">
      <button type="button" class="ghost" data-action="close-split-dialog">ยกเลิก</button>
      <button type="button" id="saveSplitBtn" class="primary" data-action="save-split-dialog">ซอยงวดงาน</button>
    </div>

  <dialog id="accumDialog" class="split-dialog" aria-labelledby="accumDialogTitle">
    <div class="dialog-head">
      <div>
        <h2 id="accumDialogTitle">ตั้งค่ายอดสะสม</h2>
        <p class="muted" id="accumDialogMeta"></p>
      </div>
      <button type="button" class="ghost" data-action="close-accum-dialog" aria-label="ปิด">ปิด</button>
    </div>
    <div class="dialog-body" id="accumDialogBody"></div>
    <div class="dialog-actions">
      <button type="button" class="ghost" data-action="close-accum-dialog">ยกเลิก</button>
      <button type="button" id="saveAccumBtn" class="primary" data-action="save-accum-dialog">บันทึกยอดตั้งต้น</button>
    </div>
  </dialog>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const STORAGE_KEY = "tman.workplan.v1";
    const tabs = [
      ["dashboard", "สรุปโครงการ"],
      ["plan", "แผนงวดงาน"],
      ["periods", "งวดงานทั้งหมด"],
      ["periodData", "ข้อมูลงวดงาน"],
      ["attendance", "วันมาทำงาน"],
      ["borrow", "ยืมคนงาน"],
      ["workers", "คนงาน"],
      ["machines", "เครื่องจักร"],
      ["holidays", "วันหยุดบริษัท"],
      ["report", "รายงาน / Export"],
      ["backup", "สำรองข้อมูล"]
    ];

    const $ = (selector, root = document) => root.querySelector(selector);
    const $$ = (selector, root = document) => [...root.querySelectorAll(selector)];
    const uid = (prefix) => `${prefix}_${Math.random().toString(36).slice(2, 9)}`;
    const isoToday = () => {
      const now = new Date();
      const local = new Date(now.getTime() - now.getTimezoneOffset() * 60000);
      return local.toISOString().slice(0, 10);
    };
    const money = (value, digits = 0) => Number(value || 0).toLocaleString("th-TH", { maximumFractionDigits: digits, minimumFractionDigits: digits });
    const qty = (value) => {
      const num = Number(value || 0);
      if (!num) return "";
      return num.toLocaleString("th-TH", { maximumFractionDigits: Number.isInteger(num) ? 0 : 2 });
    };
    const pct = (value) => `${(Number(value || 0) * 100).toLocaleString("th-TH", { maximumFractionDigits: 2 })}%`;
    const n = (value) => Number(value || 0);
    const esc = (value) => String(value ?? "").replace(/[&<>"']/g, (ch) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));

    let activeTab = "dashboard";
    let state = null;
    let cellDraft = null;
    let splitDraft = null;
    let fillDrag = null;
    let selectDrag = null;
    let undoStack = [];
    let redoStack = [];
    let appClipboard = null;
    let suppressCellClick = false;
    let toastTimer = null;

    function makePlan() { return {}; }
    function makeActual() { return {}; }
    function setPlan(item, date, value) {
      const bucket = activeWorkPlan() ? ensurePlanItemData(item) : item;
      bucket.plan = bucket.plan || {};
      const amount = Math.max(0, Math.round(Number(value || 0)));
      if (value === "" || value === null || value === undefined || amount === 0) delete bucket.plan[date];
      else bucket.plan[date] = amount;
    }
    function setPlanRange(item, start, end, value) {
      getDates(start, end).forEach((date) => setPlan(item, date, value));
    }
    function setActual(item, date, entries) {
      const bucket = activeWorkPlan() ? ensurePlanItemData(item) : item;
      bucket.actual = bucket.actual || {};
      bucket.actual[date] = entries;
    }

    function mainNoFromNo(no) {
      const value = String(no || "").trim();
      return value.includes(".") ? value.split(".")[0] : value;
    }

    function createDefaultState() {
      return {
        version: 1,
        settings: {
          projectName: "TMAN WorkPlan",
          startDate: isoToday(),
          endDate: isoToday(),
          updateDate: isoToday(),
          dayHours: 9,
          controlPercent: 70
        },
        ui: {
          planView: "",
          manualView: "ALL",
          reportView: "ALL",
          reportMode: "full",
          attendanceView: "ALL",
          attendanceExportMode: "full",
          borrowView: "ALL",
          borrowMonth: "",
          borrowDraft: {},
          periodDataBuilding: ""
        },
        buildings: [""],
        manual: { ALL: { initialLaborCost: 0, initialMachineCost: 0, note: "" } },
        workers: [],
        machines: [],
        holidays: [],
        borrowedWorkers: [],
        periods: [],
        periodTemplates: {},
        machineUsage: {}
      };
    }

    function cloneActual(actual = {}) {
      return Object.fromEntries(Object.entries(actual || {}).map(([date, rows]) => [date, (rows || []).map((row) => ({ ...row }))]));
    }

    function cloneMachineUsage(machineUsage = {}) {
      return Object.fromEntries(Object.entries(machineUsage || {}).map(([building, dates]) => [
        building,
        Object.fromEntries(Object.entries(dates || {}).map(([date, rows]) => [date, (rows || []).map((row) => ({ ...row }))]))
      ]));
    }

    function cloneManual(manual = {}) {
      const entries = Object.entries(manual || {});
      const base = (value = {}) => ({
        initialLaborCost: n(value.initialLaborCost),
        initialMachineCost: n(value.initialMachineCost),
        note: String(value.note || "")
      });
      const cloned = Object.fromEntries(entries.map(([key, value]) => [key, base(value || {})]));
      cloned.ALL = cloned.ALL || base();
      if (manual.G || manual.I || manual.GI) {
        cloned.G = cloned.G || base(manual.G);
        cloned.I = cloned.I || base(manual.I);
        cloned.GI = cloned.GI || base(manual.GI);
      }
      return cloned;
    }

    function legacyItemData(periods = []) {
      const itemData = {};
      periods.forEach((period) => {
        (period.items || []).forEach((item) => {
          itemData[item.id] = {
            plan: { ...(item.plan || {}) },
            actual: cloneActual(item.actual || {})
          };
        });
      });
      return itemData;
    }

    function normalizeWorkPlan(plan, next, index) {
      const fallbackNo = String(index + 1);
      plan.id = plan.id || uid("wp");
      plan.claimNo = String(plan.claimNo || fallbackNo);
      plan.status = plan.status || "กำลังทำ";
      plan.startDate = plan.startDate || next.settings.startDate || "2026-05-26";
      plan.endDate = plan.endDate || next.settings.endDate || "2026-07-31";
      plan.updateDate = plan.updateDate || next.settings.updateDate || plan.startDate;
      plan.claimDate = plan.claimDate || plan.endDate || plan.updateDate;
      plan.claimDateHistory = Array.isArray(plan.claimDateHistory) ? plan.claimDateHistory.map((row) => ({
        id: row.id || uid("ch"),
        fromDate: row.fromDate || "",
        toDate: row.toDate || "",
        reason: row.reason || "",
        changedAt: row.changedAt || isoToday()
      })) : [];
      plan.periodIds = Array.isArray(plan.periodIds) ? plan.periodIds : [];
      plan.itemData = plan.itemData || {};
      Object.values(plan.itemData).forEach((data) => {
        data.plan = data.plan || {};
        Object.keys(data.plan).forEach((date) => {
          const amount = Math.max(0, Math.round(n(data.plan[date])));
          if (amount) data.plan[date] = amount;
          else delete data.plan[date];
        });
        data.actual = cloneActual(data.actual || {});
      });
      plan.machineUsage = cloneMachineUsage(plan.machineUsage || {});
      plan.manual = cloneManual(plan.manual || next.manual);
      return plan;
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return normalizeState(createDefaultState());
        const parsed = JSON.parse(raw);
        if (!parsed.version) return normalizeState(createDefaultState());
        return normalizeState(parsed);
      } catch (error) {
        console.warn(error);
        return normalizeState(createDefaultState());
      }
    }

    function normalizeState(next) {
      next.settings = next.settings || {};
      next.settings.dayHours = next.settings.dayHours || 9;
      next.manual = next.manual || {};
      next.manual = cloneManual(next.manual);
      next.buildings = Array.isArray(next.buildings) ? next.buildings.map((row) => String(row || "").trim()).filter((row, index, list) => index === list.indexOf(row)) : [];
      next.workers = Array.isArray(next.workers) ? next.workers : [];
      next.machines = Array.isArray(next.machines) ? next.machines : [];
      next.holidays = Array.isArray(next.holidays) ? next.holidays : [];
      next.borrowedWorkers = Array.isArray(next.borrowedWorkers) ? next.borrowedWorkers.map((row) => ({
        id: row.id || uid("bw"),
        date: row.date || "",
        workerId: row.workerId || "",
        fromBuilding: String(row.fromBuilding || "").trim(),
        toBuilding: String(row.toBuilding || "").trim(),
        unit: ["full", "half", "hours"].includes(row.unit) ? row.unit : "full",
        hours: n(row.hours || next.settings.dayHours || 9),
        amount: n(row.amount),
        note: String(row.note || "")
      })).filter((row) => row.id) : [];
      next.periods = Array.isArray(next.periods) ? next.periods : [];
      next.periods.forEach((period) => {
        period.building = String(period.building || "").trim();
        if (period.building && !next.buildings.includes(period.building)) next.buildings.push(period.building);
      });
      next.periodTemplates = normalizePeriodTemplates(next.periodTemplates);
      Object.keys(next.periodTemplates).forEach((building) => {
        if (building && !next.buildings.includes(building)) next.buildings.push(building);
      });
      if (next.buildings.some(Boolean)) next.buildings = next.buildings.filter(Boolean);
      if (!next.buildings.length) next.buildings = [""];
      next.periods.forEach((period) => {
        period.items = Array.isArray(period.items) ? period.items : [];
        period.customTitle = String(period.customTitle || "").trim();
        period.items.forEach((item) => {
          item.plan = item.plan || {};
          item.actual = item.actual || {};
          item.laborValue = n(item.laborValue);
          item.progressPct = n(item.progressPct);
        });
        period.enabled = period.enabled !== false;
        if (period.periodValue === undefined || period.periodValue === null || period.periodValue === "") {
          period.periodValue = period.items.reduce((sum, item) => sum + n(item.laborValue), 0);
        } else {
          period.periodValue = n(period.periodValue);
        }
        period.mainNo = String(period.mainNo || mainNoFromNo(period.no)).trim();
      });
      const groupValues = new Map();
      next.periods.forEach((period) => {
        const key = `${period.building}|${period.mainNo}`;
        const existing = groupValues.get(key) || { explicit: 0, sum: 0 };
        if (n(period.mainValue) > 0) existing.explicit = Math.max(existing.explicit, n(period.mainValue));
        existing.sum += n(period.periodValue);
        groupValues.set(key, existing);
      });
      next.periods.forEach((period) => {
        const key = `${period.building}|${period.mainNo}`;
        const group = groupValues.get(key);
        period.mainValue = n(period.mainValue) || group?.explicit || group?.sum || n(period.periodValue);
        period.periodPercent = period.mainValue ? n(period.periodValue) / n(period.mainValue) * 100 : n(period.periodPercent);
      });
      next.machineUsage = cloneMachineUsage(next.machineUsage || {});
      next.buildings.filter(Boolean).forEach((building) => {
        next.machineUsage[building] = next.machineUsage[building] || {};
        next.manual[building] = next.manual[building] || { initialLaborCost: 0, initialMachineCost: 0, note: "" };
      });
      next.ui = next.ui || {};
      if (!Array.isArray(next.workPlans) || !next.workPlans.length) {
        const firstId = "wp_1";
        next.workPlans = [{
          id: firstId,
          claimNo: "1",
          status: "กำลังทำ",
          startDate: next.settings.startDate || "2026-05-26",
          endDate: next.settings.endDate || "2026-07-31",
          updateDate: next.settings.updateDate || "2026-06-19",
          claimDate: next.settings.endDate || "2026-07-31",
          claimDateHistory: [],
          periodIds: next.periods.filter((period) => period.enabled !== false).map((period) => period.id),
          itemData: legacyItemData(next.periods),
          machineUsage: cloneMachineUsage(next.machineUsage),
          manual: cloneManual(next.manual)
        }];
        next.ui.activeWorkPlanId = firstId;
      }
      next.workPlans = next.workPlans.map((plan, index) => normalizeWorkPlan(plan, next, index));
      if (!next.workPlans.some((plan) => plan.id === next.ui.activeWorkPlanId)) next.ui.activeWorkPlanId = next.workPlans[0]?.id || "";
      if (!["all", "plan", "actual", "planActual", "machine"].includes(next.ui.fillMode)) next.ui.fillMode = "all";
      if (!["hide", "move"].includes(next.ui.workerListMode)) next.ui.workerListMode = "hide";
      const viewOptions = buildingViewOptionsFromState(next);
      const fallbackView = viewOptions[0] || "";
      const fallbackCombined = viewOptions.at(-1) || fallbackView || "ALL";
      if (!viewOptions.includes(next.ui.planView)) next.ui.planView = fallbackView;
      if (!viewOptions.includes(next.ui.manualView)) next.ui.manualView = fallbackCombined;
      if (!viewOptions.includes(next.ui.reportView)) next.ui.reportView = fallbackCombined;
      if (!["full", "projectPlan"].includes(next.ui.reportMode)) next.ui.reportMode = "full";
      if (!viewOptions.includes(next.ui.attendanceView)) next.ui.attendanceView = fallbackCombined;
      if (!viewOptions.includes(next.ui.borrowView) && next.ui.borrowView !== "ALL") next.ui.borrowView = fallbackCombined;
      if (!["full", "noWage"].includes(next.ui.attendanceExportMode)) next.ui.attendanceExportMode = "full";
      next.ui.borrowDraft = next.ui.borrowDraft && typeof next.ui.borrowDraft === "object" ? next.ui.borrowDraft : {};
      next.ui.borrowMonth = next.ui.borrowMonth || "";
      const periodDataBuildings = allBuildingsFromState(next).filter(Boolean);
      if (!periodDataBuildings.includes(next.ui.periodDataBuilding)) next.ui.periodDataBuilding = periodDataBuildings[0] || "";
      return next;
    }

    state = loadState();

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function stateSnapshot() {
      return JSON.stringify(state);
    }

    function recordHistory(label = "แก้ไข") {
      undoStack.push({ label, snapshot: stateSnapshot() });
      if (undoStack.length > 60) undoStack.shift();
      redoStack = [];
      updateHistoryButtons();
    }

    function restoreSnapshot(snapshot) {
      state = normalizeState(JSON.parse(snapshot));
      saveState();
      renderAll();
      updateHistoryButtons();
    }

    function undo() {
      const entry = undoStack.pop();
      if (!entry) return showToast("ไม่มีรายการให้ย้อนกลับ");
      redoStack.push({ label: entry.label, snapshot: stateSnapshot() });
      restoreSnapshot(entry.snapshot);
      showToast(`ย้อนกลับ: ${entry.label}`);
    }

    function redo() {
      const entry = redoStack.pop();
      if (!entry) return showToast("ไม่มีรายการให้ไปหน้า");
      undoStack.push({ label: entry.label, snapshot: stateSnapshot() });
      restoreSnapshot(entry.snapshot);
      showToast(`ไปหน้า: ${entry.label}`);
    }

    function updateHistoryButtons() {
      const undoButton = $("#undoBtn");
      const redoButton = $("#redoBtn");
      if (undoButton) undoButton.disabled = !undoStack.length;
      if (redoButton) redoButton.disabled = !redoStack.length;

    function activeWorkPlan() {
      if (!state?.workPlans?.length) return null;
      return state.workPlans.find((plan) => plan.id === state.ui?.activeWorkPlanId) || state.workPlans[0];

    function diffDaysFromToday(date) {
      if (!date) return null;
      const today = new Date();
      const start = new Date(`${localISODate(today)}T00:00:00`);
      const target = new Date(`${date}T00:00:00`);
      if (Number.isNaN(target.getTime())) return null;
      return Math.round((target - start) / 86400000);
    }

    function claimDaysText(date = planClaimDate()) {
      const diff = diffDaysFromToday(date);
      if (diff === null) return "";
      if (diff > 0) return `เหลืออีก ${money(diff, 0)} วัน`;
      if (diff < 0) return `เลยมาแล้ว ${money(Math.abs(diff), 0)} วัน`;
      return "ถึงกำหนดวันนี้";
    }

    function claimUpdateText(plan = activeWorkPlan()) {
      if (!plan) return "ยังไม่มีแผนเบิกงวด";

      return `${workPlanLabel(plan)} วันที่ ${thaiDateInput(claimDate) || dateLabel(claimDate)} ${claimDaysText(claimDate)}`.trim();
    }

    function dateClass(date) {
      return [
        isHoliday(date) ? "holiday" : "",
        date === planClaimDate() ? "claim-date" : ""
      ].filter(Boolean).join(" ");
    }

    function ensurePlanItemData(item, plan = activeWorkPlan()) {
      if (!item?.id) return { plan: {}, actual: {} };
      if (!plan) return item;
      plan.itemData = plan.itemData || {};
      plan.itemData[item.id] = plan.itemData[item.id] || { plan: {}, actual: {} };
      plan.itemData[item.id].plan = plan.itemData[item.id].plan || {};
      plan.itemData[item.id].actual = plan.itemData[item.id].actual || {};
      return plan.itemData[item.id];
    }

    function itemPlanValue(item, date) {
      if (!item?.id) return 0;

    function activeMachineUsage(plan = activeWorkPlan()) {

    function showToast(message) {
      const toast = $("#toast");
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 2400);
    }

    function getDates(start = planStartDate(), end = planEndDate()) {
      const dates = [];
      const current = new Date(`${start}T00:00:00`);
      const last = new Date(`${end}T00:00:00`);
      if (Number.isNaN(current.getTime()) || Number.isNaN(last.getTime()) || current > last) return dates;
      while (current <= last) {
        dates.push(localISODate(current));
        current.setDate(current.getDate() + 1);
      }
      return dates;
    }

    function localISODate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function dateLabel(date) {
      const d = new Date(`${date}T00:00:00`);
      return d.toLocaleDateString("th-TH", { day: "numeric", month: "short", year: "numeric" });
    }

    function thaiDateInput(date) {
      if (!date) return "";
      const [year, month, day] = String(date).split("-");
      if (!year || !month || !day) return "";
      return `${day}/${month}/${Number(year) + 543}`;
    }

    function parseThaiDateInput(value) {
      const clean = String(value || "").trim();
      const match = clean.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{4})$/);
      if (!match) return "";
      const day = Number(match[1]);
      const month = Number(match[2]);
      const rawYear = Number(match[3]);
      const year = rawYear > 2400 ? rawYear - 543 : rawYear;
      const date = new Date(year, month - 1, day);
      if (date.getFullYear() !== year || date.getMonth() !== month - 1 || date.getDate() !== day) return "";
      return localISODate(date);
    }

    function monthLabel(date) {
      const d = new Date(`${date}T00:00:00`);
      return d.toLocaleDateString("th-TH", { month: "long" });
    }

    function dayNumber(date) {
      return new Date(`${date}T00:00:00`).getDate();
    }

    function isHoliday(date) {
      return state.holidays.some((holiday) => holiday.date === date);
    }

    function getWorker(id) {
      return state.workers.find((worker) => worker.id === id);
    }

    function getMachine(id) {
      return state.machines.find((machine) => machine.id === id);
    }

    function getPeriod(id) {
      return state.periods.find((period) => period.id === id);

    function getItem(period, itemId) {

    function buildingsForView(view) {

      if (view === "ALL") return allBuildings().filter(Boolean);
      return [view].filter(Boolean);
    }

    function periodEnabled(period) {
      const plan = activeWorkPlan();
      if (!plan) return period?.enabled !== false;
      return (plan.periodIds || []).includes(period.id);
    }

    function setPeriodEnabled(periodId, enabled, plan = activeWorkPlan()) {
      if (!plan || !periodId) return;
      const ids = new Set(plan.periodIds || []);
      if (enabled) ids.add(periodId);
      else ids.delete(periodId);
      plan.periodIds = [...ids];
    }

    const PERIOD_STATUSES = ["รอทำ", "กำลังทำ", "เสร็จแล้ว", "พักไว้", "ยกเลิก"];

    function periodStatusOptions(value = "") {
      const current = value || "รอทำ";
      const options = PERIOD_STATUSES.includes(current) ? PERIOD_STATUSES : [current, ...PERIOD_STATUSES];
      return options.map((status) => `<option value="${esc(status)}" ${status === current ? "selected" : ""}>${esc(status)}</option>`).join("");
    }

    function periodStatusClass(status = "") {
      if (status === "เสร็จแล้ว") return "green";
      if (status === "กำลังทำ") return "amber";
      if (status === "พักไว้") return "";
      if (status === "ยกเลิก") return "red";
      return "";
    }

    function allBuildings() {
      return allBuildingsFromState(state);
    }

    function allBuildingsFromState(source) {
      const saved = Array.isArray(source?.buildings) ? source.buildings : [];
      const fromPeriods = Array.isArray(source?.periods) ? source.periods.map((period) => period.building) : [];
      const fromTemplates = source?.periodTemplates && typeof source.periodTemplates === "object" ? Object.keys(source.periodTemplates) : [];
      const list = [...saved, ...fromPeriods, ...fromTemplates].map((row) => String(row || "").trim()).filter((row, index, rows) => index === rows.indexOf(row));
      return list.length ? list : [""];
    }

    function combinedViewValueFromState(source) {
      const buildings = allBuildingsFromState(source).filter(Boolean);
      return buildings.includes("G") && buildings.includes("I") ? "GI" : "ALL";
    }

    function buildingViewOptionsFromState(source) {
      const buildings = allBuildingsFromState(source).filter(Boolean);
      return buildings.length > 1 ? [...buildings, combinedViewValueFromState(source)] : buildings;
    }

    function buildingLabel(building) {
      return building ? `หลัง ${building}` : "ยังไม่ตั้งชื่ออาคาร";
    }

    function buildingReportLabel(building) {
      return building ? `อาคาร ${building}` : "ยังไม่ตั้งชื่ออาคาร";
    }

    function combinedViewValue() {
      return combinedViewValueFromState(state);
    }

    function viewLabel(view) {
      if (view === "GI") return "รวม G+I";
      if (view === "ALL") return "รวมทุกอาคาร";
      return buildingLabel(view);
    }

    function reportViewTitle(view) {
      if (view === "GI") return "อาคาร G+I";
      if (view === "ALL") return "ทุกอาคาร";
      return buildingReportLabel(view);
    }

    function buildingViewOptions() {
      return buildingViewOptionsFromState(state);
    }

    function normalizePeriodTemplates(source = {}) {
      const result = {};
      if (!source || typeof source !== "object") return result;
      Object.entries(source).forEach(([buildingKey, template]) => {
        const building = String(template?.building || buildingKey || "").trim();
        if (!building) return;
        const rawPeriods = Array.isArray(template) ? template : Array.isArray(template?.periods) ? template.periods : [];
        const periods = rawPeriods.map((period) => ({
          no: String(period?.no || "").trim(),
          value: n(period?.value),
          description: String(period?.description || "").trim(),
          items: (Array.isArray(period?.items) ? period.items : []).map((item) => ({
            order: String(item?.order || "").trim(),
            name: String(item?.name || "").trim(),
            note: String(item?.note || "").trim()
          })).filter((item) => item.name || item.order || item.note)
        })).filter((period) => period.no);
        result[building] = {
          building,
          sourceTitle: String(template?.sourceTitle || "").trim(),
          importedAt: template?.importedAt || "",
          periods
        };
      });
      return result;
    }

    function periodDisplayTitle(period) {
      return `งวดงานที่ ${period?.no || ""}`.trim();
    }

    function periodUserTitle(period) {
      return String(period?.customTitle || "").trim();
    }

    function periodSearchText(period) {
      return [period.building, periodMainNo(period), period.no, periodUserTitle(period), period.title, period.description, period.status].join(" ").toLowerCase();
    }

    function periodFilters() {
      return {
        search: String(state.ui.periodSearch || "").trim().toLowerCase(),
        building: state.ui.periodBuilding || "all"
      };
    }

    function periodMatchesFilters(period, filters = periodFilters()) {
      if (filters.building !== "all" && period.building !== filters.building) return false;
      if (filters.search && !periodSearchText(period).includes(filters.search)) return false;
      return true;
    }

    function periodGroupRows(building, filters = periodFilters()) {
      const groups = new Map();
      state.periods
        .filter((period) => period.building === building && periodMatchesFilters(period, filters))
        .sort((a, b) => naturalSort(periodMainNo(a), periodMainNo(b)) || naturalSort(a.no, b.no))
        .forEach((period) => {
          const mainNo = periodMainNo(period);
          const group = groups.get(mainNo) || { building, mainNo, rows: [] };
          group.rows.push(period);
          groups.set(mainNo, group);
        });
      return [...groups.values()].sort((a, b) => naturalSort(a.mainNo, b.mainNo));
    }

    function fullMainGroup(period) {
      const mainNo = periodMainNo(period);
      return state.periods
        .filter((row) => row.building === period.building && periodMainNo(row) === mainNo)
        .sort((a, b) => naturalSort(a.no, b.no));
    }

    function mainGroupByKey(building, mainNo) {
      return state.periods
        .filter((row) => row.building === building && periodMainNo(row) === mainNo)
        .sort((a, b) => naturalSort(a.no, b.no));
    }

    function periodMainViewRows(key = state.ui.editingMainPeriodKey || "") {
      const [building, mainNo] = String(key).split("|");
      if (!building || !mainNo) return [];
      return state.periods
        .filter((period) => period.building === building && periodMainNo(period) === mainNo)
        .sort((a, b) => naturalSort(a.no, b.no));
    }

    function hasSubPeriods(rows = []) {
      return rows.length > 1 || rows.some((period) => String(period.no) !== periodMainNo(period));
    }

    function groupSummary(rows) {
      const first = rows[0] || {};
      const mainValue = rows.reduce((best, row) => Math.max(best, n(row.mainValue)), n(first.mainValue));
      return {
        mainValue,
        subValue: rows.reduce((sum, row) => sum + n(row.periodValue), 0),
        laborValue: rows.reduce((sum, row) => sum + periodLaborValue(row), 0),
        activeCount: rows.filter(periodEnabled).length,
        count: rows.length
      };
    }

    function nextSubPeriodNo(period) {
      const mainNo = periodMainNo(period);
      const used = fullMainGroup(period)
        .map((row) => String(row.no || ""))
        .filter((no) => new RegExp(`^${mainNo.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")}\\.\\d+$`).test(no))
        .map((no) => Number(no.slice(mainNo.length + 1)))
        .filter((num) => Number.isFinite(num));
      return `${mainNo}.${(used.length ? Math.max(...used) : 0) + 1}`;
    }

    function nextChildPeriodNo(period) {
      const parentNo = String(period?.no || "").trim();
      if (!parentNo) return nextSubPeriodNo(period);
      const used = fullMainGroup(period)
        .map((row) => String(row.no || ""))
        .filter((no) => new RegExp(`^${parentNo.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")}\\.\\d+$`).test(no))
        .map((no) => Number(no.slice(parentNo.length + 1)))
        .filter((num) => Number.isFinite(num));
      return `${parentNo}.${(used.length ? Math.max(...used) : 0) + 1}`;
    }

    function periodNoDepth(period) {
      return Math.max(0, String(period?.no || "").split(".").length - 1);
    }

    function parseMoneyOrPercentInput(raw, baseValue) {
      const text = String(raw || "").replace(/,/g, "").trim();
      if (!text) return 0;
      if (text.endsWith("%")) return n(baseValue) * n(text.slice(0, -1)) / 100;
      return n(text);
    }

    function parseSplitNumber(raw) {
      const value = Number(String(raw ?? "").replace(/,/g, "").replace(/%/g, "").trim() || 0);
      return Number.isFinite(value) ? value : 0;
    }

    function formatSplitInput(value, digits = 0) {
      const number = Number(value || 0);
      if (!Number.isFinite(number) || number === 0) return "";
      return number.toLocaleString("th-TH", {
        maximumFractionDigits: Number.isInteger(number) ? 0 : digits,
        minimumFractionDigits: 0
      });
    }

    function splitAmountValue(mainValue) {
      const value = parseSplitNumber(splitDraft?.amountValue);
      if (value > 0) return value;
      return n(mainValue) * parseSplitNumber(splitDraft?.amountPercent) / 100;
    }

    function addPeriodValueHistory(period, field, fromValue, toValue, reason) {
      const from = n(fromValue);
      const to = n(toValue);
      if (!period || Math.abs(from - to) < 0.0001) return;
      period.valueHistory = Array.isArray(period.valueHistory) ? period.valueHistory : [];
      period.valueHistory.push({ id: uid("vh"), field, from, to, reason, changedAt: isoToday() });
      if (period.valueHistory.length > 80) period.valueHistory = period.valueHistory.slice(-80);
    }

    function periodsForBuilding(building, activeOnly = true) {
      return state.periods.filter((period) => period.building === building && (!activeOnly || periodEnabled(period)));
    }

    function periodsForView(view) {
      const buildings = buildingsForView(view);
      return state.periods.filter((period) => buildings.includes(period.building) && periodEnabled(period));
    }

    function getQuickEntry(view = state.ui.planView || allBuildings()[0] || "") {
      state.ui.quickEntry = state.ui.quickEntry || {};
      const quick = state.ui.quickEntry;
      if (view !== "GI") quick.building = view;
      const buildings = allBuildings().filter(Boolean);
      if (!buildings.includes(quick.building)) quick.building = buildings[0] || "";
      const buildingPeriods = periodsForBuilding(quick.building);
      if (!buildingPeriods.some((period) => period.id === quick.periodId)) quick.periodId = buildingPeriods[0]?.id || "";
      const period = getPeriod(quick.periodId);
      if (!period?.items.some((item) => item.id === quick.itemId)) quick.itemId = period?.items[0]?.id || "";
      const dates = getDates();
      if (!dates.includes(quick.date)) quick.date = dates.includes(planUpdateDate()) ? planUpdateDate() : dates[0] || "";
      if (!state.workers.some((worker) => worker.id === quick.workerId)) quick.workerId = state.workers[0]?.id || "";
      if (!state.machines.some((machine) => machine.id === quick.machineId)) quick.machineId = state.machines[0]?.id || "";
      if (!["full", "half", "hours"].includes(quick.unit)) quick.unit = "full";
      if (!quick.hours) quick.hours = state.settings.dayHours;
      if (quick.machineAmount === undefined || quick.machineAmount === null || quick.machineAmount === "") quick.machineAmount = getMachine(quick.machineId)?.dailyCost || 0;
      return quick;
    }

    function selectedQuickRefs() {
      const quick = getQuickEntry();
      const period = getPeriod(quick.periodId);
      const item = getItem(period, quick.itemId);
      return { quick, period, item };
    }

    function laborUnits(entry) {
      if (entry.unit === "full") return 1;
      if (entry.unit === "half") return 0.5;
      return Math.max(0, Number(entry.hours || 0) / Number(state.settings.dayHours || 9));
    }

    function laborAmount(entry) {
      const worker = getWorker(entry.workerId);
      if (!worker) return 0;
      return Number(worker.dailyWage || 0) * laborUnits(entry);
    }

    function borrowedRows() {
      state.borrowedWorkers = Array.isArray(state.borrowedWorkers) ? state.borrowedWorkers : [];
      return state.borrowedWorkers;
    }

    function borrowedAmount(row) {
      if (row?.amount !== "" && row?.amount !== null && row?.amount !== undefined && Number.isFinite(Number(row.amount))) return n(row.amount);
      const worker = getWorker(row?.workerId);
      if (!worker) return 0;
      return Number(worker.dailyWage || 0) * laborUnits(row || {});
    }

    function borrowedWorkerInfo(workerId, date, ignoreId = "") {
      if (!workerId || !date) return null;
      return borrowedRows().find((row) => row.workerId === workerId && row.date === date && row.id !== ignoreId) || null;
    }

    function borrowedRowsForView(view, monthKey = "") {
      const buildings = new Set(buildingsForView(view));
      const all = view === "ALL" || !view;
      return borrowedRows().filter((row) => {
        if (monthKey && !String(row.date || "").startsWith(`${monthKey}-`)) return false;
        if (all) return true;
        return buildings.has(row.fromBuilding);
      });
    }

    function borrowUnitLabel(row) {
      if (row?.unit === "half") return "ครึ่งวัน";
      if (row?.unit === "hours") return `${qty(row.hours)} ชม.`;
      return "เต็มวัน";
    }

    function borrowedMarkLabel(mark) {
      return String(mark || "").startsWith("borrowed:") ? String(mark).slice("borrowed:".length) : "";
    }

    function isBorrowedMark(mark) {
      return String(mark || "").startsWith("borrowed:");
    }

    function actualEntries(item, date) {
      if (!item?.id) return [];
      return ensurePlanItemData(item).actual?.[date] || [];
    }

    function itemActualUnits(item, date) {
      return actualEntries(item, date).reduce((sum, entry) => sum + laborUnits(entry), 0);
    }

    function itemLaborCost(item, date) {
      return actualEntries(item, date).reduce((sum, entry) => sum + laborAmount(entry), 0);
    }

    function totalPlanned(view, date) {
      return periodsForView(view).reduce((sum, period) => sum + period.items.reduce((inner, item) => inner + itemPlanValue(item, date), 0), 0);
    }

    function totalActualUnits(view, date) {
      return periodsForView(view).reduce((sum, period) => sum + period.items.reduce((inner, item) => inner + itemActualUnits(item, date), 0), 0);
    }

    function totalLaborCost(view, date) {
      return periodsForView(view).reduce((sum, period) => sum + period.items.reduce((inner, item) => inner + itemLaborCost(item, date), 0), 0);
    }

    function totalMachineCost(view, date) {
      const usage = activeMachineUsage();
      return buildingsForView(view).reduce((sum, building) => {
        const list = usage?.[building]?.[date] || [];
        return sum + list.reduce((inner, row) => inner + n(row.amount), 0);
      }, 0);
    }

    function totalSpend(view, date) {
      return totalLaborCost(view, date) + totalMachineCost(view, date);
    }

    function itemBuildingLookup() {
      const map = new Map();
      state.periods.forEach((period) => {
        (period.items || []).forEach((item) => {
          if (item?.id && !map.has(item.id)) map.set(item.id, period.building);
        });
      });
      return map;
    }

    function manualSettingsFor(view, plan = activeWorkPlan()) {
      const empty = { initialLaborCost: 0, initialMachineCost: 0, note: "" };
      if (plan) {
        plan.manual = cloneManual(plan.manual || state.manual);
        plan.manual[view] = plan.manual[view] || { ...empty };
        return plan.manual[view];
      }
      state.manual[view] = state.manual[view] || { ...empty };
      return state.manual[view];
    }

    function appAccumulatedActuals(view, cutoff = planUpdateDate()) {
      const buildings = new Set(buildingsForView(view));
      const itemBuildings = itemBuildingLookup();
      const dates = [];
      let labor = 0;
      let machine = 0;
      (state.workPlans || []).forEach((plan) => {
        Object.entries(plan.itemData || {}).forEach(([itemId, data]) => {
          if (!buildings.has(itemBuildings.get(itemId))) return;
          Object.entries(data?.actual || {}).forEach(([date, entries]) => {
            if (date > cutoff) return;
            let dayLabor = 0;
            (entries || []).forEach((entry) => { dayLabor += laborAmount(entry); });
            if (dayLabor > 0) {
              labor += dayLabor;
              dates.push(date);
            }
          });
        });
        const usage = plan.machineUsage || {};
        buildings.forEach((building) => {
          Object.entries(usage[building] || {}).forEach(([date, rows]) => {
            if (date > cutoff) return;
            const dayMachine = (rows || []).reduce((sum, row) => sum + n(row.amount), 0);
            if (dayMachine > 0) {
              machine += dayMachine;
              dates.push(date);
            }
          });
        });
      });
      const firstDate = dates.length ? dates.sort()[0] : "";
      return { firstDate, labor, machine };
    }

    function accumulatedTotalsFor(view, plan = activeWorkPlan()) {
      const manual = manualSettingsFor(view, plan);
      const app = appAccumulatedActuals(view, planUpdateDate(plan));
      const laborTotal = app.labor + n(manual.initialLaborCost);
      const costToUpdate = laborTotal + app.machine + n(manual.initialMachineCost);
      return {
        ...manual,
        firstDate: app.firstDate,
        appLabor: app.labor,
        appMachine: app.machine,
        contractLaborCost: laborTotal,
        costToUpdate
      };
    }

    function renderAccumDialog() {
      const options = buildingViewOptions();
      const view = options.includes(state.ui.manualView) ? state.ui.manualView : (options.at(-1) || "ALL");
      const data = accumulatedTotalsFor(view);
      $("#accumDialogMeta").textContent = `${viewLabel(view)} · อัปเดต ${dateLabel(planUpdateDate())}${data.firstDate ? ` · เริ่มนับ ${dateLabel(data.firstDate)}` : ""}`;
      $("#accumDialogBody").innerHTML = `
        <div class="accum-grid">
          <div class="accum-box">
            <h3>ค่าแรงต้นทุนสะสมถึงงวดปัจจุบัน</h3>
            <div class="accum-line"><span>ค่าแรงในแอพ</span><strong>${money(data.appLabor, 0)}</strong></div>
            <label><span>ค่าแรงตั้งต้นก่อนเริ่มจดในแอพ</span><input id="accumInitialLabor" data-accum-field="initialLaborCost" type="number" value="${esc(data.initialLaborCost)}"></label>

            <label><span>ค่าเครื่องจักรตั้งต้นก่อนเริ่มจดในแอพ</span><input id="accumInitialMachine" data-accum-field="initialMachineCost" type="number" value="${esc(data.initialMachineCost)}"></label>

      const options = buildingViewOptions();
      const view = options.includes(state.ui.manualView) ? state.ui.manualView : (options.at(-1) || "ALL");

      $("#accumDialog").showModal();

    function closeAccumDialog() {
      $("#accumDialog")?.close();
    }

    function saveAccumDialog() {
      const options = buildingViewOptions();
      const view = options.includes(state.ui.manualView) ? state.ui.manualView : (options.at(-1) || "ALL");
      const manual = manualSettingsFor(view);
      manual.initialLaborCost = n($("#accumInitialLabor")?.value);
      manual.initialMachineCost = n($("#accumInitialMachine")?.value);
