<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TMAN WorkPlan</title>
  <style>
    :root {
      --bg: oklch(1 0 0);
      --surface: oklch(0.982 0.004 160);
      --surface-2: oklch(0.955 0.007 160);
      --ink: oklch(0.18 0.018 160);
      --muted: oklch(0.43 0.018 160);
      --line: oklch(0.86 0.008 160);
      --line-strong: oklch(0.58 0.018 160);
      --primary: oklch(0.35 0.077 160);
      --primary-2: oklch(0.45 0.088 160);
      --primary-soft: oklch(0.92 0.034 160);
      --actual: oklch(0.63 0.215 28);
      --actual-soft: oklch(0.92 0.07 28);
      --warning: oklch(0.78 0.145 82);
      --purple: oklch(0.68 0.11 305);
      --success-soft: oklch(0.88 0.075 142);
      --info-soft: oklch(0.88 0.055 235);
      --holiday: oklch(0.78 0 0);
      --holiday-dark: oklch(0.27 0 0);
      --danger: oklch(0.53 0.18 28);
      --shadow: 0 8px 18px oklch(0.16 0.02 160 / 0.08);
      --radius: 8px;
      --nav-width: 224px;
      font-family: Tahoma, "Noto Sans Thai", "Leelawadee UI", system-ui, sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-size: 14px;
      line-height: 1.45;
    }
    button, input, select, textarea {
      font: inherit;
      color: inherit;
    }
    button {
      border: 1px solid var(--line);
      background: var(--bg);
      border-radius: 7px;
      min-height: 36px;
      padding: 8px 12px;
      cursor: pointer;
    }
    button:hover { border-color: var(--primary-2); }
    button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
      outline: 3px solid oklch(0.75 0.1 160 / 0.45);
      outline-offset: 2px;
    }
    .primary {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
      font-weight: 700;
    }
    .danger {
      border-color: oklch(0.78 0.11 28);
      color: var(--danger);
      background: oklch(0.98 0.018 28);
    }
    .ghost {
      background: transparent;
      border-color: transparent;
      color: var(--muted);
    }
    .ghost:hover {
      background: var(--surface-2);
      border-color: var(--line);
      color: var(--ink);
    }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--bg);
      padding: 8px 10px;
      min-height: 36px;
    }
    textarea { min-height: 76px; resize: vertical; }
    label {
      display: grid;
      gap: 5px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }
    label span { color: var(--muted); }
    h1, h2, h3 {
      margin: 0;
      text-wrap: balance;
      line-height: 1.22;
      letter-spacing: 0;
    }
    h1 { font-size: 22px; }
    h2 { font-size: 18px; }
    h3 { font-size: 15px; }
    p { margin: 0; }
    .app {
      display: grid;
      grid-template-columns: var(--nav-width) minmax(0, 1fr);
      min-height: 100vh;
    }
    .sidebar {
      border-right: 1px solid var(--line);
      background: var(--surface);
      padding: 16px 12px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 8px 14px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 12px;
    }
    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--primary);
      color: white;
      font-weight: 800;
      letter-spacing: 0;
    }
    .brand small {
      color: var(--muted);
      font-weight: 700;
    }
    .nav {
      display: grid;
      gap: 4px;
    }
    .nav button {
      justify-content: flex-start;
      display: flex;
      align-items: center;
      gap: 9px;
      border-color: transparent;
      background: transparent;
      color: var(--muted);
      text-align: left;
      font-weight: 700;
    }
    .nav button[aria-selected="true"] {
      background: var(--primary-soft);
      color: var(--primary);
      border-color: oklch(0.82 0.05 160);
    }
    .main {
      min-width: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: oklch(1 0 0 / 0.96);
      border-bottom: 1px solid var(--line);
      padding: 12px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      backdrop-filter: blur(10px);
    }
    .topbar .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .mobile-tabs {
      display: none;
      width: 100%;
    }
    .content {
      padding: 18px;
      min-width: 0;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: grid; gap: 16px; }
    .section {
      display: grid;
      gap: 12px;
      min-width: 0;
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--bg);
      min-width: 0;
    }
    .panel-head {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .panel-body { padding: 14px; }
    .split {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 12px;
      min-width: 0;
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
      align-items: end;
      min-width: 0;
    }
    .form-grid > *,
    .split > * {
      min-width: 0;
    }
    .metric-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 10px;
    }
    .metric {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      background: var(--surface);
    }
    .metric strong {
      display: block;
      font-size: 21px;
      line-height: 1.15;
      margin-top: 4px;
    }
    .metric span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .segmented {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--surface);
    }
    .segmented button {
      border: 0;
      border-radius: 0;
      background: transparent;
      min-height: 34px;
    }
    .segmented button[aria-pressed="true"] {
      background: var(--primary);
      color: white;
      font-weight: 800;
    }
    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--bg);
      max-width: 100%;
      min-width: 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 7px 8px;
      vertical-align: middle;
      text-align: left;
    }
    th {
      background: var(--surface-2);
      color: var(--muted);
      font-weight: 800;
      white-space: nowrap;
    }
    tr:last-child td { border-bottom: 0; }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .muted { color: var(--muted); }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border-radius: 999px;
      padding: 3px 8px;
      background: var(--surface-2);
      border: 1px solid var(--line);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }
    .pill.red {
      background: var(--actual);
      border-color: var(--actual);
      color: white;
    }
    .pill.danger {
      background: var(--danger);
      border-color: var(--danger);
      color: white;
    }
    .pill.green {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }
    .pill.amber {
      background: oklch(0.92 0.09 82);
      border-color: oklch(0.82 0.13 82);
      color: oklch(0.28 0.055 82);
    }
    .dashboard-shell {
      display: grid;
      gap: 14px;
    }
    .dashboard-hero {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(135deg, oklch(0.965 0.018 160), oklch(0.99 0.004 160));
      padding: 16px;
      display: grid;
      gap: 14px;
    }
    .dashboard-hero-main {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .dashboard-hero h2 {
      font-size: 20px;
    }
    .dashboard-kpis {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 8px;
    }
    .dashboard-kpi {
      border: 1px solid oklch(0.84 0.017 160);
      border-radius: var(--radius);
      background: oklch(1 0 0 / 0.78);
      padding: 10px;
    }
    .dashboard-kpi span,
    .dashboard-card span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }
    .dashboard-kpi strong {
      display: block;
      margin-top: 4px;
      font-size: 22px;
      line-height: 1.1;
      font-variant-numeric: tabular-nums;
    }
    .dashboard-kpi.danger {
      border-color: oklch(0.78 0.12 28);
      background: oklch(0.97 0.035 28);
    }
    .dashboard-grid {
      display: grid;
      grid-template-columns: minmax(260px, 0.9fr) minmax(360px, 1.5fr);
      gap: 12px;
      align-items: stretch;
    }
    .dashboard-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--bg);
      padding: 14px;
      display: grid;
      gap: 12px;
      align-content: start;
    }
    .ring {
      width: 164px;
      aspect-ratio: 1;
      border-radius: 50%;
      display: grid;
      place-items: center;
      margin-inline: auto;
      background:
        radial-gradient(circle at center, white 0 56%, transparent 57%),
        conic-gradient(var(--primary) calc(var(--pct) * 1%), var(--surface-2) 0);
      border: 1px solid var(--line);
    }
    .ring strong {
      font-size: 28px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .ring span { text-align: center; }
    .comparison-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 10px;
    }
    .comparison-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      background: var(--surface);
      display: grid;
      gap: 8px;
    }
    .comparison-card header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .comparison-card strong {
      font-size: 20px;
      font-variant-numeric: tabular-nums;
    }
    .budget-bar,
    .cost-stack {
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: var(--surface-2);
      border: 1px solid var(--line);
    }
    .budget-bar span,
    .cost-stack span {
      display: block;
      height: 100%;
      width: min(100%, calc(var(--pct) * 1%));
      background: var(--primary);
    }
    .budget-bar.warning span { background: var(--warning); }
    .budget-bar.danger span { background: var(--actual); }
    .cost-stack {
      display: flex;
    }
    .cost-stack span { width: calc(var(--pct) * 1%); min-width: 0; }
    .cost-stack .labor { background: var(--actual); }
    .cost-stack .machine { background: oklch(0.62 0.12 235); }
    .cost-stack .manual { background: var(--warning); }
    .top-list {
      display: grid;
      gap: 8px;
    }
    .top-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      border-bottom: 1px solid var(--line);
      padding-bottom: 8px;
    }
    .top-row:last-child { border-bottom: 0; padding-bottom: 0; }
    .top-row strong {
      overflow-wrap: anywhere;
    }
    .period-overview th,
    .period-overview td {
      white-space: nowrap;
    }
    .period-overview td:nth-child(3) {
      white-space: normal;
      min-width: 220px;
    }
    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--primary);
      display: inline-block;
      margin-right: 6px;
    }
    .status-dot.warning { background: var(--warning); }
    .status-dot.danger { background: var(--actual); }
    .plan-shell {
      display: grid;
      gap: 12px;
    }
    .plan-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .quick-entry {
      border: 1px solid oklch(0.82 0.05 160);
      border-radius: var(--radius);
      background: var(--primary-soft);
      overflow: hidden;
    }
    .quick-entry .panel-head {
      background: oklch(0.96 0.02 160);
    }
    .quick-entry .panel-body {
      display: grid;
      gap: 12px;
    }
    .quick-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .quick-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 8px;
    }
    .quick-summary .metric {
      background: var(--bg);
      padding: 10px;
    }
    .quick-summary .metric strong {
      font-size: 18px;
    }
    .scroll-hint {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .plan-grid {
      max-height: calc(100vh - 230px);
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--bg);
    }
    .work-table {
      min-width: 3700px;
      border-collapse: separate;
      border-spacing: 0;
      table-layout: fixed;
    }
    .work-table th, .work-table td {
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 0;
      text-align: center;
    }
    .work-table thead th {
      position: sticky;
      top: 0;
      z-index: 7;
      height: 30px;
      background: var(--surface-2);
    }
    .work-table .sticky {
      position: sticky;
      left: 0;
      z-index: 8;
      background: var(--bg);
      text-align: left;
      padding: 6px 8px;
    }
    .work-table thead .sticky { z-index: 10; background: var(--surface-2); }
    .work-table .col-building { width: 70px; left: 0; }
    .work-table .col-period { width: 96px; left: 70px; }
    .work-table .col-item { width: 210px; left: 166px; }
    .work-table .col-value { width: 112px; left: 376px; text-align: right; }
    .work-table .date-cell { width: 46px; min-width: 46px; }
    .work-table .month-cell { height: 24px; font-size: 11px; text-align: center; }
    .work-table .day-cell { height: 26px; font-size: 11px; }
    .work-table .building-row td {
      background: oklch(0.985 0.025 28);
      color: var(--danger);
      font-weight: 900;
      height: 28px;
    }
    .work-table .period-row td {
      background: var(--surface);
      font-weight: 800;
      height: 28px;
    }
    .work-table .date-btn {
      display: grid;
      grid-template-rows: 1fr 1.5fr;
      gap: 1px;
      width: 100%;
      min-height: 48px;
      border: 0;
      border-radius: 0;
      padding: 2px;
      background: white;
      font-size: 10.5px;
      line-height: 1;
      position: relative;
      touch-action: manipulation;
    }
    .work-table .date-btn:hover { outline: 2px solid var(--primary-2); outline-offset: -2px; }
    .work-table .date-btn.selected {
      outline: 2px solid var(--primary);
      outline-offset: -2px;
      z-index: 2;
    }
    .work-table .cell-part {
      display: grid;
      align-items: center;
      justify-items: center;
      min-height: 18px;
      position: relative;
      border-radius: 2px;
    }
    .work-table .cell-part.actual-part {
      border-top: 1px solid var(--line);
      grid-template-rows: 1fr 1fr;
    }
    .work-table .cell-part.part-selected {
      background: oklch(0.96 0.025 160);
      box-shadow: inset 0 0 0 2px oklch(0.72 0.13 160);
      z-index: 2;
    }
    .work-table .cell-part.fill-source {
      outline: 2px solid var(--primary);
      outline-offset: -2px;
    }
    .work-table .cell-part.fill-range {
      box-shadow: inset 0 0 0 2px oklch(0.74 0.12 160);
      background: oklch(0.96 0.025 160);
    }
    .work-table .cell-part.fill-target {
      box-shadow: inset 0 0 0 2px var(--warning);
    }
    .fill-handle {
      position: absolute;
      right: -4px;
      bottom: -4px;
      width: 10px;
      height: 10px;
      border: 1px solid white;
      background: var(--primary);
      box-shadow: 0 0 0 1px var(--primary);
      cursor: crosshair;
      display: none;
      z-index: 5;
      touch-action: none;
    }
    .work-table .cell-part.part-primary .fill-handle {
      display: block;
    }
    .fill-mode {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 800;
    }
    .fill-mode select {
      width: auto;
      min-width: 156px;
    }
    .work-table .date-btn.actual { background: var(--actual-soft); }
    .work-table .date-btn .plan-line.has-plan {
      background: oklch(0.88 0.08 235);
      color: oklch(0.24 0.07 235);
      font-weight: 800;
    }
    .work-table .date-btn.actual .actual-line { background: var(--actual); color: white; }
    .work-table .date-btn.readonly { cursor: default; }
    .work-table .date-btn.readonly:hover { outline: 0; }
    .work-table .holiday, .work-table .holiday .date-btn {
      background: var(--holiday) !important;
    }
    .work-table .holiday-dark, .work-table .holiday-dark .date-btn {
      background: var(--holiday-dark) !important;
      color: white;
    }
    .plan-line, .actual-line, .cost-line {
      min-height: 13px;
      display: grid;
      place-items: center;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      overflow: visible;
    }
    .cost-line { color: var(--muted); font-size: 9.5px; }
    .summary-row td {
      background: var(--surface-2);
      height: 28px;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      font-size: 11px;
    }
    .summary-row .sticky { font-weight: 800; text-align: right; }
    .empty-row td {
      height: 74px;
      color: var(--muted);
      background: var(--bg);
      text-align: center;
      font-weight: 800;
    }
    .item-list {
      display: grid;
      gap: 10px;
    }
    .item-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--bg);
    }
    .item-card.is-disabled {
      background: var(--surface);
      opacity: 0.78;
    }
    .item-card-head {
      padding: 10px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .check-row {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 34px;
      font-size: 12px;
      font-weight: 800;
      color: var(--ink);
      white-space: nowrap;
    }
    .check-row input {
      width: auto;
      min-height: auto;
      accent-color: var(--primary);
    }
    .inline-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }
    .period-manager,
    .period-board,
    .period-editor {
      display: grid;
      gap: 12px;
      min-width: 0;
    }
    .period-toolbar-grid {
      display: grid;
      grid-template-columns: minmax(220px, 1.4fr) minmax(120px, 0.6fr) minmax(140px, 0.7fr) auto;
      gap: 8px;
      align-items: end;
    }
    .period-summary-strip {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 8px;
    }
    .period-summary-strip .metric {
      padding: 10px;
      background: var(--bg);
    }
    .period-summary-strip .metric strong {
      font-size: 19px;
    }
    .period-table {
      min-width: 860px;
    }
    .period-table th,
    .period-table td {
      white-space: nowrap;
    }
    .period-table td:nth-child(3) {
      white-space: normal;
      min-width: 220px;
    }
    .period-main-row td {
      background: var(--surface);
      font-weight: 800;
    }
    .period-sub-row {
      cursor: pointer;
    }
    .period-sub-row:hover td,
    .period-sub-row:focus-within td {

<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">TM</div>

    </div>
  </dialog>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const STORAGE_KEY = "tman.workplan.v1";
    const tabs = [
      ["dashboard", "สรุปโครงการ"],
      ["plan", "แผนงวดงาน"],
      ["periods", "งวดงานทั้งหมด"],
      ["workers", "คนงาน"],
      ["machines", "เครื่องจักร"],
      ["holidays", "วันหยุดบริษัท"],
      ["report", "รายงาน / Export"],
      ["backup", "สำรองข้อมูล"]
    ];

    const $ = (selector, root = document) => root.querySelector(selector);
    const $$ = (selector, root = document) => [...root.querySelectorAll(selector)];
    const uid = (prefix) => `${prefix}_${Math.random().toString(36).slice(2, 9)}`;
    const money = (value, digits = 0) => Number(value || 0).toLocaleString("th-TH", { maximumFractionDigits: digits, minimumFractionDigits: digits });
    const qty = (value) => {
      const num = Number(value || 0);
      if (!num) return "";
      return num.toLocaleString("th-TH", { maximumFractionDigits: Number.isInteger(num) ? 0 : 2 });
    };
    const pct = (value) => `${(Number(value || 0) * 100).toLocaleString("th-TH", { maximumFractionDigits: 2 })}%`;
    const n = (value) => Number(value || 0);
    const esc = (value) => String(value ?? "").replace(/[&<>"']/g, (ch) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));

    let activeTab = "dashboard";
    let state = null;
    let cellDraft = null;
    let fillDrag = null;
    let selectDrag = null;
    let undoStack = [];
    let redoStack = [];
    let appClipboard = null;
    let suppressCellClick = false;
    let toastTimer = null;

    function makePlan() { return {}; }
    function makeActual() { return {}; }
    function setPlan(item, date, value) {
      const bucket = activeWorkPlan() ? ensurePlanItemData(item) : item;
      bucket.plan = bucket.plan || {};
      const amount = Math.max(0, Math.round(Number(value || 0)));
      if (value === "" || value === null || value === undefined || amount === 0) delete bucket.plan[date];
      else bucket.plan[date] = amount;
    }
    function setPlanRange(item, start, end, value) {
      getDates(start, end).forEach((date) => setPlan(item, date, value));
    }
    function setActual(item, date, entries) {
      const bucket = activeWorkPlan() ? ensurePlanItemData(item) : item;
      bucket.actual = bucket.actual || {};
      bucket.actual[date] = entries;
    }

    function mainNoFromNo(no) {
      const value = String(no || "").trim();
      return value.includes(".") ? value.split(".")[0] : value;
    }

    function createDefaultState() {
      const workers = [
        { id: "w001", code: "W001", name: "คนงานตัวอย่าง 1", dailyWage: 625 },
        { id: "w002", code: "W002", name: "คนงานตัวอย่าง 2", dailyWage: 537 },
        { id: "w003", code: "W003", name: "คนงานตัวอย่าง 3", dailyWage: 503 },
        { id: "w004", code: "W004", name: "คนงานตัวอย่าง 4", dailyWage: 432 }
      ];
      const machines = [
        { id: "m001", name: "เครื่องจักรตัวอย่าง", dailyCost: 1620 }
      ];
      const gSteel = { id: "i_g_steel", name: "งานเหล็ก", laborValue: 147986.5, progressPct: 70, plan: makePlan(), actual: makeActual() };
      const gForm = { id: "i_g_form", name: "งานไม้แบบ", laborValue: 124080, progressPct: 65, plan: makePlan(), actual: makeActual() };
      const gConcrete = { id: "i_g_concrete", name: "งานคอนกรีตโครงสร้างผสมน้ำยากันซึม", laborValue: 104650, progressPct: 0, plan: makePlan(), actual: makeActual() };
      const iFence = { id: "i_i_fence", name: "งานโครงสร้างรั้ว 50%", laborValue: 172233.8, progressPct: 25, plan: makePlan(), actual: makeActual() };
      const iPipe = { id: "i_i_pipe", name: "งานวางท่อค.ส.ล. (120 เมตร)", laborValue: 79800, progressPct: 50, plan: makePlan(), actual: makeActual() };

      setPlanRange(gSteel, "2026-05-26", "2026-05-30", 8);
      setPlanRange(gSteel, "2026-06-01", "2026-06-05", 8);
      setPlanRange(gSteel, "2026-06-06", "2026-06-09", 4);
      setPlanRange(gForm, "2026-06-04", "2026-06-10", 4);
      setPlanRange(gForm, "2026-07-04", "2026-07-10", 8);
      setPlanRange(gConcrete, "2026-06-21", "2026-06-23", 8);
      setPlanRange(iFence, "2026-05-26", "2026-05-30", 7);
      setPlanRange(iFence, "2026-06-01", "2026-06-12", 8);
      setPlanRange(iFence, "2026-06-15", "2026-06-27", 8);
      setPlanRange(iFence, "2026-07-01", "2026-07-25", 8);
      setPlanRange(iPipe, "2026-06-04", "2026-06-12", 4);
      setPlanRange(iPipe, "2026-07-03", "2026-07-07", 5);

      setActual(gSteel, "2026-05-26", [
        { workerId: "w001", unit: "full", hours: 9 },
        { workerId: "w002", unit: "full", hours: 9 }
      ]);
      setActual(gForm, "2026-06-06", [
        { workerId: "w003", unit: "half", hours: 4.5 }
      ]);
      setActual(iFence, "2026-06-15", [
        { workerId: "w004", unit: "full", hours: 9 }
      ]);

      return {
        version: 1,
        settings: {
          projectName: "TMAN RESIDENCE",
          startDate: "2026-05-26",
          endDate: "2026-07-31",
          updateDate: "2026-06-19",
          dayHours: 9,
          controlPercent: 70
        },
        ui: {
          planView: "G",
          manualView: "GI",
          reportView: "GI"
        },
        manual: {
          G: { contractLaborCost: 0, costToUpdate: 0, note: "" },
          I: { contractLaborCost: 0, costToUpdate: 0, note: "" },
          GI: { contractLaborCost: 6946084.9, costToUpdate: 5991943.33, note: "ชี้แจงค่าแรงแล้ว เหลือค่าแรงที่" }
        },
        workers,
        machines,
        holidays: [
          { id: "h_2026_05_31", date: "2026-05-31", name: "วันหยุดบริษัท" },
          { id: "h_2026_06_13", date: "2026-06-13", name: "วันหยุดบริษัท" },
          { id: "h_2026_06_14", date: "2026-06-14", name: "วันหยุดบริษัท" },
          { id: "h_2026_06_28", date: "2026-06-28", name: "วันหยุดบริษัท" },
          { id: "h_2026_07_12", date: "2026-07-12", name: "วันหยุดบริษัท" },
          { id: "h_2026_07_26", date: "2026-07-26", name: "วันหยุดบริษัท" },
          { id: "h_2026_07_27", date: "2026-07-27", name: "วันหยุดบริษัท" },
          { id: "h_2026_07_28", date: "2026-07-28", name: "วันหยุดบริษัท" }
        ],
        periods: [
          { id: "p_g_51", building: "G", mainNo: "5", mainValue: 376716.5, no: "5.1", title: "งวดงานที่ 5.1", description: "ได้ทำงานโครงสร้างเสา ชั้น 1 และคาน + พื้น ค.ส.ล. ชั้น 2 แล้วเสร็จ", status: "กำลังทำ", periodValue: 376716.5, periodPercent: 100, items: [gSteel, gForm, gConcrete] },
          { id: "p_i_1", building: "I", mainNo: "1", mainValue: 172233.8, no: "1", title: "งวดงานที่ 1", description: "ได้ทำงานโครงสร้างรั้ว ค.ส.ล. แล้วเสร็จ 50%", status: "กำลังทำ", periodValue: 172233.8, periodPercent: 100, items: [iFence] },
          { id: "p_i_9", building: "I", mainNo: "9", mainValue: 79800, no: "9", title: "งวดงานที่ 9", description: "ได้ทำงานระบบสุขาภิบาลภายนอก แล้วเสร็จ 30%", status: "กำลังทำ", periodValue: 79800, periodPercent: 100, items: [iPipe] }
        ],
        machineUsage: {
          G: {},
          I: {
            "2026-05-29": [{ id: "mu_1", machineId: "m001", amount: 1620 }],
            "2026-05-30": [{ id: "mu_2", machineId: "m001", amount: 1620 }],
            "2026-06-01": [{ id: "mu_3", machineId: "m001", amount: 1620 }]
          }
        }
      };
    }

    function cloneActual(actual = {}) {
      return Object.fromEntries(Object.entries(actual || {}).map(([date, rows]) => [date, (rows || []).map((row) => ({ ...row }))]));
    }

    function cloneMachineUsage(machineUsage = {}) {
      return {
        G: Object.fromEntries(Object.entries(machineUsage.G || {}).map(([date, rows]) => [date, (rows || []).map((row) => ({ ...row }))])),
        I: Object.fromEntries(Object.entries(machineUsage.I || {}).map(([date, rows]) => [date, (rows || []).map((row) => ({ ...row }))]))
      };
    }

    function cloneManual(manual = {}) {
      return {
        G: { contractLaborCost: 0, costToUpdate: 0, note: "", ...(manual.G || {}) },
        I: { contractLaborCost: 0, costToUpdate: 0, note: "", ...(manual.I || {}) },
        GI: { contractLaborCost: 0, costToUpdate: 0, note: "", ...(manual.GI || {}) }
      };
    }

    function legacyItemData(periods = []) {
      const itemData = {};
      periods.forEach((period) => {
        (period.items || []).forEach((item) => {
          itemData[item.id] = {
            plan: { ...(item.plan || {}) },
            actual: cloneActual(item.actual || {})
          };
        });
      });
      return itemData;
    }

    function normalizeWorkPlan(plan, next, index) {
      const fallbackNo = String(index + 1);
      plan.id = plan.id || uid("wp");
      plan.claimNo = String(plan.claimNo || fallbackNo);
      plan.status = plan.status || "กำลังทำ";
      plan.startDate = plan.startDate || next.settings.startDate || "2026-05-26";
      plan.endDate = plan.endDate || next.settings.endDate || "2026-07-31";
      plan.updateDate = plan.updateDate || next.settings.updateDate || plan.startDate;
      plan.periodIds = Array.isArray(plan.periodIds) ? plan.periodIds : [];
      plan.itemData = plan.itemData || {};
      Object.values(plan.itemData).forEach((data) => {
        data.plan = data.plan || {};
        Object.keys(data.plan).forEach((date) => {
          const amount = Math.max(0, Math.round(n(data.plan[date])));
          if (amount) data.plan[date] = amount;
          else delete data.plan[date];
        });
        data.actual = cloneActual(data.actual || {});
      });
      plan.machineUsage = cloneMachineUsage(plan.machineUsage || {});
      plan.manual = cloneManual(plan.manual || next.manual);
      return plan;
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return normalizeState(createDefaultState());
        const parsed = JSON.parse(raw);
        if (!parsed.version) return normalizeState(createDefaultState());
        return normalizeState(parsed);
      } catch (error) {
        console.warn(error);
        return normalizeState(createDefaultState());
      }
    }

    function normalizeState(next) {
      next.settings = next.settings || {};
      next.settings.dayHours = next.settings.dayHours || 9;
      next.manual = next.manual || {};
      next.manual.G = next.manual.G || { contractLaborCost: 0, costToUpdate: 0, note: "" };
      next.manual.I = next.manual.I || { contractLaborCost: 0, costToUpdate: 0, note: "" };
      next.manual.GI = next.manual.GI || { contractLaborCost: 0, costToUpdate: 0, note: "" };
      next.workers = Array.isArray(next.workers) ? next.workers : [];
      next.machines = Array.isArray(next.machines) ? next.machines : [];
      next.holidays = Array.isArray(next.holidays) ? next.holidays : [];
      next.periods = Array.isArray(next.periods) ? next.periods : [];
      next.periods.forEach((period) => {
        period.items = Array.isArray(period.items) ? period.items : [];
        period.items.forEach((item) => {
          item.plan = item.plan || {};
          item.actual = item.actual || {};
          item.laborValue = n(item.laborValue);
          item.progressPct = n(item.progressPct);
        });
        period.enabled = period.enabled !== false;
        if (period.periodValue === undefined || period.periodValue === null || period.periodValue === "") {
          period.periodValue = period.items.reduce((sum, item) => sum + n(item.laborValue), 0);
        } else {
          period.periodValue = n(period.periodValue);
        }
        period.mainNo = String(period.mainNo || mainNoFromNo(period.no)).trim();
      });
      const groupValues = new Map();
      next.periods.forEach((period) => {
        const key = `${period.building}|${period.mainNo}`;
        const existing = groupValues.get(key) || { explicit: 0, sum: 0 };
        if (n(period.mainValue) > 0) existing.explicit = Math.max(existing.explicit, n(period.mainValue));
        existing.sum += n(period.periodValue);
        groupValues.set(key, existing);
      });
      next.periods.forEach((period) => {
        const key = `${period.building}|${period.mainNo}`;
        const group = groupValues.get(key);
        period.mainValue = n(period.mainValue) || group?.explicit || group?.sum || n(period.periodValue);
        period.periodPercent = period.mainValue ? n(period.periodValue) / n(period.mainValue) * 100 : n(period.periodPercent);
      });
      next.machineUsage = next.machineUsage || { G: {}, I: {} };
      next.machineUsage.G = next.machineUsage.G || {};
      next.machineUsage.I = next.machineUsage.I || {};
      next.ui = next.ui || {};
      if (!Array.isArray(next.workPlans) || !next.workPlans.length) {
        const firstId = "wp_1";
        next.workPlans = [{
          id: firstId,
          claimNo: "1",
          status: "กำลังทำ",
          startDate: next.settings.startDate || "2026-05-26",
          endDate: next.settings.endDate || "2026-07-31",
          updateDate: next.settings.updateDate || "2026-06-19",
          periodIds: next.periods.filter((period) => period.enabled !== false).map((period) => period.id),
          itemData: legacyItemData(next.periods),
          machineUsage: cloneMachineUsage(next.machineUsage),
          manual: cloneManual(next.manual)
        }];
        next.ui.activeWorkPlanId = firstId;
      }
      next.workPlans = next.workPlans.map((plan, index) => normalizeWorkPlan(plan, next, index));
      if (!next.workPlans.some((plan) => plan.id === next.ui.activeWorkPlanId)) next.ui.activeWorkPlanId = next.workPlans[0]?.id || "";
      if (!["all", "plan", "actual", "planActual", "machine"].includes(next.ui.fillMode)) next.ui.fillMode = "all";
      if (!["hide", "move"].includes(next.ui.workerListMode)) next.ui.workerListMode = "hide";
      return next;
    }

    state = loadState();

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function stateSnapshot() {
      return JSON.stringify(state);
    }

    function recordHistory(label = "แก้ไข") {
      undoStack.push({ label, snapshot: stateSnapshot() });
      if (undoStack.length > 60) undoStack.shift();
      redoStack = [];
      updateHistoryButtons();
    }

    function restoreSnapshot(snapshot) {
      state = normalizeState(JSON.parse(snapshot));
      saveState();
      renderAll();
      updateHistoryButtons();
    }

    function undo() {
      const entry = undoStack.pop();
      if (!entry) return showToast("ไม่มีรายการให้ย้อนกลับ");
      redoStack.push({ label: entry.label, snapshot: stateSnapshot() });
      restoreSnapshot(entry.snapshot);
      showToast(`ย้อนกลับ: ${entry.label}`);
    }

    function redo() {
      const entry = redoStack.pop();
      if (!entry) return showToast("ไม่มีรายการให้ไปหน้า");
      undoStack.push({ label: entry.label, snapshot: stateSnapshot() });
      restoreSnapshot(entry.snapshot);
      showToast(`ไปหน้า: ${entry.label}`);
    }

    function updateHistoryButtons() {
      const undoButton = $("#undoBtn");
      const redoButton = $("#redoBtn");
      if (undoButton) undoButton.disabled = !undoStack.length;
      if (redoButton) redoButton.disabled = !redoStack.length;
    }

    function activeWorkPlan() {
      if (!state?.workPlans?.length) return null;
      return state.workPlans.find((plan) => plan.id === state.ui?.activeWorkPlanId) || state.workPlans[0];
    }

    function workPlanLabel(plan = activeWorkPlan()) {
      return plan ? `เบิกงวดครั้งที่ ${plan.claimNo || ""}`.trim() : "ยังไม่มีแผนเบิกงวด";
    }

    function planStartDate(plan = activeWorkPlan()) {
      return plan?.startDate || state.settings.startDate;
    }

    function planEndDate(plan = activeWorkPlan()) {
      return plan?.endDate || state.settings.endDate;
    }

    function planUpdateDate(plan = activeWorkPlan()) {
      return plan?.updateDate || state.settings.updateDate;
    }

    function ensurePlanItemData(item, plan = activeWorkPlan()) {
      if (!item?.id) return { plan: {}, actual: {} };
      if (!plan) return item;
      plan.itemData = plan.itemData || {};
      plan.itemData[item.id] = plan.itemData[item.id] || { plan: {}, actual: {} };
      plan.itemData[item.id].plan = plan.itemData[item.id].plan || {};
      plan.itemData[item.id].actual = plan.itemData[item.id].actual || {};
      return plan.itemData[item.id];
    }

    function itemPlanValue(item, date) {
      if (!item?.id) return 0;
      return n(ensurePlanItemData(item).plan?.[date]);
    }

    function activeMachineUsage(plan = activeWorkPlan()) {
      if (!plan) return state.machineUsage || { G: {}, I: {} };
      plan.machineUsage = plan.machineUsage || {};
      plan.machineUsage.G = plan.machineUsage.G || {};
      plan.machineUsage.I = plan.machineUsage.I || {};
      return plan.machineUsage;
    }

    function showToast(message) {
      const toast = $("#toast");
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 2400);
    }

    function getDates(start = planStartDate(), end = planEndDate()) {
      const dates = [];
      const current = new Date(`${start}T00:00:00`);
      const last = new Date(`${end}T00:00:00`);
      if (Number.isNaN(current.getTime()) || Number.isNaN(last.getTime()) || current > last) return dates;
      while (current <= last) {
        dates.push(localISODate(current));
        current.setDate(current.getDate() + 1);
      }
      return dates;
    }

    function localISODate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function dateLabel(date) {
      const d = new Date(`${date}T00:00:00`);
      return d.toLocaleDateString("th-TH", { day: "numeric", month: "short", year: "numeric" });
    }

    function monthLabel(date) {
      const d = new Date(`${date}T00:00:00`);
      return d.toLocaleDateString("th-TH", { month: "long" });
    }

    function dayNumber(date) {
      return new Date(`${date}T00:00:00`).getDate();
    }

    function isHoliday(date) {
      return state.holidays.some((holiday) => holiday.date === date);
    }

    function getWorker(id) {
      return state.workers.find((worker) => worker.id === id);
    }

    function getMachine(id) {
      return state.machines.find((machine) => machine.id === id);
    }

    function getPeriod(id) {
      return state.periods.find((period) => period.id === id);
    }

    function getItem(period, itemId) {
      return period?.items.find((item) => item.id === itemId);
    }

    function buildingsForView(view) {
      return view === "GI" ? ["G", "I"] : [view];
    }

    function periodEnabled(period) {
      const plan = activeWorkPlan();
      if (!plan) return period?.enabled !== false;
      return (plan.periodIds || []).includes(period.id);
    }

    function setPeriodEnabled(periodId, enabled, plan = activeWorkPlan()) {
      if (!plan || !periodId) return;
      const ids = new Set(plan.periodIds || []);
      if (enabled) ids.add(periodId);
      else ids.delete(periodId);
      plan.periodIds = [...ids];
    }

    const PERIOD_STATUSES = ["รอทำ", "กำลังทำ", "เสร็จแล้ว", "พักไว้", "ยกเลิก"];

    function periodStatusOptions(value = "") {
      const current = value || "รอทำ";
      const options = PERIOD_STATUSES.includes(current) ? PERIOD_STATUSES : [current, ...PERIOD_STATUSES];
      return options.map((status) => `<option value="${esc(status)}" ${status === current ? "selected" : ""}>${esc(status)}</option>`).join("");
    }

    function periodStatusClass(status = "") {
      if (status === "เสร็จแล้ว") return "green";
      if (status === "กำลังทำ") return "amber";
      if (status === "พักไว้") return "";
      if (status === "ยกเลิก") return "red";
      return "";
    }

    function allBuildings() {
      return [...new Set(["G", "I", ...state.periods.map((period) => period.building).filter(Boolean)])];
    }

    function periodDisplayTitle(period) {
      return `งวดงานที่ ${period?.no || ""}`.trim();
    }

    function periodSearchText(period) {
      return [period.building, periodMainNo(period), period.no, period.title, period.description, period.status].join(" ").toLowerCase();
    }

    function periodFilters() {
      return {
        search: String(state.ui.periodSearch || "").trim().toLowerCase(),
        building: state.ui.periodBuilding || "all",
        status: state.ui.periodStatus || "all"
      };
    }

    function periodMatchesFilters(period, filters = periodFilters()) {
      if (filters.building !== "all" && period.building !== filters.building) return false;
      if (filters.status !== "all" && (period.status || "รอทำ") !== filters.status) return false;
      if (filters.search && !periodSearchText(period).includes(filters.search)) return false;
      return true;
    }

    function periodGroupRows(building, filters = periodFilters()) {
      const groups = new Map();
      state.periods
        .filter((period) => period.building === building && periodMatchesFilters(period, filters))
        .sort((a, b) => naturalSort(periodMainNo(a), periodMainNo(b)) || naturalSort(a.no, b.no))
        .forEach((period) => {
          const mainNo = periodMainNo(period);
          const group = groups.get(mainNo) || { building, mainNo, rows: [] };
          group.rows.push(period);
          groups.set(mainNo, group);
        });
      return [...groups.values()].sort((a, b) => naturalSort(a.mainNo, b.mainNo));
    }

    function fullMainGroup(period) {
      const mainNo = periodMainNo(period);
      return state.periods
        .filter((row) => row.building === period.building && periodMainNo(row) === mainNo)
        .sort((a, b) => naturalSort(a.no, b.no));
    }

    function groupSummary(rows) {
      const first = rows[0] || {};
      const mainValue = rows.reduce((best, row) => Math.max(best, n(row.mainValue)), n(first.mainValue));
      return {
        mainValue,
        subValue: rows.reduce((sum, row) => sum + n(row.periodValue), 0),
        laborValue: rows.reduce((sum, row) => sum + periodLaborValue(row), 0),
        activeCount: rows.filter(periodEnabled).length,
        count: rows.length
      };
    }

    function nextSubPeriodNo(period) {
      const mainNo = periodMainNo(period);
      const used = fullMainGroup(period)
        .map((row) => String(row.no || ""))
        .filter((no) => no.startsWith(`${mainNo}.`))
        .map((no) => Number(no.slice(mainNo.length + 1)))
        .filter((num) => Number.isFinite(num));
      return `${mainNo}.${(used.length ? Math.max(...used) : 0) + 1}`;
    }

    function periodsForBuilding(building, activeOnly = true) {
      return state.periods.filter((period) => period.building === building && (!activeOnly || periodEnabled(period)));
    }

    function periodsForView(view) {
      const buildings = buildingsForView(view);
      return state.periods.filter((period) => buildings.includes(period.building) && periodEnabled(period));
    }

    function getQuickEntry(view = state.ui.planView || "G") {
      state.ui.quickEntry = state.ui.quickEntry || {};
      const quick = state.ui.quickEntry;
      if (view !== "GI") quick.building = view;
      if (!["G", "I"].includes(quick.building)) quick.building = "G";
      const buildingPeriods = periodsForBuilding(quick.building);
      if (!buildingPeriods.some((period) => period.id === quick.periodId)) quick.periodId = buildingPeriods[0]?.id || "";
      const period = getPeriod(quick.periodId);
      if (!period?.items.some((item) => item.id === quick.itemId)) quick.itemId = period?.items[0]?.id || "";
      const dates = getDates();
      if (!dates.includes(quick.date)) quick.date = dates.includes(planUpdateDate()) ? planUpdateDate() : dates[0] || "";
      if (!state.workers.some((worker) => worker.id === quick.workerId)) quick.workerId = state.workers[0]?.id || "";
      if (!state.machines.some((machine) => machine.id === quick.machineId)) quick.machineId = state.machines[0]?.id || "";
      if (!["full", "half", "hours"].includes(quick.unit)) quick.unit = "full";
      if (!quick.hours) quick.hours = state.settings.dayHours;
      if (quick.machineAmount === undefined || quick.machineAmount === null || quick.machineAmount === "") quick.machineAmount = getMachine(quick.machineId)?.dailyCost || 0;
      return quick;
    }

    function selectedQuickRefs() {
      const quick = getQuickEntry();
      const period = getPeriod(quick.periodId);
      const item = getItem(period, quick.itemId);
      return { quick, period, item };
    }

    function laborUnits(entry) {
      if (entry.unit === "full") return 1;
      if (entry.unit === "half") return 0.5;
      return Math.max(0, Number(entry.hours || 0) / Number(state.settings.dayHours || 9));
    }

    function laborAmount(entry) {
      const worker = getWorker(entry.workerId);
      if (!worker) return 0;
      return Number(worker.dailyWage || 0) * laborUnits(entry);
    }

    function actualEntries(item, date) {
      if (!item?.id) return [];
      return ensurePlanItemData(item).actual?.[date] || [];
    }

    function itemActualUnits(item, date) {
      return actualEntries(item, date).reduce((sum, entry) => sum + laborUnits(entry), 0);
    }

    function itemLaborCost(item, date) {
      return actualEntries(item, date).reduce((sum, entry) => sum + laborAmount(entry), 0);
    }

    function totalPlanned(view, date) {
      return periodsForView(view).reduce((sum, period) => sum + period.items.reduce((inner, item) => inner + itemPlanValue(item, date), 0), 0);
    }

    function totalActualUnits(view, date) {
      return periodsForView(view).reduce((sum, period) => sum + period.items.reduce((inner, item) => inner + itemActualUnits(item, date), 0), 0);
    }

    function totalLaborCost(view, date) {
      return periodsForView(view).reduce((sum, period) => sum + period.items.reduce((inner, item) => inner + itemLaborCost(item, date), 0), 0);
    }

    function totalMachineCost(view, date) {
      const usage = activeMachineUsage();
      return buildingsForView(view).reduce((sum, building) => {
        const list = usage?.[building]?.[date] || [];
        return sum + list.reduce((inner, row) => inner + n(row.amount), 0);
      }, 0);
    }

    function totalSpend(view, date) {
      return totalLaborCost(view, date) + totalMachineCost(view, date);
    }

    function totalLaborValue(view) {
      return periodsForView(view).reduce((sum, period) => sum + period.items.reduce((inner, item) => inner + n(item.laborValue), 0), 0);
    }

    function periodLaborValue(period) {
      return (period?.items || []).reduce((sum, item) => sum + n(item.laborValue), 0);
    }

    function periodMainNo(period) {
      return String(period?.mainNo || mainNoFromNo(period?.no)).trim();
    }

    function periodMainKey(period) {
      return `${period?.building || ""}|${periodMainNo(period)}`;
    }

    function updatePeriodPercent(period) {
      period.periodPercent = n(period.mainValue) ? n(period.periodValue) / n(period.mainValue) * 100 : 0;
    }

    function setPeriodMainValue(period, value) {
      const mainNo = periodMainNo(period);
      const amount = n(value);
      state.periods
        .filter((row) => row.building === period.building && periodMainNo(row) === mainNo)
        .forEach((row) => {
          row.mainNo = mainNo;
          row.mainValue = amount;
          updatePeriodPercent(row);
        });
    }

    function setPeriodValue(period, value) {
      period.periodValue = n(value);
      updatePeriodPercent(period);
    }

    function setPeriodPercent(period, value) {
      period.periodPercent = n(value);
      period.periodValue = n(period.mainValue) * n(value) / 100;
    }

    function mainPeriodSummaries(building) {
      const map = new Map();
      state.periods.filter((period) => period.building === building).forEach((period) => {
        const mainNo = periodMainNo(period);
        const key = `${building}|${mainNo}`;
        const summary = map.get(key) || { building, mainNo, mainValue: n(period.mainValue), subValue: 0, laborValue: 0, count: 0, activeCount: 0 };
        summary.mainValue = n(period.mainValue) || summary.mainValue;
        summary.subValue += n(period.periodValue);
        summary.laborValue += periodLaborValue(period);
        summary.count++;
        if (periodEnabled(period)) summary.activeCount++;
        map.set(key, summary);
      });
      return [...map.values()].sort((a, b) => naturalSort(a.mainNo, b.mainNo));
    }

    function naturalSort(a, b) {
      return String(a).localeCompare(String(b), "th-TH", { numeric: true, sensitivity: "base" });
    }

    function periodPlanUnits(period) {
      return (period?.items || []).reduce((sum, item) => sum + Object.values(ensurePlanItemData(item).plan || {}).reduce((inner, value) => inner + n(value), 0), 0);
    }

    function periodActualUnits(period) {
      return (period?.items || []).reduce((sum, item) => sum + Object.keys(ensurePlanItemData(item).actual || {}).reduce((inner, date) => inner + itemActualUnits(item, date), 0), 0);
    }

    function periodLaborActual(period) {
      const dates = getDates().filter((date) => date <= planUpdateDate());
      return (period?.items || []).reduce((sum, item) => sum + dates.reduce((inner, date) => inner + itemLaborCost(item, date), 0), 0);
    }

    function totalPeriodValue(view) {
      const groups = new Map();
      periodsForView(view).forEach((period) => {
        const key = periodMainKey(period);
        const current = groups.get(key) || { mainValue: n(period.mainValue), subValue: 0 };
        current.mainValue = n(period.mainValue) || current.mainValue;
        current.subValue += n(period.periodValue);
        groups.set(key, current);
      });
      return [...groups.values()].reduce((sum, group) => sum + (n(group.mainValue) || n(group.subValue)), 0);
    }

    function costStatus(ratio) {
      if (ratio >= 1) return "danger";
      if (ratio >= 0.85) return "warning";
      return "normal";
    }

    function summaryFor(view) {
      const dates = getDates().filter((date) => date <= planUpdateDate());
      const periodValue = totalPeriodValue(view);
      const laborValue = totalLaborValue(view);
      const laborActual = dates.reduce((sum, date) => sum + totalLaborCost(view, date), 0);
      const machineActual = dates.reduce((sum, date) => sum + totalMachineCost(view, date), 0);
      const total = laborActual + machineActual;
      const control = laborValue * n(state.settings.controlPercent) / 100;
      const plan = activeWorkPlan();
      const manual = plan?.manual?.[view] || state.manual[view] || { contractLaborCost: 0, costToUpdate: 0, note: "" };
      return {
        view,
        periodValue,
        laborValue,
        control,
        laborActual,
        machineActual,
        total,
        balance: control - total,
        costRatio: control ? total / control : 0,
        currentRatio: laborValue ? total / laborValue : 0,
        manual,
        manualRatio: n(manual.contractLaborCost) ? n(manual.costToUpdate) / n(manual.contractLaborCost) : 0
      };
    }

    function workerAssignedInfo(workerId, date, ignore) {
      for (const period of periodsForView("GI")) {
        for (const item of period.items) {
          const entries = actualEntries(item, date);
          for (let index = 0; index < entries.length; index++) {
            const entry = entries[index];
            const sameCell = ignore && ignore.periodId === period.id && ignore.itemId === item.id && ignore.date === date;
            if (entry.workerId === workerId && !sameCell) {
              return { period, item, entry, index, date };
            }
          }
        }
      }
      return null;
    }

    function workerListMode() {
      return state.ui?.workerListMode === "move" ? "move" : "hide";
    }

    function assignedLabel(assigned) {
      return `หลัง ${assigned.period.building} งวด ${assigned.period.no} · ${assigned.item.name}`;
    }

    function removeWorkerFromAssignment(assigned, date) {
      if (!assigned?.item || !date) return;
      const entries = actualEntries(assigned.item, date);
      const nextRows = entries.filter((row) => row.workerId !== assigned.entry.workerId);
      const data = ensurePlanItemData(assigned.item);
      if (nextRows.length) data.actual[date] = nextRows;
      else delete data.actual[date];
    }

    function transferToken(assigned) {
      return assigned ? `${assigned.period.id}|${assigned.item.id}|${assigned.index}` : "";
    }

    function confirmWorkerMove(worker, assigned) {
      return confirm(`${worker.code} · ${worker.name} ถูกใช้แล้วที่ ${assignedLabel(assigned)}\nต้องการย้ายมาช่องนี้แทนหรือไม่?`);
    }

    function workerOption(worker, assigned, selected = false, disabled = false, extraLabel = "") {
      const used = Boolean(assigned) || Boolean(extraLabel);
      const suffix = assigned ? `ใช้แล้วที่ ${assignedLabel(assigned)}` : extraLabel || money(worker.dailyWage, 0);
      const style = used ? `style="background:#d9fbe8;color:#064e3b;font-weight:800"` : "";
      return `<option value="${worker.id}" ${selected ? "selected" : ""} ${disabled ? "disabled" : ""} ${style}>${esc(worker.code)} · ${esc(worker.name)} · ${esc(suffix)}</option>`;
    }

    function duplicateWorkerInDraft(workerId) {
      return cellDraft.assignments.filter((row) => row.workerId === workerId).length > 1;
    }

    function renderNav() {
      const desktop = $("#desktopNav");
      const mobile = $("#mobileNav");
      desktop.innerHTML = tabs.map(([id, label]) => `<button data-tab="${id}" aria-selected="${activeTab === id}">${label}</button>`).join("");
      mobile.innerHTML = tabs.map(([id, label]) => `<option value="${id}" ${activeTab === id ? "selected" : ""}>${label}</option>`).join("");
      $("#pageTitle").textContent = tabs.find(([id]) => id === activeTab)?.[1] || "TMAN WorkPlan";
      $("#topMeta").innerHTML = [
        workPlanLabel(),
        `อัปเดต ${esc(dateLabel(planUpdateDate()))}`,
        `${esc(dateLabel(planStartDate()))} ถึง ${esc(dateLabel(planEndDate()))}`,
        `ฐานวันละ ${money(state.settings.dayHours, 0)} ชม.`
      ].map((x) => `<span>${x}</span>`).join("");
    }

    function setActiveTab(tab) {
      activeTab = tab;
      $$(".tab-panel").forEach((panel) => panel.classList.toggle("active", panel.id === `tab-${tab}`));
      renderNav();
      renderActiveTab();
    }

    function renderActiveTab() {
      if (activeTab === "dashboard") renderDashboard();
      if (activeTab === "plan") renderPlan();
      if (activeTab === "periods") renderPeriods();
      if (activeTab === "workers") renderWorkers();
      if (activeTab === "machines") renderMachines();
      if (activeTab === "holidays") renderHolidays();
      if (activeTab === "report") renderReport();
      if (activeTab === "backup") renderBackup();
    }

    function renderDashboard() {
      const el = $("#tab-dashboard");
      const main = summaryFor("GI");
      const balanceClass = main.balance < 0 ? "danger" : "";
      const kpis = [
        ["มูลค่างวดงานรวม", money(main.periodValue, 0)],
        ["มูลค่าค่าแรงรวม", money(main.laborValue, 0)],
        [`ค่าแรงควบคุม ${money(state.settings.controlPercent, 0)}%`, money(main.control, 0)],
        ["ค่าแรงจริงสะสม", money(main.laborActual, 0)],
        ["ค่าเครื่องจักรสะสม", money(main.machineActual, 0)],
        [main.balance < 0 ? "เกินงบควบคุม" : "คงเหลืองบควบคุม", money(Math.abs(main.balance), 0)]
      ];
      const comparison = ["G", "I", "GI"].map((view) => {
        const s = summaryFor(view);
        const label = view === "GI" ? "รวม G+I" : `หลัง ${view}`;
        const ratio = Math.round(s.costRatio * 100);
        const status = costStatus(s.costRatio);
        return `
          <div class="comparison-card">
            <header>
              <h3>${label}</h3>
              <span class="pill ${status === "danger" ? "red" : status === "warning" ? "amber" : "green"}">${money(ratio, 0)}%</span>
            </header>
            <div class="budget-bar ${status}" style="--pct:${Math.min(100, ratio)}"><span></span></div>
            <div class="metric-grid">
              <div><span>ค่าแรงจริง</span><strong>${money(s.laborActual, 0)}</strong></div>
              <div><span>เครื่องจักร</span><strong>${money(s.machineActual, 0)}</strong></div>
              <div><span>งบควบคุม</span><strong>${money(s.control, 0)}</strong></div>
              <div><span>${s.balance < 0 ? "เกิน" : "คงเหลือ"}</span><strong>${money(Math.abs(s.balance), 0)}</strong></div>
            </div>
          </div>
        `;
      }).join("");
      const mixTotal = main.laborActual + main.machineActual + n(main.manual.costToUpdate);
      const mix = {
        labor: mixTotal ? main.laborActual / mixTotal * 100 : 0,
        machine: mixTotal ? main.machineActual / mixTotal * 100 : 0,
        manual: mixTotal ? n(main.manual.costToUpdate) / mixTotal * 100 : 0
      };
      const periodRows = periodsForView("GI").map((period) => {
        const laborValue = periodLaborValue(period);
        const laborActual = periodLaborActual(period);
        const ratio = laborValue ? laborActual / laborValue : 0;
        const status = costStatus(ratio);
        return `
          <tr>
            <td><span class="status-dot ${status === "normal" ? "" : status}"></span>หลัง ${period.building}</td>
            <td>งวด ${esc(periodMainNo(period))} / ${esc(period.no)}</td>
            <td>${esc(period.title)}</td>
            <td class="num">${money(period.periodValue, 0)}</td>
            <td class="num">${money(laborValue, 0)}</td>
            <td class="num">${money(laborActual, 0)}</td>
            <td class="num">${money(ratio * 100, 1)}%</td>
          </tr>
        `;
      }).join("") || `<tr><td colspan="7" class="muted">ยังไม่ได้เลือกงวดงานสำหรับรอบนี้</td></tr>`;

        const amount = updateDates.reduce((sum, date) => sum + itemLaborCost(item, date), 0);

            machineTotals.set(key, current);

      el.innerHTML = `
        <div class="dashboard-shell">
          ${renderWorkPlanPanel()}
          <div class="dashboard-hero">
            <div class="dashboard-hero-main">
              <div>
                <h2>${esc(state.settings.projectName)} Cost Overview</h2>
                <p class="muted">${esc(workPlanLabel())} · อัปเดต ${esc(dateLabel(planUpdateDate()))} · ช่วงแผน ${esc(dateLabel(planStartDate()))} ถึง ${esc(dateLabel(planEndDate()))}</p>
              </div>
              <span class="pill ${balanceClass || "green"}">${main.balance < 0 ? "เกินงบ" : "อยู่ในงบ"}</span>
            </div>
            <div class="dashboard-kpis">
              ${kpis.map(([label, value], index) => `
                <div class="dashboard-kpi ${index === 5 ? balanceClass : ""}">
                  <span>${label}</span>
                  <strong>${value}</strong>
                </div>
              `).join("")}
            </div>
          </div>

          <div class="dashboard-grid">
            <div class="dashboard-card">
              <h2>การใช้งบควบคุม</h2>
              <div class="ring" style="--pct:${Math.min(100, Math.round(main.costRatio * 100))}">
                <div>
                  <strong>${money(main.costRatio * 100, 1)}%</strong>
                  <span>จากงบควบคุม</span>
                </div>
              </div>
              <div>
                <span>ค่าใช้จ่ายรวม</span>
                <strong>${money(main.total, 0)} / ${money(main.control, 0)}</strong>
              </div>
              <div>
                <span>สัดส่วนต้นทุน</span>
                <div class="cost-stack">
                  <span class="labor" style="--pct:${mix.labor}"></span>
                  <span class="machine" style="--pct:${mix.machine}"></span>
                  <span class="manual" style="--pct:${mix.manual}"></span>
                </div>
              </div>
              <div class="inline-list">
                <span class="pill red">ค่าแรง ${money(main.laborActual, 0)}</span>

                <span class="pill amber">manual ${money(main.manual.costToUpdate, 0)}</span>
              </div>
            </div>

              <h2>เปรียบเทียบอาคาร</h2>
              <div class="comparison-grid">${comparison}</div>
            </div>
          </div>

          <div class="split">
            <div class="dashboard-card">
              <div class="panel-head" style="padding:0;border:0">
                <h2>ภาพรวมงวดงาน</h2>
                <span class="pill">เลือกใช้ ${periodsForView("GI").length}/${state.periods.length} งวด</span>
              </div>
              <div class="table-wrap">
                <table class="period-overview">
                  <thead><tr><th>อาคาร</th><th>งวด</th><th>ชื่อ</th><th class="num">มูลค่างวด</th><th class="num">ค่าแรงรวม</th><th class="num">ใช้แล้ว</th><th class="num">%</th></tr></thead>
                  <tbody>${periodRows}</tbody>
                </table>
              </div>
            </div>
            <div class="dashboard-card">
              <h2>Top Cost</h2>
              <h3>ค่าแรงสูงสุด</h3>
              <div class="top-list">${topRows(topLabor, "ยังไม่มีค่าแรงจริงสะสม")}</div>
              <h3>เครื่องจักรสูงสุด</h3>
              <div class="top-list">${topRows(topMachines, "ยังไม่มีค่าเครื่องจักรสะสม")}</div>

                <label><span>ค่าแรง+ค่าเครื่องจักรสะสมถึงวัน update</span><input type="number" data-manual="costToUpdate" value="${esc(manual.costToUpdate)}"></label>

    function renderWorkPlanPanel() {

      const options = state.workPlans.map((row) => `<option value="${row.id}" ${row.id === plan?.id ? "selected" : ""}>${esc(workPlanLabel(row))} · ${esc(row.status || "กำลังทำ")}</option>`).join("");

          <div class="panel-head">
            <div>
              <h2>แผนเบิกงวด</h2>
              <p class="muted">เลือกงวดย่อยเข้าแผนนี้ แล้วกรอกแผน/งานจริงตามรอบเบิก</p>
            </div>

      const view = state.ui.planView || "G";
      const dates = getDates();
      const el = $("#tab-plan");

      const selectedCount = selectedCellRefs().length;
      el.innerHTML = `
        <div class="plan-shell">
          <div class="plan-toolbar">
            <div class="segmented" aria-label="มุมมองแผน">
              ${["G", "I", "GI"].map((v) => `<button data-plan-view="${v}" aria-pressed="${view === v}">${v === "GI" ? "รวม G+I" : `หลัง ${v}`}</button>`).join("")}

            <div class="inline-list">
              <label class="fill-mode"><span>Fill</span><select id="fillModeSelect">
                <option value="all" ${fillMode === "all" ? "selected" : ""}>ทั้งหมด</option>

                <option value="move" ${listMode === "move" ? "selected" : ""}>ไฮไลต์และย้ายเมื่อยืนยัน</option>
              </select></label>
              <button id="openSelectedCellBtn" data-action="open-selected-cell" ${hasSelected ? "" : "disabled"}>เปิดช่องที่เลือก</button>
              <button id="clearSelectedCellsBtn" class="danger" data-action="clear-selected-cells" ${selectedCount ? "" : "disabled"}>ล้าง ${selectedCount || ""} ช่อง</button>
              <button id="undoBtn" data-action="undo" ${undoStack.length ? "" : "disabled"}>ย้อนกลับ</button>
              <button id="redoBtn" data-action="redo" ${redoStack.length ? "" : "disabled"}>ไปหน้า</button>

          </div>
          ${renderWorkPlanPanel()}
          ${renderQuickEntry(view)}
          <div class="plan-grid">${buildPlanTable(view, dates)}</div>
        </div>
      `;
    }

    function renderQuickEntry(view) {
      const quick = getQuickEntry(view);
      const buildingOptions = ["G", "I"].map((building) => `<option value="${building}" ${quick.building === building ? "selected" : ""}>หลัง ${building}</option>`).join("");
      const buildingPeriods = periodsForBuilding(quick.building);
      const period = getPeriod(quick.periodId) || buildingPeriods[0];
      const item = getItem(period, quick.itemId) || period?.items[0];
      const currentPlanned = item ? itemPlanValue(item, quick.date) : 0;
      const currentUnits = item ? itemActualUnits(item, quick.date) : 0;
      const currentLabor = item ? itemLaborCost(item, quick.date) : 0;
      const currentMachine = totalMachineCost(quick.building, quick.date);
      const ignore = item ? { periodId: period.id, itemId: item.id, date: quick.date } : null;
      const usedInCell = new Set(item ? actualEntries(item, quick.date).map((row) => row.workerId) : []);
      const listMode = workerListMode();
      const workerRows = state.workers.map((worker) => {
        const assigned = ignore ? workerAssignedInfo(worker.id, quick.date, ignore) : null;
        const inCell = usedInCell.has(worker.id);
        const hidden = listMode === "hide" && (assigned || inCell);
        const disabled = inCell;
        const extraLabel = inCell ? "อยู่ในช่องนี้แล้ว" : "";
        return { worker, assigned, hidden, disabled, extraLabel };
      }).filter((row) => !row.hidden);
      if (!workerRows.some((row) => row.worker.id === quick.workerId)) quick.workerId = workerRows[0]?.worker.id || "";
      const workerOptions = workerRows.map(({ worker, assigned, disabled, extraLabel }) => workerOption(worker, assigned, quick.workerId === worker.id, disabled, extraLabel)).join("");
      const existing = item ? actualEntries(item, quick.date).map((row) => {
        const worker = getWorker(row.workerId);
        return `<span class="pill red">${esc(worker?.code || "")} ${esc(worker?.name || "")} ${qty(laborUnits(row))} แรง</span>`;
      }).join("") : "";
      const machineOptions = state.machines.map((machine) => `<option value="${machine.id}" ${quick.machineId === machine.id ? "selected" : ""}>${esc(machine.name)} · ${money(machine.dailyCost, 0)}</option>`).join("");
      return `
        <div class="quick-entry">
          <div class="panel-head">
            <div>
              <h2>ลงงานจริง</h2>
            </div>
            <span class="pill ${view === "GI" ? "amber" : "green"}">${view === "GI" ? "บันทึกเข้า G/I แล้วรวมอัตโนมัติ" : `บันทึกหลัง ${quick.building}`}</span>
          </div>
          <div class="panel-body">
            <div class="form-grid">
              <label><span>อาคาร</span><select data-quick-field="building">${buildingOptions}</select></label>
              <label><span>งวด</span><select data-quick-field="periodId">${buildingPeriods.map((row) => `<option value="${row.id}" ${period?.id === row.id ? "selected" : ""}>งวด ${esc(row.no)} · ${esc(row.title)}</option>`).join("")}</select></label>
              <label><span>รายการ</span><select data-quick-field="itemId">${(period?.items || []).map((row) => `<option value="${row.id}" ${item?.id === row.id ? "selected" : ""}>${esc(row.name)}</option>`).join("")}</select></label>
              <label><span>วันที่</span><input type="date" data-quick-field="date" min="${esc(planStartDate())}" max="${esc(planEndDate())}" value="${esc(quick.date)}"></label>
              <label><span>จำนวนแรงตามแผน</span><input type="number" min="0" step="1" data-quick-field="planned" value="${esc(Math.round(quick.planned ?? currentPlanned ?? 0))}"></label>
              <label><span>คนงานที่ทำจริง</span><select data-quick-field="workerId">${workerOptions}</select></label>
              <label><span>เวลา</span><select data-quick-field="unit">
                <option value="full" ${quick.unit === "full" ? "selected" : ""}>เต็มวัน</option>
                <option value="half" ${quick.unit === "half" ? "selected" : ""}>ครึ่งวัน</option>
                <option value="hours" ${quick.unit === "hours" ? "selected" : ""}>รายชั่วโมง</option>
              </select></label>
              <label><span>ชั่วโมง</span><input type="number" min="0" step="0.5" data-quick-field="hours" value="${esc(quick.hours)}"></label>
              <label><span>เครื่องจักร</span><select data-quick-field="machineId">${machineOptions}</select></label>
              <label><span>ค่าเครื่องจักร</span><input type="number" min="0" step="0.01" data-quick-field="machineAmount" value="${esc(quick.machineAmount)}"></label>
            </div>
            <div class="quick-summary">
              <div class="metric"><span>แรงจริงในช่องนี้</span><strong>${qty(currentUnits) || "0"}</strong></div>
              <div class="metric"><span>มูลค่าค่าแรง</span><strong>${money(currentLabor, 0)}</strong></div>
              <div class="metric"><span>เครื่องจักรวันนี้</span><strong>${money(currentMachine, 0)}</strong></div>
              <div class="metric"><span>คนงานที่เลือกแล้ว</span><strong>${actualEntries(item, quick.date).length}</strong></div>
            </div>
            <div class="inline-list">${existing || `<span class="muted">ยังไม่มีคนงานในวันนี้</span>`}</div>
            <div class="quick-actions">
              <button class="primary" data-action="quick-add-worker">เพิ่มคนงานและบันทึก</button>
              <button data-action="quick-save-plan">บันทึกจำนวนแผน</button>
              <button data-action="quick-add-machine">เพิ่มเครื่องจักร</button>
              <button data-action="quick-open-detail">เปิดรายละเอียดช่องนี้</button>
            </div>
          </div>
        </div>
      `;
    }

    function monthGroups(dates) {
      const groups = [];
      dates.forEach((date) => {
        const label = monthLabel(date);
        const last = groups[groups.length - 1];
        if (last?.label === label) last.count++;
        else groups.push({ label, count: 1 });
      });
      return groups;
    }

    function buildPlanTable(view, dates) {
      const editable = view !== "GI";
      const activePeriods = periodsForView(view);
      const totalCols = dates.length + 4;
      let body = "";
      if (!activePeriods.length) {
        body = `<tr class="empty-row"><td colspan="${totalCols}">ยังไม่ได้เลือกงวดงานสำหรับรอบนี้</td></tr>`;
      } else {
        for (const building of buildingsForView(view)) {
          const periods = periodsForBuilding(building);
          body += `<tr class="building-row"><td class="sticky col-building" colspan="4">อาคาร ${building}</td>${dates.map((date) => `<td class="date-cell ${isHoliday(date) ? "holiday" : ""}"></td>`).join("")}</tr>`;
          for (const period of periods) {
            body += `<tr class="period-row"><td class="sticky col-building"></td><td class="sticky col-period">${esc(period.title)}</td><td class="sticky col-item" colspan="2">${esc(period.description)}</td>${dates.map((date) => `<td class="date-cell ${isHoliday(date) ? "holiday" : ""}"></td>`).join("")}</tr>`;
            for (const item of period.items) {
              body += `
                <tr>
                  <td class="sticky col-building">${esc(period.building)}</td>
                  <td class="sticky col-period">งวด ${esc(period.no)}</td>
                  <td class="sticky col-item">${esc(item.name)} <span class="pill">${money(item.progressPct, 0)}%</span></td>
                  <td class="sticky col-value num">${money(item.laborValue, 0)}</td>
                  ${dates.map((date) => {
                    const planned = itemPlanValue(item, date);
                    const units = itemActualUnits(item, date);
                    const cost = itemLaborCost(item, date);
                    const workClass = units > 0 ? "actual" : "";
                    const holidayClass = isHoliday(date) ? "holiday" : "";
                    const planRef = { periodId: period.id, itemId: item.id, date, part: "plan" };
                    const actualRef = { periodId: period.id, itemId: item.id, date, part: "actual" };
                    const planSelected = editable && isCellSelected(planRef);
                    const actualSelected = editable && isCellSelected(actualRef);
                    const anySelected = planSelected || actualSelected;
                    const planPrimary = editable && cellMatches(state.ui.selectedCell, planRef);
                    const actualPrimary = editable && cellMatches(state.ui.selectedCell, actualRef);
                    const attrs = editable ? `data-action="edit-cell" data-period-id="${period.id}" data-item-id="${item.id}" data-date="${date}" title="คลิกเพื่อเลือก ดับเบิลคลิกเพื่อแก้ไข"` : "";
                    return `<td class="date-cell ${holidayClass}">
                      <button class="date-btn ${workClass} ${anySelected ? "selected" : ""} ${editable ? "" : "readonly"}" ${attrs} aria-selected="${anySelected ? "true" : "false"}">
                        <span class="cell-part plan-part ${planSelected ? "part-selected" : ""} ${planPrimary ? "part-primary" : ""}" data-cell-part="plan" title="จำนวนแรงตามแผน">
                          <span class="plan-line ${planned ? "has-plan" : ""}">${planned ? qty(planned) : ""}</span>
                          ${editable ? `<span class="fill-handle" data-action="fill-handle" aria-hidden="true"></span>` : ""}
                        </span>
                        <span class="cell-part actual-part ${actualSelected ? "part-selected" : ""} ${actualPrimary ? "part-primary" : ""}" data-cell-part="actual" title="จำนวนแรงจริง + ค่าแรง">
                          <span class="actual-line">${units ? qty(units) : ""}</span>
                          <span class="cost-line">${cost ? money(cost, 0) : ""}</span>
                          ${editable ? `<span class="fill-handle" data-action="fill-handle" aria-hidden="true"></span>` : ""}
                        </span>
                      </button>
                    </td>`;
                  }).join("")}
                </tr>
              `;
            }
          }
        }
      }
      const summaryRows = activePeriods.length ? [
        ["จำนวนแรงที่ใช้ตามแผน", (date) => totalPlanned(view, date), "qty"],
        ["จำนวนแรงที่ใช้จริง", (date) => totalActualUnits(view, date), "qty"],
        ["ค่าแรงที่ใช้ต่อวัน", (date) => totalLaborCost(view, date), 0],
        ["ค่าเครื่องจักรที่ใช้ต่อวัน", (date) => totalMachineCost(view, date), 0],
        ["รวมค่าใช้จ่ายต่อวัน", (date) => totalSpend(view, date), 0]
      ].map(([label, getter, digits]) => `
        <tr class="summary-row">
          <td class="sticky col-building" colspan="4">${label}</td>
