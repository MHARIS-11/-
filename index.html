<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TMAN WorkPlan</title>
  <style>
    :root {
      --bg: oklch(1 0 0);
      --surface: oklch(0.982 0.004 160);
      --surface-2: oklch(0.955 0.007 160);
      --ink: oklch(0.18 0.018 160);
      --muted: oklch(0.43 0.018 160);
      --line: oklch(0.86 0.008 160);
      --line-strong: oklch(0.58 0.018 160);
      --primary: oklch(0.35 0.077 160);
      --primary-2: oklch(0.45 0.088 160);
      --primary-soft: oklch(0.92 0.034 160);
      --actual: oklch(0.63 0.215 28);
      --actual-soft: oklch(0.92 0.07 28);
      --warning: oklch(0.78 0.145 82);
      --purple: oklch(0.68 0.11 305);
      --success-soft: oklch(0.88 0.075 142);
      --info-soft: oklch(0.88 0.055 235);
      --holiday: oklch(0.78 0 0);
      --holiday-dark: oklch(0.27 0 0);
      --danger: oklch(0.53 0.18 28);
      --shadow: 0 8px 18px oklch(0.16 0.02 160 / 0.08);
      --radius: 8px;
      --nav-width: 224px;
      font-family: Tahoma, "Noto Sans Thai", "Leelawadee UI", system-ui, sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-size: 14px;
      line-height: 1.45;
    }
    button, input, select, textarea {
      font: inherit;
      color: inherit;
    }
    button {
      border: 1px solid var(--line);
      background: var(--bg);
      border-radius: 7px;
      min-height: 36px;
      padding: 8px 12px;
      cursor: pointer;
    }
    button:hover { border-color: var(--primary-2); }
    button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
      outline: 3px solid oklch(0.75 0.1 160 / 0.45);
      outline-offset: 2px;
    }
    .primary {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
      font-weight: 700;
    }
    .danger {
      border-color: oklch(0.78 0.11 28);
      color: var(--danger);
      background: oklch(0.98 0.018 28);
    }
    .ghost {
      background: transparent;
      border-color: transparent;
      color: var(--muted);
    }
    .ghost:hover {
      background: var(--surface-2);
      border-color: var(--line);
      color: var(--ink);
    }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--bg);
      padding: 8px 10px;
      min-height: 36px;
    }
    textarea { min-height: 76px; resize: vertical; }
    label {
      display: grid;
      gap: 5px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }
    label span { color: var(--muted); }
    h1, h2, h3 {
      margin: 0;
      text-wrap: balance;
      line-height: 1.22;
      letter-spacing: 0;
    }
    h1 { font-size: 22px; }
    h2 { font-size: 18px; }
    h3 { font-size: 15px; }
    p { margin: 0; }
    .app {
      display: grid;
      grid-template-columns: var(--nav-width) minmax(0, 1fr);
      min-height: 100vh;
    }
    .sidebar {
      border-right: 1px solid var(--line);
      background: var(--surface);
      padding: 16px 12px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 8px 14px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 12px;
    }
    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--primary);
      color: white;
      font-weight: 800;
      letter-spacing: 0;
    }
    .brand small {
      color: var(--muted);
      font-weight: 700;
    }
    .nav {
      display: grid;
      gap: 4px;
    }
    .nav button {
      justify-content: flex-start;
      display: flex;
      align-items: center;
      gap: 9px;
      border-color: transparent;
      background: transparent;
      color: var(--muted);
      text-align: left;
      font-weight: 700;
    }
    .nav button[aria-selected="true"] {
      background: var(--primary-soft);
      color: var(--primary);
      border-color: oklch(0.82 0.05 160);
    }
    .main {
      min-width: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: oklch(1 0 0 / 0.96);
      border-bottom: 1px solid var(--line);
      padding: 12px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      backdrop-filter: blur(10px);
    }
    .topbar .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .mobile-tabs {
      display: none;
      width: 100%;
    }
    .content {
      padding: 18px;
      min-width: 0;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: grid; gap: 16px; }
    .section {
      display: grid;
      gap: 12px;
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--bg);
    }
    .panel-head {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .panel-body { padding: 14px; }
    .split {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 12px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
      align-items: end;
    }
    .metric-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 10px;
    }
    .metric {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      background: var(--surface);
    }
    .metric strong {
      display: block;
      font-size: 21px;
      line-height: 1.15;
      margin-top: 4px;
    }
    .metric span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .segmented {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--surface);
    }
    .segmented button {
      border: 0;
      border-radius: 0;
      background: transparent;
      min-height: 34px;
    }
    .segmented button[aria-pressed="true"] {
      background: var(--primary);
      color: white;
      font-weight: 800;
    }
    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--bg);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 7px 8px;
      vertical-align: middle;
      text-align: left;
    }
    th {
      background: var(--surface-2);
      color: var(--muted);
      font-weight: 800;
      white-space: nowrap;
    }
    tr:last-child td { border-bottom: 0; }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .muted { color: var(--muted); }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border-radius: 999px;
      padding: 3px 8px;
      background: var(--surface-2);
      border: 1px solid var(--line);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }
    .pill.red {
      background: var(--actual);
      border-color: var(--actual);
      color: white;
    }
    .pill.green {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }
    .pill.amber {
      background: oklch(0.92 0.09 82);
      border-color: oklch(0.82 0.13 82);
      color: oklch(0.28 0.055 82);
    }
    .plan-shell {
      display: grid;
      gap: 12px;
    }
    .plan-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .quick-entry {
      border: 1px solid oklch(0.82 0.05 160);
      border-radius: var(--radius);
      background: var(--primary-soft);
      overflow: hidden;
    }
    .quick-entry .panel-head {
      background: oklch(0.96 0.02 160);
    }
    .quick-entry .panel-body {
      display: grid;
      gap: 12px;
    }
    .quick-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .quick-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 8px;
    }
    .quick-summary .metric {
      background: var(--bg);
      padding: 10px;
    }
    .quick-summary .metric strong {
      font-size: 18px;
    }
    .scroll-hint {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .plan-grid {
      max-height: calc(100vh - 230px);
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--bg);
    }
    .work-table {
      min-width: 2100px;
      border-collapse: separate;
      border-spacing: 0;
      table-layout: fixed;
    }
    .work-table th, .work-table td {
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 0;
      text-align: center;
    }
    .work-table thead th {
      position: sticky;
      top: 0;
      z-index: 7;
      height: 30px;
      background: var(--surface-2);
    }
    .work-table .sticky {
      position: sticky;
      left: 0;
      z-index: 8;
      background: var(--bg);
      text-align: left;
      padding: 6px 8px;
    }
    .work-table thead .sticky { z-index: 10; background: var(--surface-2); }
    .work-table .col-building { width: 70px; left: 0; }
    .work-table .col-period { width: 96px; left: 70px; }
    .work-table .col-item { width: 210px; left: 166px; }
    .work-table .col-value { width: 96px; left: 376px; text-align: right; }
    .work-table .date-cell { width: 32px; min-width: 32px; }
    .work-table .month-cell { height: 24px; font-size: 11px; }
    .work-table .day-cell { height: 26px; font-size: 11px; }
    .work-table .building-row td {
      background: oklch(0.985 0.025 28);
      color: var(--danger);
      font-weight: 900;
      height: 28px;
    }
    .work-table .period-row td {
      background: var(--surface);
      font-weight: 800;
      height: 28px;
    }
    .work-table .date-btn {
      display: grid;
      grid-template-rows: 1fr 1fr 1fr;
      gap: 1px;
      width: 100%;
      min-height: 48px;
      border: 0;
      border-radius: 0;
      padding: 2px;
      background: white;
      font-size: 10px;
      line-height: 1;
    }
    .work-table .date-btn:hover { outline: 2px solid var(--primary-2); outline-offset: -2px; }
    .work-table .date-btn.actual { background: var(--actual-soft); }
    .work-table .date-btn .plan-line.has-plan {
      background: oklch(0.88 0.08 235);
      color: oklch(0.24 0.07 235);
      font-weight: 800;
    }
    .work-table .date-btn.actual .actual-line { background: var(--actual); color: white; }
    .work-table .date-btn.readonly { cursor: default; }
    .work-table .date-btn.readonly:hover { outline: 0; }
    .work-table .holiday, .work-table .holiday .date-btn {
      background: var(--holiday) !important;
    }
    .work-table .holiday-dark, .work-table .holiday-dark .date-btn {
      background: var(--holiday-dark) !important;
      color: white;
    }
    .plan-line, .actual-line, .cost-line {
      min-height: 13px;
      display: grid;
      place-items: center;
      font-variant-numeric: tabular-nums;
    }
    .cost-line { color: var(--muted); font-size: 9px; }
    .summary-row td {
      background: var(--surface-2);
      height: 28px;
      font-variant-numeric: tabular-nums;
    }
    .summary-row .sticky { font-weight: 800; text-align: right; }
    .item-list {
      display: grid;
      gap: 10px;
    }
    .item-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--bg);
    }
    .item-card-head {
      padding: 10px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .inline-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }
    dialog {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 0;
      max-width: min(760px, calc(100vw - 24px));
      width: 760px;
      box-shadow: 0 18px 60px oklch(0.14 0.02 160 / 0.24);
    }
    dialog::backdrop {
      background: oklch(0.18 0.018 160 / 0.34);
    }
    .dialog-head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .dialog-body {
      padding: 16px;
      display: grid;
      gap: 14px;
      max-height: min(76vh, 720px);
      overflow: auto;
    }
    .dialog-actions {
      padding: 12px 16px;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }
    .notice {
      border: 1px solid oklch(0.82 0.13 82);
      background: oklch(0.96 0.055 82);
      color: oklch(0.31 0.07 82);
      padding: 10px 12px;
      border-radius: var(--radius);
      font-weight: 700;
    }
    .error {
      border: 1px solid oklch(0.78 0.12 28);
      background: oklch(0.97 0.035 28);
      color: var(--danger);
      padding: 10px 12px;
      border-radius: var(--radius);
      font-weight: 800;
    }
    .report-stage {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-2);
      padding: 12px;
      max-height: calc(100vh - 260px);
    }
    #reportCanvas {
      max-width: 100%;
      height: auto;
      background: white;
      display: block;
    }
    .backup-box textarea {
      min-height: 180px;
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      font-size: 12px;
    }
    .toast {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 100;
      background: var(--ink);
      color: white;
      padding: 10px 12px;
      border-radius: 8px;
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
      max-width: min(360px, calc(100vw - 32px));
    }
    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .topbar { display: grid; align-items: stretch; }
      .mobile-tabs { display: block; }
      .content { padding: 12px; }
      .plan-grid { max-height: calc(100vh - 260px); }
      .work-table { min-width: 1500px; }
      .work-table .sticky {
        position: static;
        left: auto;
      }
      .work-table thead .sticky {
        position: sticky;
        top: 0;
      }
      .work-table .col-building { width: 54px; }
      .work-table .col-period { width: 74px; }
      .work-table .col-item { width: 180px; }
      .work-table .col-value { width: 82px; }
      .work-table .date-cell { width: 36px; min-width: 36px; }
    }
    @media (max-width: 560px) {
      .topbar { padding: 10px 12px; }
      .split, .metric-grid { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
      h1 { font-size: 18px; }
      .panel-head { align-items: stretch; }
      .segmented { width: 100%; }
      .segmented button { flex: 1; padding-inline: 8px; }
    }
    @media (prefers-reduced-motion: reduce) {
      * { scroll-behavior: auto !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">TM</div>
        <div>
          <strong>TMAN WorkPlan</strong><br>
          <small>local-first</small>
        </div>
      </div>
      <nav class="nav" id="desktopNav"></nav>
    </aside>
    <main class="main">
      <header class="topbar">
        <div>
          <h1 id="pageTitle">สรุปโครงการ</h1>
          <div class="meta" id="topMeta"></div>
        </div>
        <select class="mobile-tabs" id="mobileNav" aria-label="เลือกแท็บ"></select>
      </header>
      <div class="content">
        <section class="tab-panel active" id="tab-dashboard"></section>
        <section class="tab-panel" id="tab-plan"></section>
        <section class="tab-panel" id="tab-periods"></section>
        <section class="tab-panel" id="tab-workers"></section>
        <section class="tab-panel" id="tab-machines"></section>
        <section class="tab-panel" id="tab-holidays"></section>
        <section class="tab-panel" id="tab-report"></section>
        <section class="tab-panel" id="tab-backup"></section>
      </div>
    </main>
  </div>

  <dialog id="cellDialog">
    <form method="dialog">
      <div class="dialog-head">
        <div>
          <h2 id="cellDialogTitle">แก้ไขวันทำงาน</h2>
          <p class="muted" id="cellDialogMeta"></p>
        </div>
        <button class="ghost" value="cancel" aria-label="ปิด">ปิด</button>
      </div>
    </form>
    <div class="dialog-body" id="cellDialogBody"></div>
    <div class="dialog-actions">
      <button id="clearCellBtn" class="danger">ล้างช่องนี้</button>
      <button id="saveCellBtn" class="primary">บันทึกช่องนี้</button>
    </div>
  </dialog>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const STORAGE_KEY = "tman.workplan.v1";
    const tabs = [
      ["dashboard", "สรุปโครงการ"],
      ["plan", "แผนงวดงาน"],
      ["periods", "งวดงานทั้งหมด"],
      ["workers", "คนงาน"],
      ["machines", "เครื่องจักร"],
      ["holidays", "วันหยุดบริษัท"],
      ["report", "รายงาน / Export"],
      ["backup", "สำรองข้อมูล"]
    ];

    const $ = (selector, root = document) => root.querySelector(selector);
    const $$ = (selector, root = document) => [...root.querySelectorAll(selector)];
    const uid = (prefix) => `${prefix}_${Math.random().toString(36).slice(2, 9)}`;
    const money = (value, digits = 0) => Number(value || 0).toLocaleString("th-TH", { maximumFractionDigits: digits, minimumFractionDigits: digits });
    const qty = (value) => {
      const num = Number(value || 0);
      if (!num) return "";
      return num.toLocaleString("th-TH", { maximumFractionDigits: Number.isInteger(num) ? 0 : 2 });
    };
    const pct = (value) => `${(Number(value || 0) * 100).toLocaleString("th-TH", { maximumFractionDigits: 2 })}%`;
    const n = (value) => Number(value || 0);
    const esc = (value) => String(value ?? "").replace(/[&<>"']/g, (ch) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));

    let activeTab = "dashboard";
    let cellDraft = null;
    let toastTimer = null;

    function makePlan() { return {}; }
    function makeActual() { return {}; }
    function setPlan(item, date, value) {
      if (value === "" || value === null || value === undefined || Number(value) === 0) delete item.plan[date];
      else item.plan[date] = Number(value);
    }
    function setPlanRange(item, start, end, value) {
      getDates(start, end).forEach((date) => setPlan(item, date, value));
    }
    function setActual(item, date, entries) {
      item.actual[date] = entries;
    }

    function createDefaultState() {
      const workers = [
        { id: "w001", code: "W001", name: "คนงานตัวอย่าง 1", dailyWage: 625 },
        { id: "w002", code: "W002", name: "คนงานตัวอย่าง 2", dailyWage: 537 },
        { id: "w003", code: "W003", name: "คนงานตัวอย่าง 3", dailyWage: 503 },
        { id: "w004", code: "W004", name: "คนงานตัวอย่าง 4", dailyWage: 432 }
      ];
      const machines = [
        { id: "m001", name: "เครื่องจักรตัวอย่าง", dailyCost: 1620 }
      ];
      const gSteel = { id: "i_g_steel", name: "งานเหล็ก", laborValue: 147986.5, progressPct: 70, plan: makePlan(), actual: makeActual() };
      const gForm = { id: "i_g_form", name: "งานไม้แบบ", laborValue: 124080, progressPct: 65, plan: makePlan(), actual: makeActual() };

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return createDefaultState();
        const parsed = JSON.parse(raw);
        if (!parsed.version) return createDefaultState();
        parsed.settings.dayHours = parsed.settings.dayHours || 9;
        parsed.manual.GI = parsed.manual.GI || { contractLaborCost: 0, costToUpdate: 0, note: "" };
        parsed.machineUsage = parsed.machineUsage || { G: {}, I: {} };
        parsed.machineUsage.G = parsed.machineUsage.G || {};
        parsed.machineUsage.I = parsed.machineUsage.I || {};
        return parsed;
      } catch (error) {
        console.warn(error);
        return createDefaultState();
      }
    }

    let state = loadState();

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function showToast(message) {
      const toast = $("#toast");
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 2400);
    }

    function getDates(start = state.settings.startDate, end = state.settings.endDate) {
      const dates = [];
      const current = new Date(`${start}T00:00:00`);
      const last = new Date(`${end}T00:00:00`);
      if (Number.isNaN(current.getTime()) || Number.isNaN(last.getTime()) || current > last) return dates;
      while (current <= last) {
        dates.push(localISODate(current));
        current.setDate(current.getDate() + 1);
      }
      return dates;
    }

    function localISODate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function dateLabel(date) {
      const d = new Date(`${date}T00:00:00`);
      return d.toLocaleDateString("th-TH", { day: "numeric", month: "short", year: "numeric" });
    }

    function monthLabel(date) {
      const d = new Date(`${date}T00:00:00`);
      return d.toLocaleDateString("th-TH", { month: "long" });
    }

    function dayNumber(date) {
      return new Date(`${date}T00:00:00`).getDate();
    }

    function isHoliday(date) {
      return state.holidays.some((holiday) => holiday.date === date);
    }

    function getWorker(id) {
      return state.workers.find((worker) => worker.id === id);
    }

    function getMachine(id) {
      return state.machines.find((machine) => machine.id === id);
    }

    function getPeriod(id) {
      return state.periods.find((period) => period.id === id);
    }

    function getItem(period, itemId) {
      return period?.items.find((item) => item.id === itemId);
    }

    function buildingsForView(view) {
      return view === "GI" ? ["G", "I"] : [view];
    }

    function periodsForView(view) {
      const buildings = buildingsForView(view);
      return state.periods.filter((period) => buildings.includes(period.building));
    }

    function getQuickEntry(view = state.ui.planView || "G") {
      state.ui.quickEntry = state.ui.quickEntry || {};
      const quick = state.ui.quickEntry;
      if (view !== "GI") quick.building = view;
      if (!["G", "I"].includes(quick.building)) quick.building = "G";
      const buildingPeriods = state.periods.filter((period) => period.building === quick.building);
      if (!buildingPeriods.some((period) => period.id === quick.periodId)) quick.periodId = buildingPeriods[0]?.id || "";
      const period = getPeriod(quick.periodId);
      if (!period?.items.some((item) => item.id === quick.itemId)) quick.itemId = period?.items[0]?.id || "";
      const dates = getDates();
      if (!dates.includes(quick.date)) quick.date = dates.includes(state.settings.updateDate) ? state.settings.updateDate : dates[0] || "";
      if (!state.workers.some((worker) => worker.id === quick.workerId)) quick.workerId = state.workers[0]?.id || "";
      if (!["full", "half", "hours"].includes(quick.unit)) quick.unit = "full";
      if (!quick.hours) quick.hours = state.settings.dayHours;
      return quick;
    }

    function selectedQuickRefs() {
      const quick = getQuickEntry();
      const period = getPeriod(quick.periodId);
      const item = getItem(period, quick.itemId);
      return { quick, period, item };
    }

    function laborUnits(entry) {
      if (entry.unit === "full") return 1;
      if (entry.unit === "half") return 0.5;
      return Math.max(0, Number(entry.hours || 0) / Number(state.settings.dayHours || 9));
    }

    function laborAmount(entry) {
      const worker = getWorker(entry.workerId);
      if (!worker) return 0;
      return Number(worker.dailyWage || 0) * laborUnits(entry);
    }

    function actualEntries(item, date) {
      return item.actual?.[date] || [];
    }

    function itemActualUnits(item, date) {
      return actualEntries(item, date).reduce((sum, entry) => sum + laborUnits(entry), 0);
    }

    function itemLaborCost(item, date) {
      return actualEntries(item, date).reduce((sum, entry) => sum + laborAmount(entry), 0);
    }

    function totalPlanned(view, date) {
      return periodsForView(view).reduce((sum, period) => sum + period.items.reduce((inner, item) => inner + n(item.plan?.[date]), 0), 0);
    }

    function totalActualUnits(view, date) {
      return periodsForView(view).reduce((sum, period) => sum + period.items.reduce((inner, item) => inner + itemActualUnits(item, date), 0), 0);
    }

    function totalLaborCost(view, date) {
      return periodsForView(view).reduce((sum, period) => sum + period.items.reduce((inner, item) => inner + itemLaborCost(item, date), 0), 0);
    }

    function totalMachineCost(view, date) {
      return buildingsForView(view).reduce((sum, building) => {
        const list = state.machineUsage?.[building]?.[date] || [];
        return sum + list.reduce((inner, row) => inner + n(row.amount), 0);
      }, 0);
    }

    function totalSpend(view, date) {
      return totalLaborCost(view, date) + totalMachineCost(view, date);
    }

    function totalLaborValue(view) {
      return periodsForView(view).reduce((sum, period) => sum + period.items.reduce((inner, item) => inner + n(item.laborValue), 0), 0);
    }

    function summaryFor(view) {
      const dates = getDates().filter((date) => date <= state.settings.updateDate);
      const laborValue = totalLaborValue(view);
      const laborActual = dates.reduce((sum, date) => sum + totalLaborCost(view, date), 0);
      const machineActual = dates.reduce((sum, date) => sum + totalMachineCost(view, date), 0);
      const total = laborActual + machineActual;
      const control = laborValue * n(state.settings.controlPercent) / 100;
      const manual = state.manual[view] || { contractLaborCost: 0, costToUpdate: 0, note: "" };
      return {
        view,
        laborValue,
        control,
        laborActual,
        machineActual,
        total,
        currentRatio: laborValue ? total / laborValue : 0,
        manual,
        manualRatio: n(manual.contractLaborCost) ? n(manual.costToUpdate) / n(manual.contractLaborCost) : 0
      };
    }

    function workerAssignedInfo(workerId, date, ignore) {
      for (const period of state.periods) {
        for (const item of period.items) {
          const entries = actualEntries(item, date);
          for (let index = 0; index < entries.length; index++) {
            const entry = entries[index];
            const sameCell = ignore && ignore.periodId === period.id && ignore.itemId === item.id && ignore.date === date;
            if (entry.workerId === workerId && !sameCell) {
              return { period, item, entry, index };
            }
          }
        }
      }
      return null;
    }

    function buildPlanTable(view, dates) {
      const editable = view !== "GI";
      const months = dates.map((date, index) => index === 0 || dayNumber(date) === 1 ? monthLabel(date) : "");
      let body = "";
      for (const building of buildingsForView(view)) {
        const periods = state.periods.filter((period) => period.building === building);
        body += `<tr class="building-row"><td class="sticky col-building" colspan="4">อาคาร ${building}</td>${dates.map((date) => `<td class="date-cell ${isHoliday(date) ? "holiday" : ""}"></td>`).join("")}</tr>`;
        for (const period of periods) {
          body += `<tr class="period-row"><td class="sticky col-building"></td><td class="sticky col-period">${esc(period.title)}</td><td class="sticky col-item" colspan="2">${esc(period.description)}</td>${dates.map((date) => `<td class="date-cell ${isHoliday(date) ? "holiday" : ""}"></td>`).join("")}</tr>`;
          for (const item of period.items) {
            body += `
              <tr>
                <td class="sticky col-building">${esc(period.building)}</td>
                <td class="sticky col-period">งวด ${esc(period.no)}</td>
                <td class="sticky col-item">${esc(item.name)} <span class="pill">${money(item.progressPct, 0)}%</span></td>
                <td class="sticky col-value num">${money(item.laborValue, 0)}</td>
                ${dates.map((date) => {
                  const planned = n(item.plan?.[date]);
                  const units = itemActualUnits(item, date);
                  const cost = itemLaborCost(item, date);
                  const workClass = units > 0 ? "actual" : "";
                  const holidayClass = isHoliday(date) ? "holiday" : "";
                  const attrs = editable ? `data-action="edit-cell" data-period-id="${period.id}" data-item-id="${item.id}" data-date="${date}"` : "";
                  return `<td class="date-cell ${holidayClass}">
                    <button class="date-btn ${workClass} ${editable ? "" : "readonly"}" ${attrs}>
                      <span class="plan-line ${planned ? "has-plan" : ""}">${planned ? qty(planned) : ""}</span>
                      <span class="actual-line">${units ? qty(units) : ""}</span>
                      <span class="cost-line">${cost ? money(cost, 0) : ""}</span>
                    </button>
                  </td>`;
                }).join("")}
              </tr>
            `;
          }
        }
      }
      const summaryRows = [
        ["จำนวนแรงที่ใช้ตามแผน", (date) => totalPlanned(view, date), "qty"],
        ["จำนวนแรงที่ใช้จริง", (date) => totalActualUnits(view, date), "qty"],
        ["ค่าแรงที่ใช้ต่อวัน", (date) => totalLaborCost(view, date), 0],
        ["ค่าเครื่องจักรที่ใช้ต่อวัน", (date) => totalMachineCost(view, date), 0],
        ["รวมค่าใช้จ่ายต่อวัน", (date) => totalSpend(view, date), 0]
      ].map(([label, getter, digits]) => `
        <tr class="summary-row">
          <td class="sticky col-building" colspan="4">${label}</td>
          ${dates.map((date) => `<td class="date-cell ${isHoliday(date) ? "holiday" : ""}">${getter(date) ? (digits === "qty" ? qty(getter(date)) : money(getter(date), digits)) : "0"}</td>`).join("")}
        </tr>
      `).join("");
      return `
        <table class="work-table">
          <thead>
            <tr>
              <th class="sticky col-building">อาคาร</th>
              <th class="sticky col-period">งวด</th>
              <th class="sticky col-item">รายการ</th>
              <th class="sticky col-value">มูลค่า</th>
              ${months.map((month, index) => `<th class="month-cell date-cell ${isHoliday(dates[index]) ? "holiday" : ""}">${esc(month)}</th>`).join("")}
            </tr>
            <tr>
              <th class="sticky col-building"></th>
              <th class="sticky col-period"></th>
              <th class="sticky col-item"></th>
              <th class="sticky col-value"></th>
              ${dates.map((date) => `<th class="day-cell date-cell ${isHoliday(date) ? "holiday" : ""}">${dayNumber(date)}</th>`).join("")}
            </tr>
          </thead>
          <tbody>${body}${summaryRows}</tbody>
        </table>
      `;
    }

      cellDraft = {
        building: period.building,
        periodId,
        itemId,
        date,
        planned: n(item.plan?.[date]),
        assignments: actualEntries(item, date).map((row) => ({ ...row })),

                <thead><tr><th>เครื่องจักร</th><th class="num">ยอด</th><th></th></tr></thead>
                <tbody>${machineRows || `<tr><td colspan="3" class="muted">ยังไม่มีเครื่องจักร</td></tr>`}</tbody>
              </table>
            </div>
          </div>
        </div>
      `;
    }

    function saveCellDraft() {
      if (!cellDraft) return;
      const period = getPeriod(cellDraft.periodId);
      const item = getItem(period, cellDraft.itemId);
      if (!period || !item) return;
      const seen = new Set();
      for (const row of cellDraft.assignments) {
        if (!row.workerId) return renderCellDialog("เลือกคนงานไม่ถูกต้อง");
        if (seen.has(row.workerId)) return renderCellDialog("คนงานซ้ำในช่องเดียวกัน");
        seen.add(row.workerId);
        const assigned = workerAssignedInfo(row.workerId, cellDraft.date, cellDraft);
        if (assigned) return renderCellDialog(`คนงานนี้ถูกใช้แล้วที่หลัง ${assigned.period.building} งวด ${assigned.period.no}`);
      }
      setPlan(item, cellDraft.date, $("#draftPlanned")?.value || 0);
      if (cellDraft.assignments.length) item.actual[cellDraft.date] = cellDraft.assignments;
      else delete item.actual[cellDraft.date];
      state.machineUsage[cellDraft.building] = state.machineUsage[cellDraft.building] || {};
      if (cellDraft.machineRows.length) state.machineUsage[cellDraft.building][cellDraft.date] = cellDraft.machineRows;
      else delete state.machineUsage[cellDraft.building][cellDraft.date];
      saveState();
      $("#cellDialog").close();
      cellDraft = null;
      renderActiveTab();
      showToast("บันทึกช่องงานแล้ว");
    }

    function clearCellDraft() {
      if (!cellDraft) return;
      cellDraft.planned = 0;
      cellDraft.assignments = [];
      cellDraft.machineRows = [];
      renderCellDialog();
    }

    function addWorkerToDraft() {
      if (!cellDraft) return;
      const workerId = $("#draftWorkerSelect").value;
      const unit = $("#draftWorkerUnit").value;
      const hours = unit === "full" ? n(state.settings.dayHours) : unit === "half" ? n(state.settings.dayHours) / 2 : n($("#draftWorkerHours").value);
      if (!workerId) return;
      const assigned = workerAssignedInfo(workerId, cellDraft.date, cellDraft);
      if (assigned) return renderCellDialog(`คนงานนี้ถูกใช้แล้วที่หลัง ${assigned.period.building} งวด ${assigned.period.no}`);
      if (cellDraft.assignments.some((row) => row.workerId === workerId)) return renderCellDialog("คนงานซ้ำในช่องเดียวกัน");
      cellDraft.assignments.push({ workerId, unit, hours });
      renderCellDialog();
    }

    function addMachineToDraft() {
      if (!cellDraft) return;
      const machineId = $("#draftMachineSelect").value;
      const machine = getMachine(machineId);
      if (!machine) return;
      const amountInput = $("#draftMachineAmount");
      const amount = amountInput.value === "" ? n(machine.dailyCost) : n(amountInput.value);
      cellDraft.machineRows.push({ id: uid("mu"), machineId, amount });
      renderCellDialog();
    }

    function quickSetPlan() {
      const { quick, item } = selectedQuickRefs();
      if (!item || !quick.date) return showToast("เลือกงวด รายการ และวันที่ก่อน");
      const plannedInput = $('[data-quick-field="planned"]');
      setPlan(item, quick.date, plannedInput ? plannedInput.value : quick.planned || 0);
      saveState();
      renderPlan();
      showToast("บันทึกจำนวนแรงตามแผนแล้ว");
    }

    function quickAddWorker() {
      const { quick, period, item } = selectedQuickRefs();
      if (!period || !item || !quick.date) return showToast("เลือกงวด รายการ และวันที่ก่อน");
      const workerId = quick.workerId;
      if (!workerId) return showToast("เลือกคนงานก่อน");
      const ignore = { periodId: period.id, itemId: item.id, date: quick.date };
      const assigned = workerAssignedInfo(workerId, quick.date, ignore);
      if (assigned) return showToast(`คนงานนี้ใช้แล้วที่หลัง ${assigned.period.building} งวด ${assigned.period.no}`);
      if (actualEntries(item, quick.date).some((row) => row.workerId === workerId)) return showToast("คนงานนี้อยู่ในช่องนี้แล้ว");
      const plannedInput = $('[data-quick-field="planned"]');
      setPlan(item, quick.date, plannedInput ? plannedInput.value : quick.planned || 0);
      const unit = quick.unit || "full";
      const hours = unit === "full" ? n(state.settings.dayHours) : unit === "half" ? n(state.settings.dayHours) / 2 : n(quick.hours);
      item.actual[quick.date] = [...actualEntries(item, quick.date), { workerId, unit, hours }];
      saveState();
      renderPlan();
      showToast("เพิ่มคนงานจริงและคำนวณค่าแรงแล้ว");
    }

    function quickOpenDetail() {
      const { quick, period, item } = selectedQuickRefs();
      if (!period || !item || !quick.date) return showToast("เลือกงวด รายการ และวันที่ก่อน");
      const plannedInput = $('[data-quick-field="planned"]');
      setPlan(item, quick.date, plannedInput ? plannedInput.value : quick.planned || 0);
      saveState();
      openCellEditor(period.id, item.id, quick.date);
    }

    function updateQuickField(field, value, rerender = true) {
      const quick = getQuickEntry();
      quick[field] = value;
      if (field === "building") {
        const period = state.periods.find((row) => row.building === value);
        quick.periodId = period?.id || "";
        quick.itemId = period?.items[0]?.id || "";
        state.ui.planView = value;
        delete quick.planned;
      }
      if (field === "periodId") {
        const period = getPeriod(value);
        quick.building = period?.building || quick.building;
        quick.itemId = period?.items[0]?.id || "";
        delete quick.planned;
      }
      if (field === "itemId" || field === "date") delete quick.planned;
      if (field === "unit") {
        if (value === "full") quick.hours = n(state.settings.dayHours);
        if (value === "half") quick.hours = n(state.settings.dayHours) / 2;
      }
      if (field === "planned" || field === "hours") quick[field] = n(value);
      saveState();
      if (rerender) renderPlan();
    }

    function renderAll() {
      renderNav();
      renderActiveTab();
    }

    function updateSetting(key, value) {
      if (["dayHours", "controlPercent"].includes(key)) state.settings[key] = n(value);
      else state.settings[key] = value;
      saveState();
      renderAll();
    }

    function handleClick(event) {
      const button = event.target.closest("button");
      if (!button) return;
      const tab = button.dataset.tab;
      if (tab) return setActiveTab(tab);
      if (button.dataset.planView) {
        state.ui.planView = button.dataset.planView;
        saveState();
        return renderPlan();
      }
      const action = button.dataset.action;
      if (!action) return;

      if (action === "open-report") return setActiveTab("report");
      if (action === "edit-cell") return openCellEditor(button.dataset.periodId, button.dataset.itemId, button.dataset.date);
      if (action === "quick-add-worker") return quickAddWorker();
      if (action === "quick-save-plan") return quickSetPlan();
      if (action === "quick-open-detail") return quickOpenDetail();
      if (action === "add-draft-worker") return addWorkerToDraft();
      if (action === "add-draft-machine") return addMachineToDraft();
      if (action === "remove-draft-worker") {
        cellDraft.assignments.splice(Number(button.dataset.index), 1);
        return renderCellDialog();
      }
      if (action === "remove-draft-machine") {
        cellDraft.machineRows.splice(Number(button.dataset.index), 1);
        return renderCellDialog();
      }
      if (action === "add-period") return addPeriod();
      if (action === "add-item") return addItem();
      if (action === "delete-period") return deletePeriod(button.dataset.periodId);
      if (action === "delete-item") return deleteItem(button.dataset.periodId, button.dataset.itemId);
      if (action === "add-worker") return addWorker();
      if (action === "delete-worker") return deleteWorker(button.dataset.workerId);
      if (action === "add-machine") return addMachine();
      if (action === "delete-machine") return deleteMachine(button.dataset.machineId);
      if (action === "add-holiday") return addHoliday();
      if (action === "add-sundays") return addSundays();
      if (action === "delete-holiday") return deleteHoliday(button.dataset.holidayId);
      if (action === "download-json") return downloadJson();
      if (action === "copy-json") return copyJson();
      if (action === "import-json") return importJson();
      if (action === "reset-sample") return resetSample();
      if (action === "download-report") return downloadReport();
    }

    function handleInput(event) {
      const target = event.target;
      if (target.dataset.setting) {
        const key = target.dataset.setting;
        if (["dayHours", "controlPercent"].includes(key)) state.settings[key] = n(target.value);
        else state.settings[key] = target.value;
        saveState();
        renderNav();
        return;
      }
      if (target.dataset.manual) {
        const view = state.ui.manualView || "GI";
        state.manual[view][target.dataset.manual] = ["contractLaborCost", "costToUpdate"].includes(target.dataset.manual) ? n(target.value) : target.value;
        saveState();
        return;
      }
      if (target.dataset.quickField) {
        const field = target.dataset.quickField;
        return updateQuickField(field, target.value, !["planned", "hours"].includes(field));
      }
      if (target.dataset.periodField) {
        const period = getPeriod(target.dataset.periodId);
        if (period) {
          period[target.dataset.periodField] = target.value;
          saveState();
          renderNav();
        }
      }
      if (target.dataset.itemField) {
        const period = getPeriod(target.dataset.periodId);
        const item = getItem(period, target.dataset.itemId);
        if (item) {
          const key = target.dataset.itemField;
          item[key] = ["laborValue", "progressPct"].includes(key) ? n(target.value) : target.value;
          saveState();
        }
      }
      if (target.dataset.workerField) {
        const worker = getWorker(target.dataset.workerId);
        if (worker) {
          worker[target.dataset.workerField] = target.dataset.workerField === "dailyWage" ? n(target.value) : target.value;
          saveState();
        }
      }
      if (target.dataset.machineField) {
        const machine = getMachine(target.dataset.machineId);
        if (machine) {
          machine[target.dataset.machineField] = target.dataset.machineField === "dailyCost" ? n(target.value) : target.value;
          saveState();
        }
      }
      if (target.dataset.holidayField) {
        const holiday = state.holidays.find((row) => row.id === target.dataset.holidayId);
        if (holiday) {
          holiday[target.dataset.holidayField] = target.value;
          saveState();
        }
      }
      if (target.dataset.draftWorkerUnit) {
        const row = cellDraft.assignments[Number(target.dataset.draftWorkerUnit)];
        row.unit = target.value;
        if (row.unit === "full") row.hours = n(state.settings.dayHours);
        if (row.unit === "half") row.hours = n(state.settings.dayHours) / 2;
        return renderCellDialog();
      }
      if (target.dataset.draftWorkerHours) {
        const row = cellDraft.assignments[Number(target.dataset.draftWorkerHours)];
        row.hours = n(target.value);
        if (row.unit !== "hours") row.unit = "hours";
        return renderCellDialog();
      }
      if (target.dataset.draftMachineAmount) {
        const row = cellDraft.machineRows[Number(target.dataset.draftMachineAmount)];
        row.amount = n(target.value);
        return renderCellDialog();
      }
    }

    function handleChange(event) {
      const target = event.target;
      if (target.id === "mobileNav") return setActiveTab(target.value);
      if (target.id === "manualViewSelect") {
        state.ui.manualView = target.value;
        saveState();
        return renderDashboard();
      }
      if (target.id === "reportViewSelect") {
        state.ui.reportView = target.value;
        saveState();
        return renderReport();
      }
      if (target.dataset.quickField) return updateQuickField(target.dataset.quickField, target.value, true);
      if (target.dataset.setting) return renderDashboard();
    }

    function addPeriod() {
      const building = $("#newPeriodBuilding").value;
      const no = $("#newPeriodNo").value.trim();
      const title = $("#newPeriodTitle").value.trim() || `งวดงานที่ ${no}`;
      if (!no) return showToast("กรอกเลขงวดก่อน");
      state.periods.push({ id: uid("p"), building, no, title, description: $("#newPeriodDescription").value.trim(), status: $("#newPeriodStatus").value.trim(), items: [] });
      saveState();
      renderPeriods();
      showToast("เพิ่มงวดแล้ว");
    }

    function addItem() {
      const period = getPeriod($("#newItemPeriod").value);
      if (!period) return;
      const name = $("#newItemName").value.trim();
      if (!name) return showToast("กรอกรายการงานก่อน");
      period.items.push({ id: uid("i"), name, laborValue: n($("#newItemValue").value), progressPct: n($("#newItemProgress").value), plan: {}, actual: {} });
      saveState();
      renderPeriods();
      showToast("เพิ่มรายการแล้ว");
    }

    function deletePeriod(id) {
      if (!confirm("ลบงวดนี้?")) return;
      state.periods = state.periods.filter((period) => period.id !== id);
      saveState();
      renderPeriods();
    }

    function deleteItem(periodId, itemId) {
      if (!confirm("ลบรายการนี้?")) return;
      const period = getPeriod(periodId);
      if (!period) return;
      period.items = period.items.filter((item) => item.id !== itemId);
      saveState();
      renderPeriods();
    }

    function addWorker() {
      const code = $("#workerCode").value.trim();
      const name = $("#workerName").value.trim();
      const wage = n($("#workerWage").value);
      if (!code || !name) return showToast("กรอกรหัสและชื่อคนงานก่อน");
      state.workers.push({ id: uid("w"), code, name, dailyWage: wage });
      saveState();
      renderWorkers();
    }

    function deleteWorker(id) {
      if (!confirm("ลบคนงานนี้?")) return;
      state.workers = state.workers.filter((worker) => worker.id !== id);
      saveState();
      renderWorkers();
    }

    function addMachine() {
      const name = $("#machineName").value.trim();
      const cost = n($("#machineCost").value);
      if (!name) return showToast("กรอกชื่อเครื่องจักรก่อน");
      state.machines.push({ id: uid("m"), name, dailyCost: cost });
      saveState();
      renderMachines();
    }

    function deleteMachine(id) {
      if (!confirm("ลบเครื่องจักรนี้?")) return;
      state.machines = state.machines.filter((machine) => machine.id !== id);
      saveState();
      renderMachines();
    }

    function addHoliday() {
      const date = $("#holidayDate").value;
      if (!date) return showToast("เลือกวันที่ก่อน");
      if (state.holidays.some((holiday) => holiday.date === date)) return showToast("มีวันหยุดวันนี้แล้ว");
      state.holidays.push({ id: uid("h"), date, name: $("#holidayName").value.trim() || "วันหยุดบริษัท" });
      saveState();
      renderHolidays();
    }

    function addSundays() {
      const existing = new Set(state.holidays.map((holiday) => holiday.date));
      let count = 0;
      for (const date of getDates()) {
        if (new Date(`${date}T00:00:00`).getDay() === 0 && !existing.has(date)) {
          state.holidays.push({ id: uid("h"), date, name: "วันหยุดบริษัท" });
          count++;
        }
      }
      saveState();
      renderHolidays();
      showToast(`เพิ่มวันอาทิตย์ ${count} วัน`);
    }

    function deleteHoliday(id) {
      state.holidays = state.holidays.filter((holiday) => holiday.id !== id);
      saveState();
      renderHolidays();
    }

    function downloadJson() {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `tman-workplan-${state.settings.updateDate || "backup"}.json`;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    async function copyJson() {
      await navigator.clipboard.writeText(JSON.stringify(state, null, 2));
      showToast("คัดลอก JSON แล้ว");
    }

    function importJson() {
      const file = $("#importFile").files?.[0];
      if (!file) return showToast("เลือกไฟล์ JSON ก่อน");
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const imported = JSON.parse(reader.result);
          if (!imported.settings || !Array.isArray(imported.periods)) throw new Error("invalid");
          state = imported;
          saveState();
          renderAll();
          showToast("นำเข้าข้อมูลแล้ว");
        } catch (error) {
          showToast("ไฟล์ JSON ไม่ถูกต้อง");
        }
      };
      reader.readAsText(file);
    }

    function resetSample() {
      if (!confirm("รีเซ็ตข้อมูลทั้งหมดเป็นค่าเริ่มต้น?")) return;
      state = createDefaultState();
      saveState();
      renderAll();
      showToast("รีเซ็ตแล้ว");
    }

    function downloadReport() {
      const view = state.ui.reportView || "GI";
      const canvas = document.createElement("canvas");
      drawReport(canvas, view, 2);
      const a = document.createElement("a");
      a.href = canvas.toDataURL("image/png");
      a.download = `tman-report-${view}-${state.settings.updateDate || "update"}.png`;
      a.click();
    }

    function drawReport(canvas, view, scale = 1) {
      if (!canvas) return;
      const dates = getDates();
      const dateW = 32 * scale;
      const leftW = 560 * scale;
      const pad = 16 * scale;
      const rowH = 22 * scale;
      const topH = 128 * scale;
      const itemRows = periodsForView(view).reduce((sum, period) => sum + 1 + period.items.length * 3, 0);
      const totalRows = 5;
      const summaryRows = 6;
      const width = leftW + dates.length * dateW + pad * 2;
      const height = topH + (itemRows + totalRows + summaryRows + 4) * rowH + pad * 2;
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.fillStyle = "white";
      ctx.fillRect(0, 0, width, height);
      ctx.lineWidth = 1 * scale;
      ctx.strokeStyle = "#4b4b4b";
      ctx.font = `${14 * scale}px Tahoma, sans-serif`;
      ctx.textBaseline = "middle";

      const x0 = pad;
      let y = pad;
      const tableW = leftW + dates.length * dateW;
      ctx.strokeRect(x0, y, tableW, topH - rowH);
      ctx.font = `bold ${18 * scale}px Tahoma, sans-serif`;
      ctx.textAlign = "center";
      const titleView = view === "GI" ? "อาคาร G+I" : `อาคาร ${view}`;
      ctx.fillStyle = "#111";
      ctx.fillText(`แผนงานประจำงวดโครงการ ${state.settings.projectName} ${titleView}`, x0 + tableW / 2, y + 22 * scale);
      ctx.font = `${12 * scale}px Tahoma, sans-serif`;
      ctx.textAlign = "left";
      const detailY = y + 54 * scale;
      const groups = buildingsForView(view);
      groups.forEach((building, index) => {
        const gx = x0 + index * (tableW / Math.max(1, groups.length));
        ctx.fillText(`อาคาร ${building}`, gx + 6 * scale, detailY);
        const desc = state.periods.filter((p) => p.building === building).map((p) => `งวด ${p.no} ${p.description}`).slice(0, 3);
        desc.forEach((line, i) => fitText(ctx, line, gx + 18 * scale, detailY + (18 + i * 16) * scale, tableW / groups.length - 24 * scale));
      });
      y += topH - rowH;

      drawCell(ctx, x0, y, 52 * scale, rowH, "ลำดับ", true);
      drawCell(ctx, x0 + 52 * scale, y, 168 * scale, rowH, "รายการ", true);
      drawCell(ctx, x0 + 220 * scale, y, 104 * scale, rowH, "มูลค่าค่าแรง", true);
      drawCell(ctx, x0 + 324 * scale, y, 96 * scale, rowH, "บรรทัดข้อมูล", true);
      drawCell(ctx, x0 + 420 * scale, y, 64 * scale, rowH, "ก้าวหน้า", true);
      drawCell(ctx, x0 + 484 * scale, y, 76 * scale, rowH, "หมายเหตุ", true);
      dates.forEach((date, index) => {
        const x = x0 + leftW + index * dateW;
        drawCell(ctx, x, y, dateW, rowH, dayNumber(date), true, isHoliday(date) ? "#c9c9c9" : "#f3f5f3");
      });
      y += rowH;

      for (const building of buildingsForView(view)) {
        drawCell(ctx, x0, y, tableW, rowH, `อาคาร ${building}`, false, "#ffffff", "#d71920", "left", true);
        y += rowH;
        const periods = state.periods.filter((period) => period.building === building);
        periods.forEach((period) => {
          period.items.forEach((item, itemIndex) => {
            const seq = itemIndex === 0 ? period.no : "";
            const leftRows = [
              ["แรงคนงาน(แผน)", (date) => n(item.plan?.[date]) || ""],
              ["แรงคนงาน(จริง)", (date) => itemActualUnits(item, date) || ""],
              ["มูลค่าค่าแรง", (date) => itemLaborCost(item, date) || ""]
            ];
            leftRows.forEach(([label, getter], subIndex) => {
              const fill = "#ffffff";
              drawCell(ctx, x0, y, 52 * scale, rowH, subIndex === 0 ? seq : "", false, fill);
              drawCell(ctx, x0 + 52 * scale, y, 168 * scale, rowH, subIndex === 0 ? item.name : "", false, fill, "#111", "left");
              drawCell(ctx, x0 + 220 * scale, y, 104 * scale, rowH, subIndex === 0 ? money(item.laborValue, 0) : "", false, fill, "#111", "right");
              drawCell(ctx, x0 + 324 * scale, y, 96 * scale, rowH, label, false, fill);
              drawCell(ctx, x0 + 420 * scale, y, 64 * scale, rowH, subIndex === 0 ? `${money(item.progressPct, 0)}%` : "", false, fill);
              drawCell(ctx, x0 + 484 * scale, y, 76 * scale, rowH, "", false, fill);
              dates.forEach((date, index) => {
                const value = getter(date);
                const x = x0 + leftW + index * dateW;
                const hasValue = Number(value) > 0;
                const planValue = subIndex === 0 && hasValue;
                const actualValue = subIndex === 1 && hasValue;
                let bg = isHoliday(date) ? "#c9c9c9" : "#ffffff";
                let color = "#111";
                if (planValue) {
                  bg = "#cfe8ff";
                  color = "#0f3f66";
                }
                if (actualValue) {
                  bg = "#ff2b1f";
                  color = "#fff";
                }
                drawCell(ctx, x, y, dateW, rowH, value ? (subIndex === 2 ? money(value, 0) : qty(value)) : "", false, bg, color);
              });
              y += rowH;
            });
          });
        });
      }

      const totals = [
        ["จำนวนแรงที่ใช้ตามแผน", (date) => totalPlanned(view, date), "plan"],
        ["จำนวนแรงที่ใช้จริง", (date) => totalActualUnits(view, date), "actual"],
        ["ค่าแรงที่ใช้ต่อวัน", (date) => totalLaborCost(view, date), 0],
        ["ค่าเครื่องจักรที่ใช้ต่อวัน", (date) => totalMachineCost(view, date), 0],
        ["รวมค่าใช้จ่ายต่อวัน", (date) => totalSpend(view, date), 0]
      ];
      totals.forEach(([label, getter, digits]) => {
        drawCell(ctx, x0, y, leftW, rowH, label, false, "#ffffff", "#111", "right", true);
        dates.forEach((date, index) => {
          const value = getter(date);
          let bg = isHoliday(date) ? "#c9c9c9" : "#ffffff";
          let color = "#111";
          if (digits === "plan" && value) {
            bg = "#cfe8ff";
            color = "#0f3f66";
          }
          if (digits === "actual" && value) {
            bg = "#ff2b1f";
            color = "#fff";
          }
          const text = digits === "plan" || digits === "actual" ? (value ? qty(value) : "0") : money(value, digits);
          drawCell(ctx, x0 + leftW + index * dateW, y, dateW, rowH, text, false, bg, color);
        });
        y += rowH;
      });

      y += rowH;
      const s = summaryFor(view);
      const summaryW = 580 * scale;
      const valueW = 160 * scale;
      const sx = x0;
      const colors = ["#d9e6f7", "#ff9f9f", "#fff0a8", "#b790dc", "#ff9f9f", "#c8e0b8"];
      const summary = [
        ["มูลค่าค่าแรง", money(s.laborValue, 0)],
        [`ค่าแรงควบคุมที่ ${money(state.settings.controlPercent, 0)}%`, money(s.control, 0)],
        ["ค่าแรงสะสม ณ.ปัจจุบัน (A)", money(s.laborActual, 0)],
        ["ค่าเครื่องจักรสะสม ณ.ปัจจุบัน (B)", money(s.machineActual, 0)],
        ["(A) + (B)", money(s.total, 0)],
        ["สรุปค่าแรง ณ.ปัจจุบัน", pct(s.currentRatio)]
      ];
      summary.forEach((row, i) => {
        drawCell(ctx, sx, y, summaryW, rowH, row[0], false, colors[i], "#111", "right", true);
        drawCell(ctx, sx + summaryW, y, valueW, rowH, row[1], false, colors[i], "#111", "right", true);
        y += rowH;
      });

      const rx = sx + summaryW + valueW + 120 * scale;
      y -= summary.length * rowH;
      const manualRows = [
        ["ค่าแรงต้นทุนสะสมถึงงวดปัจจุบัน", money(s.manual.contractLaborCost, 0), "#d9e6f7"],
        ["ค่าแรง+ค่าเครื่องจักรสะสมถึงวัน update", money(s.manual.costToUpdate, 0), "#fff0a8"],
        ["สรุปค่าแรงทั้งโครงการ(ถ้าอนุมัติ ณ วันupdate)", pct(s.manualRatio), "#ff9f9f"],
        ["วันที่ Update", dateLabel(state.settings.updateDate), "#e8e8e8"],
        ["หมายเหตุ", s.manual.note || "", "#c8e0b8"]
      ];
      manualRows.forEach((row) => {
        drawCell(ctx, rx, y, 360 * scale, rowH, row[0], false, row[2], "#111", "left", true);
        drawCell(ctx, rx + 360 * scale, y, 170 * scale, rowH, row[1], false, row[2], "#111", "right", true);
        y += rowH;
      });
    }

    function drawCell(ctx, x, y, w, h, text, header = false, fill = "#ffffff", color = "#111111", align = "center", bold = false) {
      ctx.fillStyle = fill;
      ctx.fillRect(x, y, w, h);
      ctx.strokeStyle = "#5c5c5c";
      ctx.strokeRect(x, y, w, h);
      ctx.fillStyle = color;
      ctx.font = `${bold || header ? "bold " : ""}${Math.max(9, h * 0.48)}px Tahoma, sans-serif`;
      ctx.textAlign = align;
      const tx = align === "left" ? x + 4 : align === "right" ? x + w - 4 : x + w / 2;
      fitText(ctx, text, tx, y + h / 2, w - 8, align);
    }

    function fitText(ctx, text, x, y, maxWidth, align = "left") {
      const value = String(text ?? "");
      if (!value) return;
      let out = value;
      while (ctx.measureText(out).width > maxWidth && out.length > 1) out = out.slice(0, -2);
      if (out !== value) out += "…";
      ctx.fillText(out, x, y, maxWidth);
    }

    document.addEventListener("click", handleClick);
    document.addEventListener("input", handleInput);
    document.addEventListener("change", handleChange);
    $("#saveCellBtn").addEventListener("click", saveCellDraft);
    $("#clearCellBtn").addEventListener("click", clearCellDraft);

    renderAll();
  </script>
</body>
</html>
