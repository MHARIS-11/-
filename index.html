      if (action === "quick-add-worker") return quickAddWorker();
      if (action === "quick-save-plan") return quickSetPlan();
      if (action === "quick-add-machine") return quickAddMachine();
      if (action === "quick-open-detail") return quickOpenDetail();
      if (action === "add-draft-worker") return addWorkerToDraft();
      if (action === "add-draft-machine") return addMachineToDraft();

        cellDraft.assignments.splice(Number(button.dataset.index), 1);

        cellDraft.machineRows.splice(Number(button.dataset.index), 1);

      if (action === "open-new-period") return openNewPeriodEditor();
      if (action === "open-period-main") return openPeriodMain(button.dataset.periodMainKey);

      if (action === "close-period-editor") return closePeriodEditor();
      if (action === "split-period") return splitPeriod(button.dataset.periodId);
      if (action === "close-split-dialog") return closeSplitDialog();
      if (action === "save-split-dialog") return applySplitDialog();
      if (action === "open-accum-dialog") return openAccumDialog();
      if (action === "close-accum-dialog") return closeAccumDialog();
      if (action === "save-accum-dialog") return saveAccumDialog();
      if (action === "set-split-mode") {
        const ctx = splitDialogContext();
        if (!ctx || !splitDraft) return;
        splitDraft.mode = button.dataset.splitMode || "same";
        if (splitDraft.mode !== "custom") splitDraft.newNo = splitModeDefaultNo(ctx.period, splitDraft.mode);
        renderSplitDialog();
        if (splitDraft.mode === "custom") requestAnimationFrame(() => $("#splitNewNoInput")?.focus());

      if (action === "merge-period-group") return mergePeriodGroup(button.dataset.periodMainKey);

    function handleInput(event) {
      const target = event.target;
      if (target.dataset.splitField) return updateSplitDraftField(target);
      if (target.dataset.accumField) return refreshAccumDialogTotals();
      if (target.dataset.borrowField) return updateBorrowDraftField(target);
      if (target.dataset.setting) {
        const key = target.dataset.setting;
        if (["dayHours", "controlPercent"].includes(key)) state.settings[key] = n(target.value);
        else state.settings[key] = target.value;
        saveState();
        renderNav();

        return openPeriodMain(mainRow.dataset.periodMainRow);

        event.preventDefault();
        return openPeriodEditor(periodRow.dataset.periodRow);

      if (activeTab !== "plan") return;
      if ($("#cellDialog")?.open) return;
      if (event.target?.closest?.("input, textarea, select, [contenteditable='true']")) return;
      const key = event.key.toLowerCase();
      const mod = event.ctrlKey || event.metaKey;
      if (mod && key === "z") {
        event.preventDefault();
        return undo();
      }
      if (mod && key === "y") {
        event.preventDefault();
        return redo();
      }
      if (mod && key === "c") {
        event.preventDefault();
        return copySelectedCells();
      }
      if (mod && key === "v") {
        event.preventDefault();
        return pasteCells();
      }
      if (event.key === "Delete") {

        event.preventDefault();
        return clearSelectedCells();
      }
    }

    function nextExistingWorkPlan(current) {
      if (!current) return null;
      const currentNo = Number(current.claimNo);
      if (Number.isFinite(currentNo)) {
        return [...state.workPlans]
          .filter((plan) => plan.id !== current.id && plan.status !== "เสร็จสิ้น" && Number(plan.claimNo) > currentNo)
          .sort((a, b) => Number(a.claimNo) - Number(b.claimNo))[0] || null;

      const index = state.workPlans.findIndex((plan) => plan.id === current.id);
      return state.workPlans.slice(index + 1).find((plan) => plan.status !== "เสร็จสิ้น") || null;

    function parsePeriodTemplateRows(rows, building) {
      const cleanRows = rows
        .map((row) => (row || []).map((cell) => String(cell ?? "").trim()))
        .filter((row) => row.some(Boolean));
      if (!cleanRows.length) throw new Error("ไม่พบข้อมูลในไฟล์");
      const aliases = {
        periodNo: ["งวดงานที่", "งวด", "period", "periodno"],
        value: ["จำนวนเงินงวดบาท", "จำนวนเงินงวด", "มูลค่างวด", "value", "amount"],
        description: ["รายละเอียดงาน", "รายละเอียด", "description"],
        order: ["ลำดับเงื่อนไข", "ลำดับ", "ลำดับที่", "order"],
        item: ["แจกแจงรายการรายละเอียดงาน", "รายการรายละเอียดงาน", "รายการ", "item"],
        note: ["หมายเหตุ", "note"]
      };
      let headerIndex = -1;
      let indexes = { periodNo: 0, value: 1, description: 2, order: 3, item: 4, note: 5 };
      cleanRows.some((row, rowIndex) => {
        const headers = row.map(normalizeHeader);
        const found = {};
        Object.entries(aliases).forEach(([key, words]) => {
          const normalizedWords = words.map(normalizeHeader);
          let index = headers.findIndex((header) => normalizedWords.includes(header));
          if (index < 0) index = headers.findIndex((header) => normalizedWords.some((word) => header && (header.includes(word) || word.includes(header))));
          found[key] = index;
        });
        const score = ["periodNo", "value", "description", "item"].filter((key) => found[key] >= 0).length;
        if (score >= 3) {
          headerIndex = rowIndex;
          indexes = {
            periodNo: found.periodNo >= 0 ? found.periodNo : 0,
            value: found.value >= 0 ? found.value : 1,
            description: found.description >= 0 ? found.description : 2,
            order: found.order >= 0 ? found.order : 3,
            item: found.item >= 0 ? found.item : 4,
            note: found.note >= 0 ? found.note : 5
          };
          return true;
        }
        return false;
      });
      if (headerIndex < 0) throw new Error("ไม่พบหัวตารางงวดงานในไฟล์");
      const sourceTitle = cleanRows.slice(0, headerIndex).flat().filter(Boolean).join(" ").trim();
      const periods = [];
      let current = null;
      cleanRows.slice(headerIndex + 1).forEach((row) => {
        const no = String(row[indexes.periodNo] || "").trim();
        const value = parseMoneyValue(row[indexes.value]);
        const description = String(row[indexes.description] || "").trim();
        const order = String(row[indexes.order] || "").trim();
        const itemName = String(row[indexes.item] || "").trim();
        const note = String(row[indexes.note] || "").trim();
        if (no) {
          current = { no, value, description, items: [] };
          periods.push(current);
        }
        if (!current) return;
        if (value && !current.value) current.value = value;
        if (description && !current.description) current.description = description;
        if (order || itemName || note) current.items.push({ order, name: itemName, note });
      });
      if (!periods.length) throw new Error("ไม่พบรายการงวดงานในไฟล์");
      return { building, sourceTitle, importedAt: isoToday(), periods };
    }

    function importWorkerRows(rows) {
      const normalized = normalizeWorkerRows(rows);
      if (!normalized.length) throw new Error("ไม่พบข้อมูลคนงานในไฟล์");
      const byCode = new Map();
      normalized.forEach((row) => byCode.set(row.code, row));
      let added = 0;
      let updated = 0;
      byCode.forEach((row) => {
        const existing = state.workers.find((worker) => String(worker.code).trim() === row.code);
        if (existing) {
          existing.name = row.name;
          existing.dailyWage = row.dailyWage;
          updated++;
        } else {
          state.workers.push({ id: uid("w"), code: row.code, name: row.name, dailyWage: row.dailyWage });
          added++;
        }
      });
      return { added, updated };
    }

    function normalizeWorkerRows(rows) {
      const cleanRows = rows
        .map((row) => row.map((cell) => String(cell ?? "").trim()))
        .filter((row) => row.some(Boolean));
      if (!cleanRows.length) return [];
      const aliases = {
        code: ["รหัส", "รหัสพนักงาน", "code", "employeeid", "employee code", "id"],
        name: ["ชื่อสกุล", "ชื่อ-สกุล", "ชื่อ", "name", "fullname", "full name"],
        wage: ["ค่าแรง", "ค่าแรงเต็มวัน", "dailywage", "daily wage", "wage", "rate"]
      };
      let headerIndex = -1;
      let indexes = { code: 0, name: 1, wage: 2 };
      cleanRows.some((row, index) => {
        const headers = row.map(normalizeHeader);
        const found = {};
        Object.entries(aliases).forEach(([key, words]) => {
          found[key] = headers.findIndex((header) => words.map(normalizeHeader).includes(header));
        });
        const score = Object.values(found).filter((value) => value >= 0).length;
        if (score >= 2) {
          headerIndex = index;
          indexes = {
            code: found.code >= 0 ? found.code : 0,
            name: found.name >= 0 ? found.name : 1,
            wage: found.wage >= 0 ? found.wage : 2
          };
          return true;
        }
        return false;
      });
      const start = headerIndex >= 0 ? headerIndex + 1 : 0;
      return cleanRows.slice(start).map((row) => ({
        code: String(row[indexes.code] || "").trim(),
        name: String(row[indexes.name] || "").trim(),
        dailyWage: parseMoneyValue(row[indexes.wage])
      })).filter((row) => row.code && row.name);
    }

    function normalizeHeader(value) {
      return String(value || "").toLowerCase().replace(/[\s._\-()]/g, "");
    }

    function parseMoneyValue(value) {
      const cleaned = String(value ?? "").replace(/,/g, "").replace(/[^\d.-]/g, "");
      return n(cleaned);
    }

    function parseDelimitedRows(text) {
      const sample = text.split(/\r?\n/).slice(0, 5).join("\n");
      const delimiter = ["\t", ",", ";"].sort((a, b) => sample.split(b).length - sample.split(a).length)[0];
      const rows = [];
      let row = [];
      let cell = "";
      let quoted = false;
      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        const next = text[i + 1];
        if (ch === '"' && quoted && next === '"') {
          cell += '"';
          i++;
        } else if (ch === '"') {
          quoted = !quoted;
        } else if (ch === delimiter && !quoted) {
          row.push(cell);
          cell = "";
        } else if ((ch === "\n" || ch === "\r") && !quoted) {
          if (ch === "\r" && next === "\n") i++;
          row.push(cell);
          rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += ch;
        }
      }
      row.push(cell);
      if (row.some((value) => String(value).trim())) rows.push(row);
      return rows;
    }

    async function readXlsxRows(buffer) {
      const entries = readZipEntries(buffer);
      const workbookXml = await zipText(entries, "xl/workbook.xml");
      const relsXml = await zipText(entries, "xl/_rels/workbook.xml.rels");
      const sheetPath = firstWorksheetPath(workbookXml, relsXml, entries);
      const [sharedXml, sheetXml] = await Promise.all([
        entries.has("xl/sharedStrings.xml") ? zipText(entries, "xl/sharedStrings.xml") : "",
        zipText(entries, sheetPath)
      ]);
      const sharedStrings = parseSharedStrings(sharedXml);
      return parseSheetRows(sheetXml, sharedStrings);
    }

    function readZipEntries(buffer) {
      const view = new DataView(buffer);
      const bytes = new Uint8Array(buffer);
      const decoder = new TextDecoder("utf-8");
      let eocd = -1;
      for (let i = bytes.length - 22; i >= Math.max(0, bytes.length - 66000); i--) {
        if (view.getUint32(i, true) === 0x06054b50) {
          eocd = i;
          break;
        }
      }
      if (eocd < 0) throw new Error("อ่านไฟล์ Excel ไม่ได้");
      const total = view.getUint16(eocd + 10, true);
      let offset = view.getUint32(eocd + 16, true);
      const entries = new Map();
      for (let i = 0; i < total; i++) {
        if (view.getUint32(offset, true) !== 0x02014b50) throw new Error("โครงไฟล์ Excel ไม่ถูกต้อง");
        const method = view.getUint16(offset + 10, true);
        const compressedSize = view.getUint32(offset + 20, true);
        const fileNameLength = view.getUint16(offset + 28, true);
        const extraLength = view.getUint16(offset + 30, true);
        const commentLength = view.getUint16(offset + 32, true);
        const localOffset = view.getUint32(offset + 42, true);
        const name = decoder.decode(bytes.slice(offset + 46, offset + 46 + fileNameLength)).replace(/\\/g, "/");
        const localNameLength = view.getUint16(localOffset + 26, true);
        const localExtraLength = view.getUint16(localOffset + 28, true);
        const dataStart = localOffset + 30 + localNameLength + localExtraLength;
        entries.set(name, { method, data: bytes.slice(dataStart, dataStart + compressedSize) });
        offset += 46 + fileNameLength + extraLength + commentLength;
      }
      return entries;
    }

    async function zipText(entries, path) {
      const entry = entries.get(path);
      if (!entry) throw new Error(`ไม่พบ ${path} ในไฟล์ Excel`);
      let data = entry.data;
      if (entry.method === 8) {
        if (!("DecompressionStream" in window)) throw new Error("เบราว์เซอร์นี้ยังอ่าน .xlsx ไม่ได้ ให้บันทึกเป็น CSV แล้วนำเข้าแทน");
        const stream = new Blob([entry.data]).stream().pipeThrough(new DecompressionStream("deflate-raw"));
        data = new Uint8Array(await new Response(stream).arrayBuffer());
      } else if (entry.method !== 0) {
        throw new Error("ไฟล์ Excel ใช้วิธีบีบอัดที่ยังไม่รองรับ");
      }
      return new TextDecoder("utf-8").decode(data);
    }

    function parseXml(xml) {
      const doc = new DOMParser().parseFromString(xml, "application/xml");
      if (doc.getElementsByTagName("parsererror").length) throw new Error("อ่าน XML ในไฟล์ Excel ไม่ได้");
      return doc;
    }

    function xmlChildren(node, localName) {
      return [...node.getElementsByTagName("*")].filter((el) => el.localName === localName);
    }

    function firstWorksheetPath(workbookXml, relsXml, entries) {
      const workbook = parseXml(workbookXml);
      const rels = parseXml(relsXml);
      const firstSheet = xmlChildren(workbook, "sheet")[0];
      const relId = firstSheet?.getAttribute("r:id");
      if (relId) {
        const rel = xmlChildren(rels, "Relationship").find((row) => row.getAttribute("Id") === relId);
        const target = rel?.getAttribute("Target") || "";
        const path = target.startsWith("/") ? target.slice(1) : `xl/${target}`;
        if (entries.has(path)) return path;
      }
      return [...entries.keys()].find((path) => /^xl\/worksheets\/sheet\d+\.xml$/.test(path)) || "xl/worksheets/sheet1.xml";
    }

    function parseSharedStrings(xml) {
      if (!xml) return [];
      const doc = parseXml(xml);
      return xmlChildren(doc, "si").map((si) => xmlChildren(si, "t").map((t) => t.textContent || "").join(""));
    }

    function parseSheetRows(xml, sharedStrings) {
      const doc = parseXml(xml);
      return xmlChildren(doc, "row").map((rowEl) => {
        const row = [];
        xmlChildren(rowEl, "c").forEach((cell, fallbackIndex) => {
          const ref = cell.getAttribute("r") || "";
          const index = columnIndex(ref) ?? fallbackIndex;
          const type = cell.getAttribute("t");
          const v = xmlChildren(cell, "v")[0]?.textContent || "";
          const inline = xmlChildren(cell, "t").map((t) => t.textContent || "").join("");
          row[index] = type === "s" ? (sharedStrings[Number(v)] || "") : type === "inlineStr" ? inline : v;
        });
        return row.map((value) => value ?? "");
      });
    }

    function columnIndex(ref) {
      const letters = String(ref).match(/[A-Z]+/i)?.[0];
      if (!letters) return null;
      return [...letters.toUpperCase()].reduce((sum, ch) => sum * 26 + ch.charCodeAt(0) - 64, 0) - 1;
    }

    function canvasToPdfBlob(canvas) {
      const jpeg = canvas.toDataURL("image/jpeg", 0.94);
      const binary = atob(jpeg.split(",")[1]);
      const imageBytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) imageBytes[i] = binary.charCodeAt(i);
      const landscape = canvas.width >= canvas.height;
      const pageW = landscape ? 842 : 595;
      const pageH = landscape ? 595 : 842;
      const margin = 24;
      const ratio = Math.min((pageW - margin * 2) / canvas.width, (pageH - margin * 2) / canvas.height);
      const imgW = canvas.width * ratio;
      const imgH = canvas.height * ratio;
      const imgX = (pageW - imgW) / 2;
      const imgY = (pageH - imgH) / 2;
      const encoder = new TextEncoder();
      const chunks = [];
      const offsets = [0];
      let length = 0;
      const add = (text) => {
        const bytes = encoder.encode(text);
        chunks.push(bytes);
        length += bytes.length;
      };
      const addBytes = (bytes) => {
        chunks.push(bytes);
        length += bytes.length;
      };
      const startObject = (id) => {
        offsets[id] = length;
        add(`${id} 0 obj\n`);
      };
      add("%PDF-1.4\n");
      startObject(1);
      add("<< /Type /Catalog /Pages 2 0 R >>\nendobj\n");
      startObject(2);
      add("<< /Type /Pages /Kids [3 0 R] /Count 1 >>\nendobj\n");
      startObject(3);
      add(`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${pageW} ${pageH}] /Resources << /XObject << /Im0 4 0 R >> >> /Contents 5 0 R >>\nendobj\n`);
      startObject(4);
      add(`<< /Type /XObject /Subtype /Image /Width ${canvas.width} /Height ${canvas.height} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${imageBytes.length} >>\nstream\n`);
      addBytes(imageBytes);
      add("\nendstream\nendobj\n");
      const content = `q\n${imgW.toFixed(2)} 0 0 ${imgH.toFixed(2)} ${imgX.toFixed(2)} ${imgY.toFixed(2)} cm\n/Im0 Do\nQ\n`;
      startObject(5);
      add(`<< /Length ${encoder.encode(content).length} >>\nstream\n${content}endstream\nendobj\n`);
      const xref = length;
      add(`xref\n0 6\n0000000000 65535 f \n`);
      for (let i = 1; i <= 5; i++) add(`${String(offsets[i]).padStart(10, "0")} 00000 n \n`);
      add(`trailer\n<< /Size 6 /Root 1 0 R >>\nstartxref\n${xref}\n%%EOF`);
      const pdf = new Uint8Array(length);
      let cursor = 0;
      chunks.forEach((chunk) => {
        pdf.set(chunk, cursor);
        cursor += chunk.length;
      });
      return new Blob([pdf], { type: "application/pdf" });
    }

    function drawAttendanceReport(canvas, view = attendanceView(), monthKey = selectedAttendanceMonth(), scale = 1, variant = attendanceExportMode()) {
      if (!canvas) return;
      const withWage = variant !== "noWage";
      const data = attendanceData(view, monthKey);
      const rowH = 24 * scale;
      const titleH = 82 * scale;
      const pad = 14 * scale;
      const seqW = 56 * scale;
      const codeW = 96 * scale;
      const nameW = 210 * scale;
      const dayW = 34 * scale;
      const workedW = 68 * scale;
      const absentW = 68 * scale;
      const wageW = 112 * scale;
      const leftW = seqW + codeW + nameW;
      const summaryW = workedW + absentW + (withWage ? wageW : 0);
      const tableW = leftW + data.dates.length * dayW + summaryW;
      const footerRows = 1 + (withWage ? 1 : 0);
      const height = titleH + rowH * (2 + data.rows.length + footerRows) + pad * 2;
      const width = tableW + pad * 2;
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.fillStyle = "white";
      ctx.fillRect(0, 0, width, height);
      ctx.lineWidth = 1 * scale;
      ctx.strokeStyle = "#5c5c5c";
      ctx.textBaseline = "middle";
      const x0 = pad;
      let y = pad;
      ctx.font = `bold ${18 * scale}px Tahoma, sans-serif`;
      ctx.fillStyle = "#111";
      ctx.textAlign = "center";
      ctx.fillText(`รายงานวันมาทำงานคนงาน ${state.settings.projectName}`, x0 + tableW / 2, y + 16 * scale);
      ctx.font = `bold ${12 * scale}px Tahoma, sans-serif`;
      ctx.fillStyle = "#444";
      ctx.fillText(`${workPlanLabel()} · ${attendanceViewLabel(view)} · ${monthYearLabel(`${monthKey}-01`)} · อัปเดต ${dateLabel(planUpdateDate())}`, x0 + tableW / 2, y + 40 * scale);
      const legendY = y + 64 * scale;
      ctx.textAlign = "left";
      ctx.fillStyle = "#00543a";
      ctx.fillText("✓ มาทำงาน", x0, legendY);
      ctx.fillStyle = "#b3261e";
      ctx.fillText("× ขาด", x0 + 92 * scale, legendY);
      ctx.fillStyle = "#075985";
      ctx.fillText("B = ถูกยืมไปอาคาร B", x0 + 154 * scale, legendY);
      ctx.fillStyle = "#555";
      ctx.fillText("สีเทา = วันหยุดบริษัท / คนงานไม่มีงานทั้งเดือน", x0 + 300 * scale, legendY);
      y += titleH;

      drawCell(ctx, x0, y, seqW, rowH * 2, "ลำดับ", true);
      drawCell(ctx, x0 + seqW, y, codeW, rowH * 2, "รหัส", true);
      drawCell(ctx, x0 + seqW + codeW, y, nameW, rowH * 2, "ชื่อ-สกุล", true);
      drawCell(ctx, x0 + leftW, y, data.dates.length * dayW, rowH, monthYearLabel(`${monthKey}-01`), true, "#f3f5f3");
      const summaryX = x0 + leftW + data.dates.length * dayW;
      drawCell(ctx, summaryX, y, workedW, rowH * 2, "✓", true);
      drawCell(ctx, summaryX + workedW, y, absentW, rowH * 2, "×", true);
      if (withWage) drawCell(ctx, summaryX + workedW + absentW, y, wageW, rowH * 2, "ค่าแรงรวม", true);
      y += rowH;
      data.dates.forEach((date, index) => {
        drawCell(ctx, x0 + leftW + index * dayW, y, dayW, rowH, dayNumber(date), true, isHoliday(date) ? "#c9c9c9" : "#f3f5f3");
      });
      y += rowH;

      data.rows.forEach((row, index) => {
        const inactive = row.workedCount === 0;
        const rowFill = inactive ? "#eef0ee" : "#ffffff";
        drawCell(ctx, x0, y, seqW, rowH, index + 1, false, rowFill, inactive ? "#777" : "#111", "center", true);
        drawCell(ctx, x0 + seqW, y, codeW, rowH, row.worker.code, false, rowFill, inactive ? "#777" : "#111", "center", true);
        drawCell(ctx, x0 + seqW + codeW, y, nameW, rowH, row.worker.name, false, rowFill, inactive ? "#777" : "#111", "left");
        data.dates.forEach((date, index) => {
          const mark = attendanceMark(row, date, data.cutoff);
          let text = "";
          let bg = rowFill;
          let color = inactive ? "#777" : "#111";
          let bold = false;
          if (mark === "holiday") bg = "#c9c9c9";
          if (mark === "worked") {
            text = "✓";
            color = "#00543a";
            bold = true;
          }
          if (isBorrowedMark(mark)) {
            text = borrowedMarkLabel(mark);
            bg = "#dbeafe";
            color = "#075985";
            bold = true;
          }
          if (mark === "absent") {
            text = "×";
            color = "#b3261e";
            bold = true;
          }
          drawCell(ctx, x0 + leftW + index * dayW, y, dayW, rowH, text, false, bg, color, "center", bold);
        });
        drawCell(ctx, summaryX, y, workedW, rowH, row.workedCount ? money(row.workedDays, 0) : "", false, rowFill, inactive ? "#777" : "#111", "center", true);
        drawCell(ctx, summaryX + workedW, y, absentW, rowH, row.workedCount ? money(row.absentDays, 0) : "", false, rowFill, inactive ? "#777" : "#111", "center", true);
        if (withWage) drawCell(ctx, summaryX + workedW + absentW, y, wageW, rowH, row.workedCount ? money(row.monthCost, 0) : "", false, rowFill, inactive ? "#777" : "#111", "right", true);
        y += rowH;
      });

      drawCell(ctx, x0, y, leftW, rowH, "จำนวนคนลงงาน", false, "#f3f5f3", "#111", "right", true);
      data.dates.forEach((date, index) => {
        drawCell(ctx, x0 + leftW + index * dayW, y, dayW, rowH, data.dayWorkers.get(date)?.size || 0, false, isHoliday(date) ? "#c9c9c9" : "#f3f5f3", "#111", "center", true);
      });
      drawCell(ctx, summaryX, y, workedW, rowH, "", false, "#f3f5f3");
      drawCell(ctx, summaryX + workedW, y, absentW, rowH, "", false, "#f3f5f3");
      if (withWage) drawCell(ctx, summaryX + workedW + absentW, y, wageW, rowH, "", false, "#f3f5f3");
      y += rowH;
      if (withWage) {
        drawCell(ctx, x0, y, leftW, rowH, "ค่าแรงรวม", false, "#f3f5f3", "#111", "right", true);
        data.dates.forEach((date, index) => {
          drawCell(ctx, x0 + leftW + index * dayW, y, dayW, rowH, money(data.dayCosts.get(date) || 0, 0), false, isHoliday(date) ? "#c9c9c9" : "#f3f5f3", "#111", "center");
        });
        drawCell(ctx, summaryX, y, workedW, rowH, "", false, "#f3f5f3");
        drawCell(ctx, summaryX + workedW, y, absentW, rowH, "", false, "#f3f5f3");
        drawCell(ctx, summaryX + workedW + absentW, y, wageW, rowH, money([...data.dayCosts.values()].reduce((sum, value) => sum + value, 0), 0), false, "#f3f5f3", "#111", "right", true);
      }
    }

    function drawReport(canvas, view, scale = 1, mode = reportMode()) {
      if (!canvas) return;
      const projectPlan = mode === "projectPlan";
      const dates = getDates();
      const dateW = 42 * scale;
      const pad = 16 * scale;
      const rowH = 22 * scale;
      const topH = 150 * scale;
      const seqW = 56 * scale;
      const itemW = 190 * scale;
      const laborValueW = 118 * scale;
      const dataLabelW = 112 * scale;
      const progressW = 68 * scale;
      const noteW = 76 * scale;
      const leftW = seqW + itemW + laborValueW + dataLabelW + progressW + noteW;
      const reportPeriods = periodsForView(view);
      const itemRows = reportPeriods.reduce((sum, period) => sum + 1 + period.items.length * 3, 0);
      const totalRows = reportPeriods.length ? 5 : 0;
      const summaryRows = 6;
      const width = leftW + dates.length * dateW + pad * 2;
      const height = topH + (itemRows + totalRows + summaryRows + 4) * rowH + pad * 2;
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.fillStyle = "white";
      ctx.fillRect(0, 0, width, height);
      ctx.lineWidth = 1 * scale;
      ctx.strokeStyle = "#4b4b4b";
      ctx.font = `${14 * scale}px Tahoma, sans-serif`;
      ctx.textBaseline = "middle";

      const x0 = pad;
      let y = pad;
      const tableW = leftW + dates.length * dateW;
      ctx.strokeRect(x0, y, tableW, topH - rowH * 2);
      ctx.font = `bold ${18 * scale}px Tahoma, sans-serif`;
      ctx.textAlign = "center";
      const titleView = reportViewTitle(view);
      ctx.fillStyle = "#111";
      ctx.fillText(`แผนงานประจำงวดโครงการ ${state.settings.projectName} ${titleView}`, x0 + tableW / 2, y + 22 * scale);
      const claimDate = planClaimDate();
      let claimLineX = null;
      let claimBoxBottomY = null;
      if (claimDate) {
        const claimIndex = dates.indexOf(claimDate);
        const boxW = 154 * scale;
        const boxH = 46 * scale;
        const minBoxX = x0 + 4 * scale;
        const maxBoxX = x0 + tableW - boxW - 4 * scale;
        claimLineX = claimIndex >= 0 ? x0 + leftW + claimIndex * dateW + dateW / 2 : x0 + tableW - boxW / 2 - 12 * scale;
        const boxX = Math.max(minBoxX, Math.min(maxBoxX, claimLineX - boxW / 2));
        const boxY = y + 12 * scale;
        claimBoxBottomY = boxY + boxH;
        ctx.strokeStyle = "#111";
        ctx.strokeRect(boxX, boxY, boxW, boxH);
        ctx.font = `bold ${10 * scale}px Tahoma, sans-serif`;
        ctx.textAlign = "center";
        ctx.fillText(workPlanLabel(), boxX + boxW / 2, boxY + 15 * scale);
        ctx.font = `${10 * scale}px Tahoma, sans-serif`;
        ctx.fillText(thaiDateInput(claimDate), boxX + boxW / 2, boxY + 32 * scale);
      }
      ctx.font = `${12 * scale}px Tahoma, sans-serif`;
      ctx.textAlign = "left";
      const detailY = y + 54 * scale;
      const groups = buildingsForView(view);
      groups.forEach((building, index) => {
        const gx = x0 + index * (tableW / Math.max(1, groups.length));
        ctx.fillText(buildingReportLabel(building), gx + 6 * scale, detailY);
        const desc = periodsForBuilding(building).map((p) => `งวด ${p.no} ${p.description}`).slice(0, 3);
        desc.forEach((line, i) => fitText(ctx, line, gx + 18 * scale, detailY + (18 + i * 16) * scale, tableW / groups.length - 24 * scale));
      });
      y += topH - rowH * 2;
      const scheduleTopY = y;

      drawCell(ctx, x0, y, seqW, rowH * 2, "ลำดับ", true);
      drawCell(ctx, x0 + seqW, y, itemW, rowH * 2, "รายการ", true);
      drawCell(ctx, x0 + seqW + itemW, y, laborValueW, rowH * 2, "มูลค่าค่าแรง", true);
      drawCell(ctx, x0 + seqW + itemW + laborValueW, y, dataLabelW, rowH * 2, "บรรทัดข้อมูล", true);
      drawCell(ctx, x0 + seqW + itemW + laborValueW + dataLabelW, y, progressW, rowH * 2, "ก้าวหน้า", true);
      drawCell(ctx, x0 + seqW + itemW + laborValueW + dataLabelW + progressW, y, noteW, rowH * 2, "หมายเหตุ", true);
      let monthX = x0 + leftW;
      monthGroups(dates).forEach((group) => {
        const w = group.count * dateW;
        drawCell(ctx, monthX, y, w, rowH, group.label, true, "#f3f5f3");
        monthX += w;
      });
      y += rowH;
      dates.forEach((date, index) => {
        const x = x0 + leftW + index * dateW;
        drawCell(ctx, x, y, dateW, rowH, dayNumber(date), true, isHoliday(date) ? "#c9c9c9" : "#f3f5f3");
      });
      y += rowH;

      for (const building of buildingsForView(view)) {
        drawCell(ctx, x0, y, tableW, rowH, buildingReportLabel(building), false, "#ffffff", "#d71920", "left", true);
        y += rowH;
        const periods = periodsForBuilding(building);
        periods.forEach((period) => {
          period.items.forEach((item, itemIndex) => {
            const seq = itemIndex === 0 ? period.no : "";
            const leftRows = [
              ["แรงคนงาน(แผน)", (date) => itemPlanValue(item, date) || ""],
              ["แรงคนงาน(จริง)", (date) => itemActualUnits(item, date) || ""],
              ["มูลค่าค่าแรง", (date) => itemLaborCost(item, date) || ""]
            ];
            leftRows.forEach(([label, getter], subIndex) => {
              const fill = "#ffffff";
              drawCell(ctx, x0, y, seqW, rowH, subIndex === 0 ? seq : "", false, fill);
              drawCell(ctx, x0 + seqW, y, itemW, rowH, subIndex === 0 ? item.name : "", false, fill, "#111", "left");
              drawCell(ctx, x0 + seqW + itemW, y, laborValueW, rowH, subIndex === 0 ? money(item.laborValue, 0) : "", false, fill, "#111", "right");
              drawCell(ctx, x0 + seqW + itemW + laborValueW, y, dataLabelW, rowH, label, false, fill);
              drawCell(ctx, x0 + seqW + itemW + laborValueW + dataLabelW, y, progressW, rowH, subIndex === 0 ? `${money(item.progressPct, 0)}%` : "", false, fill);
              drawCell(ctx, x0 + seqW + itemW + laborValueW + dataLabelW + progressW, y, noteW, rowH, "", false, fill);
              dates.forEach((date, index) => {
                const value = projectPlan && subIndex > 0 ? "" : getter(date);
                const x = x0 + leftW + index * dateW;
                const hasValue = Number(value) > 0;
                const planValue = subIndex === 0 && hasValue;
                const actualValue = !projectPlan && subIndex === 1 && hasValue;
                let bg = isHoliday(date) ? "#c9c9c9" : "#ffffff";
                let color = "#111";
                if (planValue) {
                  bg = "#cfe8ff";
                  color = "#0f3f66";
                }
                if (actualValue) {
                  bg = "#ff2b1f";
                  color = "#fff";
                }
                drawCell(ctx, x, y, dateW, rowH, value ? (subIndex === 2 ? money(value, 0) : qty(value)) : "", false, bg, color);
              });
              y += rowH;
            });
          });
        });
      }

      const totals = [
        ["จำนวนแรงที่ใช้ตามแผน", (date) => totalPlanned(view, date), "plan"],
        ["จำนวนแรงที่ใช้จริง", (date) => totalActualUnits(view, date), "actual"],
        ["ค่าแรงที่ใช้ต่อวัน", (date) => totalLaborCost(view, date), 0],
        ["ค่าเครื่องจักรที่ใช้ต่อวัน", (date) => totalMachineCost(view, date), 0],
        ["รวมค่าใช้จ่ายต่อวัน", (date) => totalSpend(view, date), 0]
      ];
      if (reportPeriods.length) {
        totals.forEach(([label, getter, digits]) => {
          drawCell(ctx, x0, y, leftW, rowH, label, false, "#ffffff", "#111", "right", true);
          dates.forEach((date, index) => {
            const value = getter(date);
            const bg = isHoliday(date) ? "#c9c9c9" : "#ffffff";
            const text = projectPlan && digits !== "plan" ? "" : (digits === "plan" || digits === "actual" ? (value ? qty(value) : "0") : money(value, digits));
            drawCell(ctx, x0 + leftW + index * dateW, y, dateW, rowH, text, false, bg, "#111");
          });
          y += rowH;
        });
      }

      if (claimLineX !== null && dates.includes(claimDate)) {
        ctx.save();
        ctx.setLineDash([6 * scale, 5 * scale]);
        ctx.strokeStyle = "#111";
        ctx.lineWidth = 2 * scale;
        ctx.beginPath();
        ctx.moveTo(claimLineX, (claimBoxBottomY || scheduleTopY) + 4 * scale);
        ctx.lineTo(claimLineX, y + rowH * 2);
        ctx.stroke();
        ctx.restore();
      }

      y += rowH;
      const s = summaryFor(view);
      const summaryW = 580 * scale;
      const valueW = 160 * scale;
      const sx = x0;
      const colors = ["#d9e6f7", "#ff9f9f", "#fff0a8", "#b790dc", "#ff9f9f", "#c8e0b8"];
      const summary = [
        ["มูลค่าค่าแรง", money(s.laborValue, 0)],
        [`ค่าแรงควบคุมที่ ${money(state.settings.controlPercent, 0)}%`, money(s.control, 0)],
        ["ค่าแรงสะสม ณ.ปัจจุบัน (A)", money(s.laborActual, 0)],
        ["ค่าเครื่องจักรสะสม ณ.ปัจจุบัน (B)", money(s.machineActual, 0)],
        ["(A) + (B)", money(s.total, 0)],
        ["สรุปค่าแรง ณ.ปัจจุบัน", pct(s.currentRatio)]
      ];
      summary.forEach((row, i) => {
        drawCell(ctx, sx, y, summaryW, rowH, row[0], false, colors[i], "#111", "right", true);
        drawCell(ctx, sx + summaryW, y, valueW, rowH, row[1], false, colors[i], "#111", "right", true);
        y += rowH;
      });

      const rx = sx + summaryW + valueW + 120 * scale;
      y -= summary.length * rowH;
      const manualRows = [
        ["ค่าแรงต้นทุนสะสมถึงงวดปัจจุบัน", money(s.manual.contractLaborCost, 0), "#d9e6f7"],
        ["ค่าแรง+ค่าเครื่องจักรสะสมถึงวัน update", money(s.manual.costToUpdate, 0), "#fff0a8"],
        ["สรุปค่าแรงทั้งโครงการ(ถ้าอนุมัติ ณ วันupdate)", projectPlan ? "" : pct(s.manualRatio), "#ff9f9f"],
        ["วันที่ Update", projectPlan ? "" : dateLabel(planUpdateDate()), "#e8e8e8"],
        ["หมายเหตุ", projectPlan ? "" : (s.manual.note || ""), "#c8e0b8"]
      ];
      manualRows.forEach((row) => {
        drawCell(ctx, rx, y, 360 * scale, rowH, row[0], false, row[2], "#111", "left", true);
        drawCell(ctx, rx + 360 * scale, y, 170 * scale, rowH, row[1], false, row[2], "#111", "right", true);
        y += rowH;
      });
    }

    function drawCell(ctx, x, y, w, h, text, header = false, fill = "#ffffff", color = "#111111", align = "center", bold = false) {
      ctx.fillStyle = fill;
      ctx.fillRect(x, y, w, h);
      ctx.strokeStyle = "#5c5c5c";
      ctx.strokeRect(x, y, w, h);
      ctx.fillStyle = color;
      ctx.font = `${bold || header ? "bold " : ""}${Math.max(9, h * 0.48)}px Tahoma, sans-serif`;
      ctx.textAlign = align;
      const tx = align === "left" ? x + 4 : align === "right" ? x + w - 4 : x + w / 2;
      fitText(ctx, text, tx, y + h / 2, w - 8, align);
    }

    function fitText(ctx, text, x, y, maxWidth, align = "left") {
      const value = String(text ?? "");
      if (!value) return;
      const originalFont = ctx.font;
      const sizeMatch = originalFont.match(/(\d+(?:\.\d+)?)px/);
      const originalSize = sizeMatch ? Number(sizeMatch[1]) : 10;
      let fontSize = originalSize;
      while (ctx.measureText(value).width > maxWidth && fontSize > 6) {
        fontSize -= 0.5;
        ctx.font = originalFont.replace(/(\d+(?:\.\d+)?)px/, `${fontSize}px`);
      }
      ctx.fillText(value, x, y, maxWidth);
      ctx.font = originalFont;
    }

    document.addEventListener("click", handleClick);
    document.addEventListener("input", handleInput);
    document.addEventListener("change", handleChange);
    document.addEventListener("pointerdown", handlePointerDown);
    document.addEventListener("pointermove", handlePointerMove);
    document.addEventListener("pointerup", handlePointerUp);
    document.addEventListener("pointercancel", handlePointerUp);
    document.addEventListener("dblclick", handleDoubleClick);
    document.addEventListener("keydown", handleKeyDown);
    $("#saveCellBtn").addEventListener("click", saveCellDraft);
    $("#clearCellBtn").addEventListener("click", clearCellDraft);
    $("#saveClaimBtn").addEventListener("click", saveClaimDateChange);
    $("#splitDialog").addEventListener("close", (event) => {
      if (!event.target.open) splitDraft = null;
    });
    $("#splitDialog").addEventListener("click", (event) => {
      if (event.target?.id === "splitDialog") closeSplitDialog();
    });
    $("#accumDialog").addEventListener("click", (event) => {
      if (event.target?.id === "accumDialog") closeAccumDialog();
    });

    renderAll();
  </script>
</body>
</html>
