    function renderPeriods() {
      const el = $("#tab-periods");
      const editingId = state.ui.editingPeriodId || "";
      if (editingId === "__new__") {
        el.innerHTML = renderNewPeriodEditor();
        return;
      }
      const editingPeriod = getPeriod(editingId);
      if (editingPeriod) {
        el.innerHTML = renderPeriodEditor(editingPeriod);
        return;
      }
      if (editingId) state.ui.editingPeriodId = "";

      const filters = periodFilters();
      const visiblePeriods = state.periods.filter((period) => periodMatchesFilters(period, filters));
      const selectedVisible = visiblePeriods.filter(periodEnabled);
      const buildings = allBuildings().filter((building) => filters.building === "all" || filters.building === building);
      const statusOptions = [`<option value="all">ทุกสถานะ</option>`, ...PERIOD_STATUSES.map((status) => `<option value="${esc(status)}" ${filters.status === status ? "selected" : ""}>${esc(status)}</option>`)].join("");
      const buildingOptions = [`<option value="all">ทุกอาคาร</option>`, ...allBuildings().map((building) => `<option value="${esc(building)}" ${filters.building === building ? "selected" : ""}>หลัง ${esc(building)}</option>`)].join("");
      el.innerHTML = `
        <div class="section period-manager">
          ${renderWorkPlanPanel()}
          <div class="panel">
            <div class="panel-head">
              <div>
                <h2>งวดงานทั้งหมด</h2>
                <p class="muted">แสดงเฉพาะข้อมูลที่ต้องตัดสินใจ กดแถวเพื่อเปิดหน้าแก้เต็มหน้า</p>
              </div>
              <button class="primary" data-action="open-new-period">เพิ่มงวด</button>
            </div>
            <div class="panel-body">
              <div class="period-toolbar-grid">
                <label><span>ค้นหาเลขงวด</span><input data-period-filter="search" value="${esc(state.ui.periodSearch || "")}" placeholder="เช่น 5, 5.1, 9"></label>
                <label><span>อาคาร</span><select data-period-filter="building">${buildingOptions}</select></label>
                <label><span>สถานะ</span><select data-period-filter="status">${statusOptions}</select></label>
                <button data-action="apply-period-filter">ค้นหา</button>
              </div>
              <div class="period-summary-strip" style="margin-top:12px">
                <div class="metric"><span>งวดที่แสดง</span><strong>${visiblePeriods.length}</strong></div>
                <div class="metric"><span>เลือกใช้รอบนี้</span><strong>${selectedVisible.length}</strong></div>
                <div class="metric"><span>มูลค่างวดที่เลือก</span><strong>${money(selectedVisible.reduce((sum, row) => sum + n(row.periodValue), 0), 0)}</strong></div>
                <div class="metric"><span>ค่าแรงงวดที่เลือก</span><strong>${money(selectedVisible.reduce((sum, row) => sum + periodLaborValue(row), 0), 0)}</strong></div>
              </div>
              <p class="period-mini-note" style="margin-top:10px">รายการงาน, มูลค่าค่าแรงรายรายการ และ % ความก้าวหน้า แก้ในหน้าแผนงวดงาน</p>
            </div>
          </div>
          <div class="period-board">
            ${buildings.map((building) => renderPeriodBuilding(building, filters)).join("") || `<div class="panel"><div class="period-empty">ยังไม่มีงวดตามตัวกรองนี้</div></div>`}
          </div>
        </div>
      `;
    }

    function renderPeriodBuilding(building, filters) {
      const all = state.periods.filter((period) => period.building === building);
      const groups = periodGroupRows(building, filters);
      const activeCount = all.filter(periodEnabled).length;
      return `
        <div class="panel">
          <div class="panel-head">
            <div class="inline-list">
              <h2>หลัง ${esc(building)}</h2>
              <span class="pill">เลือกใช้ ${activeCount}/${all.length} งวด</span>
            </div>
            <div class="inline-list">
              <button data-action="enable-building-periods" data-building="${esc(building)}">เลือกใช้ทั้งหมด</button>
              <button data-action="disable-building-periods" data-building="${esc(building)}">ไม่เลือกทั้งหมด</button>
            </div>
          </div>
          <div class="table-wrap">
            ${groups.length ? `
              <table class="period-table">
                <thead>
                  <tr>
                    <th>ใช้</th>
                    <th>งวดงาน</th>
                    <th>งวดย่อย</th>
                    <th class="num">มูลค่างวด</th>
                    <th class="num">ค่าแรงงวด</th>
                    <th>สถานะ</th>
                    <th class="num">จัดการ</th>
                  </tr>
                </thead>
                <tbody>${groups.map(renderPeriodGroup).join("")}</tbody>
              </table>
            ` : `<div class="period-empty">ยังไม่มีงวดตามตัวกรองนี้</div>`}
          </div>
        </div>
      `;
    }

    function renderPeriodGroup(group) {
      const summary = groupSummary(group.rows);
      const percent = n(summary.mainValue) ? summary.subValue / summary.mainValue * 100 : 0;
      const over = summary.mainValue > 0 && summary.subValue > summary.mainValue;
      const first = group.rows[0];
      const canSplit = group.rows.length === 1 && String(first.no) === periodMainNo(first);
      return `
        <tr class="period-main-row">
          <td></td>
          <td><span class="period-no">${esc(group.mainNo)}</span></td>
          <td>${summary.count > 1 ? `${summary.count} งวดย่อย` : canSplit ? "ยังไม่ซอยงวด" : "1 งวดย่อย"}</td>
          <td class="num">${money(summary.mainValue, 0)}</td>
          <td class="num">${money(summary.laborValue, 0)}</td>
          <td><span class="pill ${over ? "red" : "green"}">${over ? "มูลค่าย่อยเกิน" : `ใช้ ${money(percent, 1)}%`}</span></td>
          <td><div class="period-actions">${canSplit ? `<button data-action="split-period" data-period-id="${first.id}">ซอยงวด</button>` : ""}</div></td>
        </tr>
        ${group.rows.map(renderPeriodRow).join("")}
      `;
    }

    function renderPeriodRow(period) {
      const laborValue = periodLaborValue(period);
      const statusClass = periodStatusClass(period.status);
      const subPercent = n(period.mainValue) ? n(period.periodValue) / n(period.mainValue) * 100 : 0;
      return `
        <tr class="period-sub-row ${periodEnabled(period) ? "is-selected" : "is-disabled"}" data-period-row="${period.id}">
          <td>
            <label class="check-row" title="เลือกใช้ในแผนเบิกงวดรอบนี้">
              <input type="checkbox" data-period-enabled="${period.id}" ${periodEnabled(period) ? "checked" : ""}>
            </label>
          </td>
          <td class="period-indent"><span class="period-no">${esc(period.no)}</span></td>
          <td>
            <strong>${esc(periodDisplayTitle(period))}</strong>
            <span class="period-mini-note"> · ${money(subPercent, 1)}% ของงวดหลัก</span>
          </td>
          <td class="num">${money(period.periodValue, 0)}</td>
          <td class="num">${money(laborValue, 0)}</td>
          <td><span class="pill ${statusClass}">${esc(period.status || "รอทำ")}</span></td>
          <td><div class="period-actions"><button data-action="open-period-editor" data-period-id="${period.id}">เปิด</button></div></td>
        </tr>
      `;
    }

      return `
        <div class="section period-editor">
          <div class="period-editor-head">
            <div class="period-editor-title">

            <div class="metric"><span>ค่าแรงงวด</span><strong>${money(laborValue, 0)}</strong></div>

          <div class="panel">

              <label><span>% ของงวดหลัก</span><input class="num" type="number" step="0.01" data-period-field="periodPercent" data-period-id="${period.id}" value="${esc(money(subPercent, 2).replace(/,/g, ""))}"></label>
              <label><span>ค่าแรงงวด</span><div class="period-readonly">${money(laborValue, 0)}</div></label>
              <label><span>สถานะ</span><select class="status-select" data-period-field="status" data-period-id="${period.id}">${periodStatusOptions(period.status)}</select></label>

          </div>
          <div class="panel">

              <h2>การซอยงวด</h2>

            </div>
          </div>
        </div>
      `;
    }

                  <button class="primary" data-action="import-json">นำเข้า JSON</button>
                  <button class="danger" data-action="reset-sample">รีเซ็ตเป็นข้อมูลเริ่มต้น</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function openCellEditor(periodId, itemId, date) {
      const period = getPeriod(periodId);
      const item = getItem(period, itemId);
      if (!period || !item) return;
      cellDraft = {
        building: period.building,
        periodId,
        itemId,
        date,
        planned: itemPlanValue(item, date),
        assignments: actualEntries(item, date).map((row) => ({ ...row })),
        machineRows: (activeMachineUsage()?.[period.building]?.[date] || []).map((row) => ({ ...row }))
      };
      $("#cellDialogTitle").textContent = `${period.building} · งวด ${period.no} · ${item.name}`;
      $("#cellDialogMeta").textContent = dateLabel(date);
      renderCellDialog();
      $("#cellDialog").showModal();
    }

    function renderCellDialog(error = "") {
      if (!cellDraft) return;
      const ignore = { periodId: cellDraft.periodId, itemId: cellDraft.itemId, date: cellDraft.date };
      const draftWorkerIds = new Set(cellDraft.assignments.map((row) => row.workerId));
      const listMode = workerListMode();
      const workerOptions = state.workers.map((worker) => {
        const assigned = workerAssignedInfo(worker.id, cellDraft.date, ignore);
        const inDraft = draftWorkerIds.has(worker.id);
        if (listMode === "hide" && (assigned || inDraft)) return "";
        return workerOption(worker, assigned, false, inDraft, inDraft ? "อยู่ในช่องนี้แล้ว" : "");
      }).join("");
      const machineOptions = state.machines.map((machine) => `<option value="${machine.id}">${esc(machine.name)} · ${money(machine.dailyCost, 0)}</option>`).join("");
      const assignments = cellDraft.assignments.map((row, index) => {
        const worker = getWorker(row.workerId);
        const amount = laborAmount(row);
        return `
          <tr>
            <td>${worker ? `${esc(worker.code)} · ${esc(worker.name)}` : "ไม่พบคนงาน"} ${row.transferFrom ? `<span class="pill green">ย้ายจากงานเดิม</span>` : ""}</td>
            <td>
              <select data-draft-worker-unit="${index}">
                <option value="full" ${row.unit === "full" ? "selected" : ""}>เต็มวัน</option>
                <option value="half" ${row.unit === "half" ? "selected" : ""}>ครึ่งวัน</option>
                <option value="hours" ${row.unit === "hours" ? "selected" : ""}>รายชั่วโมง</option>
              </select>
            </td>
            <td><input type="number" min="0" step="0.5" data-draft-worker-hours="${index}" value="${esc(row.hours || state.settings.dayHours)}"></td>
            <td class="num">${money(amount, 0)}</td>
            <td><button data-action="remove-draft-worker" data-index="${index}" class="danger">ลบ</button></td>
          </tr>
        `;
      }).join("");
      const machineRows = cellDraft.machineRows.map((row, index) => {
        const machine = getMachine(row.machineId);
        return `
          <tr>
            <td>${machine ? esc(machine.name) : "ไม่พบเครื่องจักร"}</td>
            <td><input type="number" min="0" step="0.01" data-draft-machine-amount="${index}" value="${esc(row.amount)}"></td>
            <td><button data-action="remove-draft-machine" data-index="${index}" class="danger">ลบ</button></td>
          </tr>
        `;
      }).join("");
      const defaultMachineAmount = n(getMachine(state.machines[0]?.id)?.dailyCost);
      const units = cellDraft.assignments.reduce((sum, row) => sum + laborUnits(row), 0);
      const labor = cellDraft.assignments.reduce((sum, row) => sum + laborAmount(row), 0);
      const machines = cellDraft.machineRows.reduce((sum, row) => sum + n(row.amount), 0);
      $("#cellDialogBody").innerHTML = `
        ${error ? `<div class="error">${esc(error)}</div>` : ""}
        <div class="form-grid">
          <label><span>จำนวนแรงตามแผน</span><input type="number" min="0" step="1" id="draftPlanned" value="${esc(Math.round(cellDraft.planned))}"></label>
          <div class="metric"><span>จำนวนแรงใช้จริง</span><strong>${qty(units) || "0"}</strong></div>
          <div class="metric"><span>ค่าแรงจริง</span><strong>${money(labor, 0)}</strong></div>
          <div class="metric"><span>ค่าเครื่องจักรวันนี้</span><strong>${money(machines, 0)}</strong></div>
        </div>
        <div class="panel">
          <div class="panel-head"><h3>คนงาน</h3></div>
          <div class="panel-body">
            <div class="form-grid" style="margin-bottom:10px">
              <label><span>เลือกคนงาน</span><select id="draftWorkerSelect">${workerOptions}</select></label>
              <label><span>ประเภทเวลา</span><select id="draftWorkerUnit"><option value="full">เต็มวัน</option><option value="half">ครึ่งวัน</option><option value="hours">รายชั่วโมง</option></select></label>
              <label><span>ชั่วโมง</span><input type="number" min="0" step="0.5" id="draftWorkerHours" value="${esc(state.settings.dayHours)}"></label>
              <button data-action="add-draft-worker" class="primary">เพิ่มคนงาน</button>
            </div>
            <div class="table-wrap">
              <table>
                <thead><tr><th>คนงาน</th><th>เวลา</th><th class="num">ชั่วโมง</th><th class="num">ค่าแรง</th><th></th></tr></thead>
                <tbody>${assignments || `<tr><td colspan="5" class="muted">ยังไม่มีคนงาน</td></tr>`}</tbody>
              </table>
            </div>
          </div>
        </div>
        <div class="panel">
          <div class="panel-head"><h3>เครื่องจักร</h3></div>
          <div class="panel-body">
            <div class="form-grid" style="margin-bottom:10px">
              <label><span>เลือกเครื่องจักร</span><select id="draftMachineSelect">${machineOptions}</select></label>
              <label><span>ยอดต่อวัน</span><input type="number" min="0" step="0.01" id="draftMachineAmount" value="${esc(defaultMachineAmount)}"></label>
              <button data-action="add-draft-machine" class="primary">เพิ่มเครื่องจักร</button>
            </div>
            <div class="table-wrap">
              <table>
                <thead><tr><th>เครื่องจักร</th><th class="num">ยอด</th><th></th></tr></thead>
                <tbody>${machineRows || `<tr><td colspan="3" class="muted">ยังไม่มีเครื่องจักร</td></tr>`}</tbody>
              </table>
            </div>
          </div>
        </div>
      `;
    }

    function saveCellDraft() {
      if (!cellDraft) return;
      const period = getPeriod(cellDraft.periodId);
      const item = getItem(period, cellDraft.itemId);
      if (!period || !item) return;
      const seen = new Set();
      const moves = [];
      for (const row of cellDraft.assignments) {
        if (!row.workerId) return renderCellDialog("เลือกคนงานไม่ถูกต้อง");
        if (seen.has(row.workerId)) return renderCellDialog("คนงานซ้ำในช่องเดียวกัน");
        seen.add(row.workerId);
        const assigned = workerAssignedInfo(row.workerId, cellDraft.date, cellDraft);
        if (assigned) {
          const worker = getWorker(row.workerId);
          if (workerListMode() !== "move") return renderCellDialog(`คนงานนี้ถูกใช้แล้วที่ ${assignedLabel(assigned)}`);
          if (row.transferFrom !== transferToken(assigned) && (!worker || !confirmWorkerMove(worker, assigned))) return renderCellDialog("ยกเลิกการย้ายคนงาน");
          moves.push(assigned);
        }
      }
      recordHistory("บันทึกช่องงาน");
      moves.forEach((assigned) => removeWorkerFromAssignment(assigned, cellDraft.date));
      const cleanAssignments = cellDraft.assignments.map(({ transferFrom, ...row }) => row);
      setPlan(item, cellDraft.date, $("#draftPlanned")?.value || 0);
      const data = ensurePlanItemData(item);
      if (cleanAssignments.length) data.actual[cellDraft.date] = cleanAssignments;
      else delete data.actual[cellDraft.date];
      const usage = activeMachineUsage();
      usage[cellDraft.building] = usage[cellDraft.building] || {};
      if (cellDraft.machineRows.length) usage[cellDraft.building][cellDraft.date] = cellDraft.machineRows;
      else delete usage[cellDraft.building][cellDraft.date];
      saveState();
      $("#cellDialog").close();
      cellDraft = null;
      if (activeTab === "plan") renderPlanPreservingScroll();
      else renderActiveTab();
      showToast("บันทึกช่องงานแล้ว");
    }

    function clearCellDraft() {
      if (!cellDraft) return;
      cellDraft.planned = 0;
      cellDraft.assignments = [];
      cellDraft.machineRows = [];
      renderCellDialog();
    }

    function addWorkerToDraft() {
      if (!cellDraft) return;
      const workerId = $("#draftWorkerSelect").value;
      const unit = $("#draftWorkerUnit").value;
      const hours = unit === "full" ? n(state.settings.dayHours) : unit === "half" ? n(state.settings.dayHours) / 2 : n($("#draftWorkerHours").value);
      if (!workerId) return;
      const assigned = workerAssignedInfo(workerId, cellDraft.date, cellDraft);
      let transferFrom = "";
      if (assigned) {
        const worker = getWorker(workerId);
        if (workerListMode() !== "move") return renderCellDialog(`คนงานนี้ถูกใช้แล้วที่ ${assignedLabel(assigned)}`);
        if (!worker || !confirmWorkerMove(worker, assigned)) return renderCellDialog("ยกเลิกการย้ายคนงาน");
        transferFrom = transferToken(assigned);
      }
      if (cellDraft.assignments.some((row) => row.workerId === workerId)) return renderCellDialog("คนงานซ้ำในช่องเดียวกัน");
      cellDraft.assignments.push({ workerId, unit, hours, transferFrom });
      renderCellDialog();
    }

    function addMachineToDraft() {
      if (!cellDraft) return;
      const machineId = $("#draftMachineSelect").value;
      const machine = getMachine(machineId);
      if (!machine) return;
      const amountInput = $("#draftMachineAmount");
      const amount = amountInput.value === "" ? n(machine.dailyCost) : n(amountInput.value);
      cellDraft.machineRows.push({ id: uid("mu"), machineId, amount });
      renderCellDialog();
    }

    function quickSetPlan() {
      const { quick, item } = selectedQuickRefs();
      if (!item || !quick.date) return showToast("เลือกงวด รายการ และวันที่ก่อน");
      const plannedInput = $('[data-quick-field="planned"]');
      recordHistory("บันทึกจำนวนแรงตามแผน");
      setPlan(item, quick.date, plannedInput ? plannedInput.value : quick.planned || 0);
      saveState();
      renderPlan();
      showToast("บันทึกจำนวนแรงตามแผนแล้ว");
    }

    function quickAddWorker() {
      const { quick, period, item } = selectedQuickRefs();
      if (!period || !item || !quick.date) return showToast("เลือกงวด รายการ และวันที่ก่อน");
      const workerId = $('[data-quick-field="workerId"]')?.value || quick.workerId;
      if (!workerId) return showToast("เลือกคนงานก่อน");
      quick.workerId = workerId;
      const ignore = { periodId: period.id, itemId: item.id, date: quick.date };
      const assigned = workerAssignedInfo(workerId, quick.date, ignore);
      if (assigned) {
        const worker = getWorker(workerId);
        if (workerListMode() !== "move") return showToast(`คนงานนี้ใช้แล้วที่ ${assignedLabel(assigned)}`);
        if (!worker || !confirmWorkerMove(worker, assigned)) return;
        removeWorkerFromAssignment(assigned, quick.date);
      }
      if (actualEntries(item, quick.date).some((row) => row.workerId === workerId)) return showToast("คนงานนี้อยู่ในช่องนี้แล้ว");
      const plannedInput = $('[data-quick-field="planned"]');
      recordHistory("เพิ่มคนงานจริง");
      setPlan(item, quick.date, plannedInput ? plannedInput.value : quick.planned || 0);
      const unit = quick.unit || "full";
      const hours = unit === "full" ? n(state.settings.dayHours) : unit === "half" ? n(state.settings.dayHours) / 2 : n(quick.hours);
      ensurePlanItemData(item).actual[quick.date] = [...actualEntries(item, quick.date), { workerId, unit, hours }];
      saveState();
      renderPlan();
      showToast("เพิ่มคนงานจริงและคำนวณค่าแรงแล้ว");
    }

    function quickAddMachine() {
      const { quick } = selectedQuickRefs();
      if (!quick.building || !quick.date) return showToast("เลือกอาคารและวันที่ก่อน");
      const machine = getMachine(quick.machineId);
      if (!machine) return showToast("เลือกเครื่องจักรก่อน");
      recordHistory("เพิ่มเครื่องจักร");
      const usage = activeMachineUsage();
      usage[quick.building] = usage[quick.building] || {};
      const rows = usage[quick.building][quick.date] || [];
      rows.push({ id: uid("mu"), machineId: machine.id, amount: n(quick.machineAmount || machine.dailyCost) });
      usage[quick.building][quick.date] = rows;
      saveState();
      renderPlan();
      showToast("เพิ่มเครื่องจักรและค่าเครื่องจักรแล้ว");
    }

    function quickOpenDetail() {
      const { quick, period, item } = selectedQuickRefs();
      if (!period || !item || !quick.date) return showToast("เลือกงวด รายการ และวันที่ก่อน");
      const plannedInput = $('[data-quick-field="planned"]');
      setPlan(item, quick.date, plannedInput ? plannedInput.value : quick.planned || 0);
      saveState();
      openCellEditor(period.id, item.id, quick.date);
    }

    function updateQuickField(field, value, rerender = true) {
      const quick = getQuickEntry();
      quick[field] = value;
      if (field === "building") {
        const period = periodsForBuilding(value)[0];
        quick.periodId = period?.id || "";
        quick.itemId = period?.items[0]?.id || "";
        state.ui.planView = value;
        delete quick.planned;
      }
      if (field === "periodId") {
        const period = getPeriod(value);
        quick.building = period?.building || quick.building;
        quick.itemId = period?.items[0]?.id || "";
        delete quick.planned;
      }
      if (field === "itemId" || field === "date") delete quick.planned;
      if (field === "unit") {
        if (value === "full") quick.hours = n(state.settings.dayHours);
        if (value === "half") quick.hours = n(state.settings.dayHours) / 2;
      }
      if (field === "machineId") quick.machineAmount = getMachine(value)?.dailyCost || 0;
      if (field === "planned") quick[field] = Math.max(0, Math.round(n(value)));
      if (field === "hours" || field === "machineAmount") quick[field] = n(value);
      saveState();
      if (rerender) renderPlan();
    }

    function dateRangeBetween(start, end) {
      const dates = getDates();
      const a = dates.indexOf(start);
      const b = dates.indexOf(end);
      if (a < 0 || b < 0 || a === b) return [];
      const step = a < b ? 1 : -1;
      const range = [];
      for (let i = a + step; step > 0 ? i <= b : i >= b; i += step) range.push(dates[i]);
      return range;
    }

    function dateSpanBetween(start, end) {
      const dates = getDates();
      const a = dates.indexOf(start);
      const b = dates.indexOf(end);
      if (a < 0 || b < 0) return [];
      const low = Math.min(a, b);
      const high = Math.max(a, b);
      return dates.slice(low, high + 1);
    }

    function cellPartFromElement(element) {
      return element?.closest?.("[data-cell-part]")?.dataset?.cellPart || "actual";
    }

    function cellPartFromEvent(button, event) {
      const explicit = event?.target?.closest?.("[data-cell-part]")?.dataset?.cellPart;
      if (explicit) return explicit;
      const rect = button?.getBoundingClientRect?.();
      if (!rect || event?.clientY === undefined) return "actual";
      return event.clientY < rect.top + rect.height * 0.45 ? "plan" : "actual";
    }

    function cellRefsFromButton(button, part = "actual") {
      if (!button?.dataset?.periodId || !button?.dataset?.itemId || !button?.dataset?.date) return null;
      return {
        periodId: button.dataset.periodId,
        itemId: button.dataset.itemId,
        date: button.dataset.date,
        part: part || "actual"
      };
    }

    function cellMatches(a, b) {
      return Boolean(a && b && a.periodId === b.periodId && a.itemId === b.itemId && a.date === b.date && (a.part || "actual") === (b.part || "actual"));
    }

    function cellKey(ref) {
      return ref ? `${ref.periodId}|${ref.itemId}|${ref.date}|${ref.part || "actual"}` : "";
    }

    function sameCellRow(a, b) {
      return Boolean(a && b && a.periodId === b.periodId && a.itemId === b.itemId && (a.part || "actual") === (b.part || "actual"));
    }

    function selectedCellRefs() {
      const refs = Array.isArray(state.ui?.selectedCells) ? state.ui.selectedCells.filter((ref) => ref?.periodId && ref?.itemId && ref?.date).map((ref) => ({ ...ref, part: ref.part || "actual" })) : [];
      if (refs.length) return refs;
      return state.ui?.selectedCell ? [{ ...state.ui.selectedCell, part: state.ui.selectedCell.part || "actual" }] : [];
    }

    function setSelectedCells(refs, primary = refs.at(-1), persist = true) {
      const seen = new Set();
      const clean = refs.filter((ref) => ref?.periodId && ref?.itemId && ref?.date && !seen.has(cellKey(ref)) && seen.add(cellKey(ref))).map((ref) => ({ ...ref, part: ref.part || "actual" }));
      state.ui.selectedCells = clean;
      state.ui.selectedCell = primary ? { ...primary } : clean.at(-1) || null;
      if (persist) saveState();
      applySelectedCellHighlight();
    }

    function rangeRefsBetween(source, target) {
      if (!sameCellRow(source, target)) return target ? [{ ...target }] : [];
      return dateSpanBetween(source.date, target.date).map((date) => ({ periodId: source.periodId, itemId: source.itemId, date, part: source.part || "actual" }));
    }

    function mergeCellRefs(base, additions) {
      return [...base, ...additions].reduce((list, ref) => {
        if (!list.some((row) => cellMatches(row, ref))) list.push({ ...ref });
        return list;
      }, []);
    }

    function toggleSelectedCell(ref) {
      const current = selectedCellRefs();
      const exists = current.some((row) => cellMatches(row, ref));
      const next = exists ? current.filter((row) => !cellMatches(row, ref)) : [...current, ref];
      setSelectedCells(next, exists ? next.at(-1) : ref);
    }

    function isCellSelected(ref) {
      return selectedCellRefs().some((row) => cellMatches(row, ref));
    }

    function fillModeParts(mode = state.ui.fillMode || "all") {
      return {
        plan: mode === "all" || mode === "plan" || mode === "planActual",
        actual: mode === "all" || mode === "actual" || mode === "planActual",
        machine: mode === "all" || mode === "machine"
      };
    }

    function fillModeLabel(mode = state.ui.fillMode || "all") {
      return {
        all: "ทั้งหมด",
        plan: "จำนวนแรงตามแผน",
        actual: "คนงานจริง + ค่าแรง",
        planActual: "แผน + คนงานจริง",
        machine: "เครื่องจักร"
      }[mode] || "ทั้งหมด";
    }

    function modeForCellRef(ref, fallback = state.ui.fillMode || "all") {
      if ((ref?.part || "") === "plan") return "plan";
      if ((ref?.part || "") === "actual") return "actual";
      return fallback;
    }

    function capturePlanGridScroll() {
      const grid = $("#tab-plan .plan-grid");
      return grid ? { left: grid.scrollLeft, top: grid.scrollTop } : null;
    }

    function restorePlanGridScroll(scroll) {
      if (!scroll) return;
      requestAnimationFrame(() => {
        const grid = $("#tab-plan .plan-grid");
        if (!grid) return;
        grid.scrollLeft = scroll.left;
        grid.scrollTop = scroll.top;
        applySelectedCellHighlight();
      });
    }

    function renderPlanPreservingScroll() {
      const scroll = capturePlanGridScroll();
      renderPlan();
      restorePlanGridScroll(scroll);
    }

    function hasCellDataForMode(period, item, date, mode = state.ui.fillMode || "all") {
      const parts = fillModeParts(mode);
      const usage = activeMachineUsage();
      return (parts.plan && itemPlanValue(item, date) > 0)
        || (parts.actual && actualEntries(item, date).length > 0)
        || (parts.machine && (usage?.[period.building]?.[date] || []).length > 0);
    }

    function hasCellDataForRef(ref) {
      const period = getPeriod(ref?.periodId);
      const item = getItem(period, ref?.itemId);
      return Boolean(period && item && hasCellDataForMode(period, item, ref.date, modeForCellRef(ref)));
    }

    function clearCellData(ref) {
      const period = getPeriod(ref?.periodId);
      const item = getItem(period, ref?.itemId);
      if (!period || !item || !ref?.date) return false;
      const mode = modeForCellRef(ref);
      const parts = fillModeParts(mode);
      const hadData = hasCellDataForMode(period, item, ref.date, mode);
      if (parts.plan) setPlan(item, ref.date, 0);
      if (parts.actual) {
        const data = ensurePlanItemData(item);
        delete data.actual[ref.date];
      }
      if (parts.machine) {
        const usage = activeMachineUsage();
        if (usage?.[period.building]) delete usage[period.building][ref.date];
      }
      return hadData;
    }

    function clearSelectedCells() {
      const refs = selectedCellRefs();
      if (!refs.length) return showToast("เลือกช่องในตารางก่อน");
      const affected = refs.filter(hasCellDataForRef);
      if (!affected.length) return showToast("ช่องที่เลือกไม่มีข้อมูลให้ล้าง");
      recordHistory("ล้างข้อมูลช่องงาน");
      refs.forEach((ref) => clearCellData(ref));
      saveState();
      renderPlanPreservingScroll();
      showToast(`ล้างข้อมูล ${affected.length} ช่องแล้ว`);
    }

    function cellPartSnapshot(ref) {
      const period = getPeriod(ref?.periodId);
      const item = getItem(period, ref?.itemId);
      if (!period || !item || !ref?.date) return null;
      if ((ref.part || "actual") === "plan") {
        return { part: "plan", plan: itemPlanValue(item, ref.date) };
      }
      return { part: "actual", actual: actualEntries(item, ref.date).map((row) => ({ ...row })) };
    }

    function canPasteActual(ref, rows) {
      return !rows.some((row) => workerAssignedInfo(row.workerId, ref.date, { periodId: ref.periodId, itemId: ref.itemId, date: ref.date }));
    }

    function applyCellPartSnapshot(ref, snapshot) {
      const period = getPeriod(ref?.periodId);
      const item = getItem(period, ref?.itemId);
      if (!period || !item || !snapshot) return false;
      if ((ref.part || "actual") !== snapshot.part) return false;
      if (snapshot.part === "plan") {
        setPlan(item, ref.date, snapshot.plan || 0);
        return true;
      }
      if (!canPasteActual(ref, snapshot.actual || [])) return false;
      const data = ensurePlanItemData(item);
      if (snapshot.actual?.length) data.actual[ref.date] = snapshot.actual.map((row) => ({ ...row }));
      else delete data.actual[ref.date];
      return true;
    }

    function dateOffset(fromDate, toDate) {
      const dates = getDates();
      return dates.indexOf(toDate) - dates.indexOf(fromDate);
    }

    function dateAtOffset(date, offset) {
      const dates = getDates();
      const index = dates.indexOf(date);
      return index < 0 ? "" : dates[index + offset] || "";
    }

    function copySelectedCells() {
      const refs = selectedCellRefs();
      if (!refs.length) return showToast("เลือกช่องในตารางก่อน");
      const primary = state.ui.selectedCell || refs[0];
      const cells = refs.map((ref) => ({ offset: dateOffset(primary.date, ref.date), snapshot: cellPartSnapshot(ref) })).filter((row) => row.snapshot);
      if (!cells.length) return showToast("ไม่มีข้อมูลให้คัดลอก");
      appClipboard = { primary: { ...primary }, cells };
      showToast(`คัดลอก ${cells.length} ช่องแล้ว`);
    }

    function pasteCells() {
      if (!appClipboard?.cells?.length) return showToast("ยังไม่มีข้อมูลที่คัดลอกไว้");
      const targets = selectedCellRefs();
      if (!targets.length) return showToast("เลือกช่องปลายทางก่อน");
      const primary = state.ui.selectedCell || targets[0];
      const operations = [];
      if (appClipboard.cells.length === 1 && targets.length > 1) {
        const snapshot = appClipboard.cells[0].snapshot;
        targets.forEach((target) => operations.push({ ref: target, snapshot }));
      } else {
        appClipboard.cells.forEach((cell) => {
          const date = dateAtOffset(primary.date, cell.offset);
          if (!date) return;
          operations.push({ ref: { periodId: primary.periodId, itemId: primary.itemId, date, part: cell.snapshot.part }, snapshot: cell.snapshot });
        });
      }
      const valid = operations.filter(({ ref, snapshot }) => {
        const period = getPeriod(ref.periodId);
        const item = getItem(period, ref.itemId);
        if (!period || !item || (ref.part || "actual") !== snapshot.part) return false;
        if (snapshot.part === "actual" && !canPasteActual(ref, snapshot.actual || [])) return false;
        return true;
      });
      if (!valid.length) return showToast("วางไม่ได้ เพราะชนิดช่องไม่ตรงหรือคนงานซ้ำ");
      recordHistory("วางข้อมูลช่องงาน");
      valid.forEach(({ ref, snapshot }) => applyCellPartSnapshot(ref, snapshot));
      saveState();
      renderPlanPreservingScroll();
      showToast(`วางข้อมูล ${valid.length} ช่องแล้ว`);
    }

    function selectPlanCell(ref) {
      if (!ref) return;
      setSelectedCells([ref], ref);
    }

    function applySelectedCellHighlight() {
      const selected = selectedCellRefs();
      const selectedKeys = new Set(selected.map(cellKey));
      const primary = state.ui.selectedCell;
      $$('.date-btn[data-action="edit-cell"]').forEach((button) => {
        let buttonSelected = false;
        button.querySelectorAll("[data-cell-part]").forEach((partEl) => {
          const ref = cellRefsFromButton(button, partEl.dataset.cellPart);
          const match = selectedKeys.has(cellKey(ref));
          const isPrimary = cellMatches(ref, primary);
          partEl.classList.toggle("part-selected", match);
          partEl.classList.toggle("part-primary", isPrimary);
          buttonSelected = buttonSelected || match;
        });
        button.classList.toggle("selected", buttonSelected);
        button.setAttribute("aria-selected", buttonSelected ? "true" : "false");
      });
      const openButton = $("#openSelectedCellBtn");
      if (openButton) openButton.disabled = !primary;
      const clearButton = $("#clearSelectedCellsBtn");
      if (clearButton) {
        clearButton.disabled = !selected.length;
        clearButton.textContent = `ล้าง ${selected.length || ""} ช่อง`;
      }
    }

    function openSelectedCell() {
      const selected = state.ui.selectedCell;
      if (!selected) return showToast("เลือกช่องในตารางก่อน");
      return openCellEditor(selected.periodId, selected.itemId, selected.date);
    }

    function clearFillHighlight() {
      $$(".fill-source, .fill-range, .fill-target").forEach((element) => {
        element.classList.remove("fill-source", "fill-range", "fill-target");
      });
    }

    function highlightFillRange(source, target = source) {
      clearFillHighlight();
      if (!source || !target) return;
      const span = new Set(dateSpanBetween(source.date, target.date));
      $$('.date-btn[data-action="edit-cell"]').forEach((button) => {
        const partEl = button.querySelector(`[data-cell-part="${source.part || "actual"}"]`);
        const ref = cellRefsFromButton(button, source.part || "actual");
        if (!ref || ref.periodId !== source.periodId || ref.itemId !== source.itemId) return;
        if (!span.has(ref.date)) return;
        partEl?.classList.add("fill-range");
        if (ref.date === source.date) partEl?.classList.add("fill-source");
        if (ref.date === target.date && ref.date !== source.date) partEl?.classList.add("fill-target");
      });
    }

    function copyCellRange(source, target, mode = modeForCellRef(source)) {
      if (!source || !target) return;
      if (source.periodId !== target.periodId || source.itemId !== target.itemId) {
        showToast("ลากคัดลอกได้เฉพาะรายการเดียวกัน");
        return;
      }
      const period = getPeriod(source.periodId);
      const item = getItem(period, source.itemId);
      if (!period || !item) return;
      const targetDates = dateRangeBetween(source.date, target.date);
      if (!targetDates.length) return;
      const overwrites = targetDates.filter((date) => hasCellDataForMode(period, item, date, mode));
      if (overwrites.length && !confirm(`ปลายทางมีข้อมูล ${fillModeLabel(mode)} อยู่ ${overwrites.length} วัน ต้องการเขียนทับหรือไม่?`)) return;
      const parts = fillModeParts(mode);
      const sourcePlan = itemPlanValue(item, source.date);
      const sourceActual = actualEntries(item, source.date).map((row) => ({ ...row }));
      const usage = activeMachineUsage();
      const sourceMachines = (usage?.[period.building]?.[source.date] || []).map((row) => ({ ...row }));
      const conflicts = [];
      let copied = 0;
      recordHistory(`ลากคัดลอก ${fillModeLabel(mode)}`);
      targetDates.forEach((date) => {
        const blocked = parts.actual && sourceActual.find((row) => workerAssignedInfo(row.workerId, date, { periodId: period.id, itemId: item.id, date }));
        if (blocked) {
          conflicts.push(date);
          return;
        }
        if (parts.plan) setPlan(item, date, sourcePlan);
        if (parts.actual) {
          const data = ensurePlanItemData(item);
          if (sourceActual.length) data.actual[date] = sourceActual.map((row) => ({ ...row }));
          else delete data.actual[date];
        }
        if (parts.machine) {
          usage[period.building] = usage[period.building] || {};
          if (sourceMachines.length) {
            usage[period.building][date] = sourceMachines.map((row) => ({ ...row, id: uid("mu") }));
          } else {
            delete usage[period.building][date];
          }
        }
        copied++;
      });
      saveState();
      renderPlanPreservingScroll();
      if (conflicts.length) showToast(`เติม ${fillModeLabel(mode)} ${copied} วัน, ข้าม ${conflicts.length} วันเพราะคนงานซ้ำ`);
      else showToast(`เติม ${fillModeLabel(mode)} ${copied} วันแล้ว`);
    }

    function handlePointerDown(event) {
      const handle = event.target.closest(".fill-handle");
      const button = event.target.closest('button[data-action="edit-cell"]');
      if (!button) return;
      if (!handle) {
        if (event.button !== undefined && event.button !== 0) return;
        const source = cellRefsFromButton(button, cellPartFromEvent(button, event));
        if (!source) return;
        selectDrag = {
          source,
          target: source,
          pointerId: event.pointerId,
          moved: false,
          additive: event.ctrlKey || event.metaKey,
          base: selectedCellRefs()
        };
        try { button.setPointerCapture(event.pointerId); } catch (error) {}
        return;
      }
      const source = cellRefsFromButton(button, cellPartFromElement(handle));
      if (!source) return;
      suppressCellClick = true;
      fillDrag = { source, target: source, pointerId: event.pointerId };
      selectPlanCell(source);
      highlightFillRange(source);
      try { handle.setPointerCapture(event.pointerId); } catch (error) {}
      event.preventDefault();
      event.stopPropagation();
    }

    function handlePointerMove(event) {
      if (!fillDrag && !selectDrag) return;
      const element = document.elementFromPoint(event.clientX, event.clientY);
      const button = element?.closest?.('button[data-action="edit-cell"]');
      const target = cellRefsFromButton(button, selectDrag?.source?.part || fillDrag?.source?.part || cellPartFromElement(element));
      if (selectDrag) {
        if (target && sameCellRow(target, selectDrag.source)) {
          selectDrag.target = target;
          selectDrag.moved = selectDrag.moved || !cellMatches(target, selectDrag.source);
          const range = rangeRefsBetween(selectDrag.source, target);
          const refs = selectDrag.additive ? mergeCellRefs(selectDrag.base, range) : range;
          setSelectedCells(refs, target, false);
        }
        event.preventDefault();
        return;
      }
      if (target && target.periodId === fillDrag.source.periodId && target.itemId === fillDrag.source.itemId) {
        fillDrag.target = target;
        highlightFillRange(fillDrag.source, target);
      }
      event.preventDefault();
    }

    function handlePointerUp(event) {
      if (selectDrag) {
        const { moved } = selectDrag;
        selectDrag = null;
        if (moved) {
          saveState();
          suppressCellClick = true;
          setTimeout(() => { suppressCellClick = false; }, 0);
          event.preventDefault();
        }
        return;
      }
      if (!fillDrag) return;
      const { source, target } = fillDrag;
      fillDrag = null;
      clearFillHighlight();
      if (target && target.date !== source.date) copyCellRange(source, target);
      setTimeout(() => { suppressCellClick = false; }, 0);
      event.preventDefault();
    }

    function handleDoubleClick(event) {
      const button = event.target.closest('button[data-action="edit-cell"]');
      if (!button || event.target.closest(".fill-handle")) return;
      const ref = cellRefsFromButton(button, cellPartFromEvent(button, event));
      if (!ref) return;
      selectPlanCell(ref);
      openCellEditor(ref.periodId, ref.itemId, ref.date);
    }

    function renderAll() {
      renderNav();
      renderActiveTab();
    }

    function updateSetting(key, value) {
      if (["dayHours", "controlPercent"].includes(key)) state.settings[key] = n(value);
      else state.settings[key] = value;
      saveState();
      renderAll();
    }

    function syncPeriodInputs(period) {
      if (!period) return;
      const valueInput = $(`input[data-period-field="periodValue"][data-period-id="${period.id}"]`);
      const percentInput = $(`input[data-period-field="periodPercent"][data-period-id="${period.id}"]`);
      if (valueInput) valueInput.value = Number(n(period.periodValue).toFixed(2));
      if (percentInput) percentInput.value = Number(n(period.periodPercent).toFixed(2));
    }

    function syncNewPeriodInputs(changedId) {
      const mainValue = n($("#newPeriodMainValue")?.value);
      const valueInput = $("#newPeriodValue");
      const percentInput = $("#newPeriodPercent");
      if (!mainValue || !valueInput || !percentInput) return;
      if (changedId === "newPeriodPercent") {
        valueInput.value = Number((mainValue * n(percentInput.value) / 100).toFixed(2));
      } else if (changedId === "newPeriodValue") {
        percentInput.value = Number((n(valueInput.value) / mainValue * 100).toFixed(2));
      } else if (changedId === "newPeriodMainValue") {
        if (percentInput.value) valueInput.value = Number((mainValue * n(percentInput.value) / 100).toFixed(2));
        else if (valueInput.value) percentInput.value = Number((n(valueInput.value) / mainValue * 100).toFixed(2));
      }
    }

    function syncNewMainValueFromExisting() {
      const building = $("#newPeriodBuilding")?.value;
      const mainNo = ($("#newPeriodMainNo")?.value.trim() || mainNoFromNo($("#newPeriodNo")?.value)).trim();
      const mainValueInput = $("#newPeriodMainValue");
      if (!building || !mainNo || !mainValueInput || mainValueInput.value) return;
      const existing = state.periods.find((period) => period.building === building && periodMainNo(period) === mainNo);
      if (existing?.mainValue) {
        mainValueInput.value = Number(n(existing.mainValue).toFixed(2));
        syncNewPeriodInputs("newPeriodMainValue");
      }
    }

    function updatePeriodField(target) {
      const period = getPeriod(target.dataset.periodId);
      if (!period) return false;
      const field = target.dataset.periodField;
      if (field === "mainNo") {
        period.mainNo = target.value.trim() || mainNoFromNo(period.no);
      } else if (field === "building") {
        period.building = target.value;
      } else if (field === "mainValue") {
        setPeriodMainValue(period, target.value);
        syncPeriodInputs(period);
      } else if (field === "periodValue") {
        setPeriodValue(period, target.value);
        syncPeriodInputs(period);
      } else if (field === "periodPercent") {
        setPeriodPercent(period, target.value);
        syncPeriodInputs(period);
      } else if (field === "no") {
        const previousMainFromNo = mainNoFromNo(period.no);
        period.no = target.value.trim();
        if (!period.mainNo || period.mainNo === previousMainFromNo) period.mainNo = mainNoFromNo(target.value);
        period.title = periodDisplayTitle(period);
      } else {
        period[field] = target.value;
      }
      saveState();
      renderNav();
      return true;
    }

    function openNewPeriodEditor(draft = {}) {
      document.activeElement?.blur?.();
      state.ui.editingPeriodId = "__new__";
      state.ui.newPeriodDraft = draft;
      saveState();
      renderPeriods();
      scrollPageTop();
    }

    function openPeriodEditor(id) {
      if (!getPeriod(id)) return;
      document.activeElement?.blur?.();
      state.ui.editingPeriodId = id;
      state.ui.newPeriodDraft = null;
      saveState();
      renderPeriods();
      scrollPageTop();
    }

    function closePeriodEditor() {
      document.activeElement?.blur?.();
      state.ui.editingPeriodId = "";
      state.ui.newPeriodDraft = null;
      saveState();
      renderPeriods();
      scrollPageTop();
    }

    function scrollPageTop() {
      const reset = () => {
        const rootBehavior = document.documentElement.style.scrollBehavior;
        const bodyBehavior = document.body.style.scrollBehavior;
        document.documentElement.style.scrollBehavior = "auto";
        document.body.style.scrollBehavior = "auto";
        document.documentElement.scrollTop = 0;
        document.body.scrollTop = 0;
        window.scrollTo({ top: 0, left: 0, behavior: "auto" });
        document.documentElement.style.scrollBehavior = rootBehavior;
        document.body.style.scrollBehavior = bodyBehavior;
      };
      reset();
      requestAnimationFrame(reset);
      setTimeout(reset, 40);
    }

    function splitPeriod(id) {
      const period = getPeriod(id);
      if (!period) return;
      const rows = fullMainGroup(period);
      const mainNo = periodMainNo(period);
      recordHistory("ซอยงวดงาน");
      if (rows.length === 1 && String(period.no) === mainNo) {
        period.no = `${mainNo}.1`;
        period.title = periodDisplayTitle(period);
        updatePeriodPercent(period);
      }
      const refreshedRows = fullMainGroup(period);
      const usedValue = refreshedRows.reduce((sum, row) => sum + n(row.periodValue), 0);
      const remaining = Math.max(0, n(period.mainValue) - usedValue);
      const draft = {
        building: period.building,
        mainNo,
        mainValue: n(period.mainValue),
        no: nextSubPeriodNo(period),
        periodValue: remaining || "",
        periodPercent: remaining && n(period.mainValue) ? Number((remaining / n(period.mainValue) * 100).toFixed(2)) : "",
        status: "รอทำ",
        description: ""
      };
      state.ui.editingPeriodId = "__new__";
      state.ui.newPeriodDraft = draft;
      saveState();
      renderPeriods();
      scrollPageTop();
      showToast("เปิดฟอร์มซอยงวดใหม่แล้ว");
    }

    function handleClick(event) {
      const button = event.target.closest("button");
      if (!button) {
        if (event.target.closest("input, select, textarea, label, a")) return;
        const row = event.target.closest("[data-period-row]");
        if (row) return openPeriodEditor(row.dataset.periodRow);
        return;
      }
      const tab = button.dataset.tab;
      if (tab) return setActiveTab(tab);
      if (button.dataset.planView) {
        state.ui.planView = button.dataset.planView;
        saveState();
        return renderPlan();
      }
      const action = button.dataset.action;
      if (!action) return;

      if (action === "open-report") return setActiveTab("report");
      if (action === "open-selected-cell") return openSelectedCell();
      if (action === "clear-selected-cells") return clearSelectedCells();
      if (action === "undo") return undo();
      if (action === "redo") return redo();
      if (action === "add-work-plan") return addWorkPlan();
      if (action === "complete-work-plan") return completeWorkPlan();
      if (action === "edit-cell") {
        if (suppressCellClick || event.target.closest(".fill-handle")) {
          suppressCellClick = false;
          return;
        }
        const ref = cellRefsFromButton(button, cellPartFromEvent(button, event));
        if (event.shiftKey && state.ui.selectedCell && sameCellRow(state.ui.selectedCell, ref)) {
          return setSelectedCells(rangeRefsBetween(state.ui.selectedCell, ref), ref);
        }
        if (event.ctrlKey || event.metaKey) return toggleSelectedCell(ref);
        return selectPlanCell(ref);
      }
      if (action === "quick-add-worker") return quickAddWorker();
      if (action === "quick-save-plan") return quickSetPlan();
      if (action === "quick-add-machine") return quickAddMachine();
      if (action === "quick-open-detail") return quickOpenDetail();
      if (action === "add-draft-worker") return addWorkerToDraft();
      if (action === "add-draft-machine") return addMachineToDraft();
      if (action === "remove-draft-worker") {
        cellDraft.assignments.splice(Number(button.dataset.index), 1);
        return renderCellDialog();
      }
      if (action === "remove-draft-machine") {
        cellDraft.machineRows.splice(Number(button.dataset.index), 1);
        return renderCellDialog();
      }
      if (action === "add-period") return addPeriod();
      if (action === "open-new-period") return openNewPeriodEditor();
      if (action === "open-period-editor") return openPeriodEditor(button.dataset.periodId);
      if (action === "close-period-editor") return closePeriodEditor();
      if (action === "split-period") return splitPeriod(button.dataset.periodId);
      if (action === "apply-period-filter") return renderPeriods();
      if (action === "add-item") return addItem();
      if (action === "enable-building-periods") return setBuildingPeriodsEnabled(button.dataset.building, true);
      if (action === "disable-building-periods") return setBuildingPeriodsEnabled(button.dataset.building, false);
      if (action === "delete-period") return deletePeriod(button.dataset.periodId);
      if (action === "delete-item") return deleteItem(button.dataset.periodId, button.dataset.itemId);
      if (action === "add-worker") return addWorker();
      if (action === "delete-worker") return deleteWorker(button.dataset.workerId);
      if (action === "import-workers") return importWorkers();
      if (action === "download-worker-template") return downloadWorkerTemplate();
      if (action === "add-machine") return addMachine();
      if (action === "delete-machine") return deleteMachine(button.dataset.machineId);
      if (action === "add-holiday") return addHoliday();
      if (action === "add-sundays") return addSundays();
      if (action === "delete-holiday") return deleteHoliday(button.dataset.holidayId);
      if (action === "download-json") return downloadJson();
      if (action === "copy-json") return copyJson();
      if (action === "import-json") return importJson();
      if (action === "reset-sample") return resetSample();
      if (action === "download-report") return downloadReport();
    }

    function handleInput(event) {
      const target = event.target;
      if (target.dataset.setting) {
        const key = target.dataset.setting;
        if (["dayHours", "controlPercent"].includes(key)) state.settings[key] = n(target.value);
        else state.settings[key] = target.value;
        saveState();
        renderNav();
        return;
      }
      if (target.dataset.manual) {
        const view = state.ui.manualView || "GI";
        const plan = activeWorkPlan();
        if (plan) plan.manual = cloneManual(plan.manual);
        const targetManual = plan?.manual?.[view] || state.manual[view];
        targetManual[target.dataset.manual] = ["contractLaborCost", "costToUpdate"].includes(target.dataset.manual) ? n(target.value) : target.value;
        saveState();
        return;
      }
      if (target.dataset.workPlanField) {
        const plan = activeWorkPlan();
        if (!plan) return;
        plan[target.dataset.workPlanField] = target.value;
        saveState();
        renderNav();
        return;
      }
      if (target.dataset.quickField) {
        const field = target.dataset.quickField;
        return updateQuickField(field, target.value, !["planned", "hours", "machineAmount"].includes(field));
      }
      if (target.dataset.periodFilter) {
        const key = target.dataset.periodFilter;
        if (key === "search") state.ui.periodSearch = target.value;
        if (key === "building") state.ui.periodBuilding = target.value;
        if (key === "status") state.ui.periodStatus = target.value;
        saveState();
        return;
      }
      if (["newPeriodMainValue", "newPeriodValue", "newPeriodPercent"].includes(target.id)) {
        return syncNewPeriodInputs(target.id);
      }
      if (target.id === "newPeriodNo") {
        const mainInput = $("#newPeriodMainNo");
        if (mainInput && !mainInput.value.trim()) mainInput.value = mainNoFromNo(target.value);
        syncNewMainValueFromExisting();
      }
      if (target.id === "newPeriodMainNo") {
        syncNewMainValueFromExisting();
      }
      if (target.dataset.periodField) {
        return updatePeriodField(target);
      }
      if (target.dataset.itemField) {
        const period = getPeriod(target.dataset.periodId);
        const item = getItem(period, target.dataset.itemId);
        if (item) {
          const key = target.dataset.itemField;
          item[key] = ["laborValue", "progressPct"].includes(key) ? n(target.value) : target.value;
          saveState();
        }
      }
      if (target.dataset.workerField) {
        const worker = getWorker(target.dataset.workerId);
        if (worker) {
          worker[target.dataset.workerField] = target.dataset.workerField === "dailyWage" ? n(target.value) : target.value;
          saveState();
        }
      }
      if (target.dataset.machineField) {
        const machine = getMachine(target.dataset.machineId);
        if (machine) {
          machine[target.dataset.machineField] = target.dataset.machineField === "dailyCost" ? n(target.value) : target.value;
          saveState();
        }
      }
      if (target.dataset.holidayField) {
        const holiday = state.holidays.find((row) => row.id === target.dataset.holidayId);
        if (holiday) {
          holiday[target.dataset.holidayField] = target.value;
          saveState();
        }
      }
      if (target.dataset.draftWorkerUnit) {
        const row = cellDraft.assignments[Number(target.dataset.draftWorkerUnit)];
        row.unit = target.value;
        if (row.unit === "full") row.hours = n(state.settings.dayHours);
        if (row.unit === "half") row.hours = n(state.settings.dayHours) / 2;
        return renderCellDialog();
      }
      if (target.dataset.draftWorkerHours) {
        const row = cellDraft.assignments[Number(target.dataset.draftWorkerHours)];
        row.hours = n(target.value);
        if (row.unit !== "hours") row.unit = "hours";
        return renderCellDialog();
      }
      if (target.dataset.draftMachineAmount) {
        const row = cellDraft.machineRows[Number(target.dataset.draftMachineAmount)];
        row.amount = n(target.value);
        return renderCellDialog();
      }
    }

    function handleChange(event) {
      const target = event.target;
      if (target.id === "mobileNav") return setActiveTab(target.value);
      if (target.id === "manualViewSelect") {
        state.ui.manualView = target.value;
        saveState();
        return renderDashboard();
      }
      if (target.dataset.workPlanSelect) {
        state.ui.activeWorkPlanId = target.value;
        state.ui.selectedCell = null;
        state.ui.selectedCells = [];
        saveState();
        return renderAll();
      }
      if (target.id === "reportViewSelect") {
        state.ui.reportView = target.value;
        saveState();
        return renderReport();
      }
      if (target.id === "fillModeSelect") {
        state.ui.fillMode = target.value;
        saveState();
        return;
      }

    function handleKeyDown(event) {
      const periodRow = event.target?.closest?.("[data-period-row]");
      if (periodRow && (event.key === "Enter" || event.key === " ")) {
        event.preventDefault();
        return openPeriodEditor(periodRow.dataset.periodRow);
      }
      if (activeTab !== "plan") return;
      if ($("#cellDialog")?.open) return;
      if (event.target?.closest?.("input, textarea, select, [contenteditable='true']")) return;
      const key = event.key.toLowerCase();
      const mod = event.ctrlKey || event.metaKey;
      if (mod && key === "z") {
        event.preventDefault();
        return undo();
      }
      if (mod && key === "y") {
        event.preventDefault();
        return redo();
      }
      if (mod && key === "c") {
        event.preventDefault();
        return copySelectedCells();
      }
      if (mod && key === "v") {
        event.preventDefault();
        return pasteCells();
      }
      if (event.key === "Delete") {
        if (!selectedCellRefs().length) return;
        event.preventDefault();
        return clearSelectedCells();
      }
    }

    function importWorkerRows(rows) {
      const normalized = normalizeWorkerRows(rows);
      if (!normalized.length) throw new Error("ไม่พบข้อมูลคนงานในไฟล์");
      const byCode = new Map();
      normalized.forEach((row) => byCode.set(row.code, row));
      let added = 0;
      let updated = 0;
      byCode.forEach((row) => {
        const existing = state.workers.find((worker) => String(worker.code).trim() === row.code);
        if (existing) {
          existing.name = row.name;
          existing.dailyWage = row.dailyWage;
          updated++;
        } else {
          state.workers.push({ id: uid("w"), code: row.code, name: row.name, dailyWage: row.dailyWage });
          added++;
        }
      });
      return { added, updated };
    }

    function normalizeWorkerRows(rows) {
      const cleanRows = rows
        .map((row) => row.map((cell) => String(cell ?? "").trim()))
        .filter((row) => row.some(Boolean));
      if (!cleanRows.length) return [];
      const aliases = {
        code: ["รหัส", "รหัสพนักงาน", "code", "employeeid", "employee code", "id"],
        name: ["ชื่อสกุล", "ชื่อ-สกุล", "ชื่อ", "name", "fullname", "full name"],
        wage: ["ค่าแรง", "ค่าแรงเต็มวัน", "dailywage", "daily wage", "wage", "rate"]
      };
      let headerIndex = -1;
      let indexes = { code: 0, name: 1, wage: 2 };
      cleanRows.some((row, index) => {
        const headers = row.map(normalizeHeader);
        const found = {};
        Object.entries(aliases).forEach(([key, words]) => {
          found[key] = headers.findIndex((header) => words.map(normalizeHeader).includes(header));
        });
        const score = Object.values(found).filter((value) => value >= 0).length;
        if (score >= 2) {
          headerIndex = index;
          indexes = {
            code: found.code >= 0 ? found.code : 0,
            name: found.name >= 0 ? found.name : 1,
            wage: found.wage >= 0 ? found.wage : 2
          };
          return true;
        }
        return false;
      });
      const start = headerIndex >= 0 ? headerIndex + 1 : 0;
      return cleanRows.slice(start).map((row) => ({
        code: String(row[indexes.code] || "").trim(),
        name: String(row[indexes.name] || "").trim(),
        dailyWage: parseMoneyValue(row[indexes.wage])
      })).filter((row) => row.code && row.name);
    }

    function normalizeHeader(value) {
      return String(value || "").toLowerCase().replace(/[\s._\-()]/g, "");
    }

    function parseMoneyValue(value) {
      const cleaned = String(value ?? "").replace(/,/g, "").replace(/[^\d.-]/g, "");
      return n(cleaned);
    }

    function parseDelimitedRows(text) {
      const sample = text.split(/\r?\n/).slice(0, 5).join("\n");
      const delimiter = ["\t", ",", ";"].sort((a, b) => sample.split(b).length - sample.split(a).length)[0];
      const rows = [];
      let row = [];
      let cell = "";
      let quoted = false;
      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        const next = text[i + 1];
        if (ch === '"' && quoted && next === '"') {
          cell += '"';
          i++;
        } else if (ch === '"') {
          quoted = !quoted;
        } else if (ch === delimiter && !quoted) {
          row.push(cell);
          cell = "";
        } else if ((ch === "\n" || ch === "\r") && !quoted) {
          if (ch === "\r" && next === "\n") i++;
          row.push(cell);
          rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += ch;
        }
      }
      row.push(cell);
      if (row.some((value) => String(value).trim())) rows.push(row);
      return rows;
    }

    async function readXlsxRows(buffer) {
      const entries = readZipEntries(buffer);
      const workbookXml = await zipText(entries, "xl/workbook.xml");
      const relsXml = await zipText(entries, "xl/_rels/workbook.xml.rels");
      const sheetPath = firstWorksheetPath(workbookXml, relsXml, entries);
      const [sharedXml, sheetXml] = await Promise.all([
        entries.has("xl/sharedStrings.xml") ? zipText(entries, "xl/sharedStrings.xml") : "",
        zipText(entries, sheetPath)
      ]);
      const sharedStrings = parseSharedStrings(sharedXml);
      return parseSheetRows(sheetXml, sharedStrings);
    }

    function readZipEntries(buffer) {
      const view = new DataView(buffer);
      const bytes = new Uint8Array(buffer);
      const decoder = new TextDecoder("utf-8");
      let eocd = -1;
      for (let i = bytes.length - 22; i >= Math.max(0, bytes.length - 66000); i--) {
        if (view.getUint32(i, true) === 0x06054b50) {
          eocd = i;
          break;
        }
      }
      if (eocd < 0) throw new Error("อ่านไฟล์ Excel ไม่ได้");
      const total = view.getUint16(eocd + 10, true);
      let offset = view.getUint32(eocd + 16, true);
      const entries = new Map();
      for (let i = 0; i < total; i++) {
        if (view.getUint32(offset, true) !== 0x02014b50) throw new Error("โครงไฟล์ Excel ไม่ถูกต้อง");
        const method = view.getUint16(offset + 10, true);
        const compressedSize = view.getUint32(offset + 20, true);
        const fileNameLength = view.getUint16(offset + 28, true);
        const extraLength = view.getUint16(offset + 30, true);
        const commentLength = view.getUint16(offset + 32, true);
        const localOffset = view.getUint32(offset + 42, true);
        const name = decoder.decode(bytes.slice(offset + 46, offset + 46 + fileNameLength)).replace(/\\/g, "/");
        const localNameLength = view.getUint16(localOffset + 26, true);
        const localExtraLength = view.getUint16(localOffset + 28, true);
        const dataStart = localOffset + 30 + localNameLength + localExtraLength;
        entries.set(name, { method, data: bytes.slice(dataStart, dataStart + compressedSize) });
        offset += 46 + fileNameLength + extraLength + commentLength;
      }
      return entries;
    }

    async function zipText(entries, path) {
      const entry = entries.get(path);
      if (!entry) throw new Error(`ไม่พบ ${path} ในไฟล์ Excel`);
      let data = entry.data;
      if (entry.method === 8) {
        if (!("DecompressionStream" in window)) throw new Error("เบราว์เซอร์นี้ยังอ่าน .xlsx ไม่ได้ ให้บันทึกเป็น CSV แล้วนำเข้าแทน");
        const stream = new Blob([entry.data]).stream().pipeThrough(new DecompressionStream("deflate-raw"));
        data = new Uint8Array(await new Response(stream).arrayBuffer());
      } else if (entry.method !== 0) {
        throw new Error("ไฟล์ Excel ใช้วิธีบีบอัดที่ยังไม่รองรับ");
      }
      return new TextDecoder("utf-8").decode(data);
    }

    function parseXml(xml) {
      const doc = new DOMParser().parseFromString(xml, "application/xml");
      if (doc.getElementsByTagName("parsererror").length) throw new Error("อ่าน XML ในไฟล์ Excel ไม่ได้");
      return doc;
    }

    function xmlChildren(node, localName) {
      return [...node.getElementsByTagName("*")].filter((el) => el.localName === localName);
    }

    function firstWorksheetPath(workbookXml, relsXml, entries) {
      const workbook = parseXml(workbookXml);
      const rels = parseXml(relsXml);
      const firstSheet = xmlChildren(workbook, "sheet")[0];
      const relId = firstSheet?.getAttribute("r:id");
      if (relId) {
        const rel = xmlChildren(rels, "Relationship").find((row) => row.getAttribute("Id") === relId);
        const target = rel?.getAttribute("Target") || "";
        const path = target.startsWith("/") ? target.slice(1) : `xl/${target}`;
        if (entries.has(path)) return path;
      }
      return [...entries.keys()].find((path) => /^xl\/worksheets\/sheet\d+\.xml$/.test(path)) || "xl/worksheets/sheet1.xml";
    }

    function parseSharedStrings(xml) {
      if (!xml) return [];
      const doc = parseXml(xml);
      return xmlChildren(doc, "si").map((si) => xmlChildren(si, "t").map((t) => t.textContent || "").join(""));
    }

    function parseSheetRows(xml, sharedStrings) {
      const doc = parseXml(xml);
      return xmlChildren(doc, "row").map((rowEl) => {
        const row = [];
        xmlChildren(rowEl, "c").forEach((cell, fallbackIndex) => {
          const ref = cell.getAttribute("r") || "";
          const index = columnIndex(ref) ?? fallbackIndex;
          const type = cell.getAttribute("t");
          const v = xmlChildren(cell, "v")[0]?.textContent || "";
          const inline = xmlChildren(cell, "t").map((t) => t.textContent || "").join("");
          row[index] = type === "s" ? (sharedStrings[Number(v)] || "") : type === "inlineStr" ? inline : v;
        });
        return row.map((value) => value ?? "");
      });
    }

    function columnIndex(ref) {
      const letters = String(ref).match(/[A-Z]+/i)?.[0];
      if (!letters) return null;
      return [...letters.toUpperCase()].reduce((sum, ch) => sum * 26 + ch.charCodeAt(0) - 64, 0) - 1;
    }

    function drawReport(canvas, view, scale = 1) {
      if (!canvas) return;
      const dates = getDates();
      const dateW = 42 * scale;
      const pad = 16 * scale;
      const rowH = 22 * scale;
      const topH = 150 * scale;
      const seqW = 56 * scale;
      const itemW = 190 * scale;
      const laborValueW = 118 * scale;
      const dataLabelW = 112 * scale;
      const progressW = 68 * scale;
      const noteW = 76 * scale;
      const leftW = seqW + itemW + laborValueW + dataLabelW + progressW + noteW;
      const reportPeriods = periodsForView(view);
      const itemRows = reportPeriods.reduce((sum, period) => sum + 1 + period.items.length * 3, 0);
      const totalRows = reportPeriods.length ? 5 : 0;
      const summaryRows = 6;
      const width = leftW + dates.length * dateW + pad * 2;
      const height = topH + (itemRows + totalRows + summaryRows + 4) * rowH + pad * 2;
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.fillStyle = "white";
      ctx.fillRect(0, 0, width, height);
      ctx.lineWidth = 1 * scale;
      ctx.strokeStyle = "#4b4b4b";
      ctx.font = `${14 * scale}px Tahoma, sans-serif`;
      ctx.textBaseline = "middle";

      const x0 = pad;
      let y = pad;
      const tableW = leftW + dates.length * dateW;
      ctx.strokeRect(x0, y, tableW, topH - rowH * 2);
      ctx.font = `bold ${18 * scale}px Tahoma, sans-serif`;
      ctx.textAlign = "center";
      const titleView = view === "GI" ? "อาคาร G+I" : `อาคาร ${view}`;
      ctx.fillStyle = "#111";
      ctx.fillText(`แผนงานประจำงวดโครงการ ${state.settings.projectName} ${titleView}`, x0 + tableW / 2, y + 22 * scale);
      ctx.font = `${12 * scale}px Tahoma, sans-serif`;
      ctx.textAlign = "left";
      const detailY = y + 54 * scale;
      const groups = buildingsForView(view);
      groups.forEach((building, index) => {
        const gx = x0 + index * (tableW / Math.max(1, groups.length));
        ctx.fillText(`อาคาร ${building}`, gx + 6 * scale, detailY);
        const desc = periodsForBuilding(building).map((p) => `งวด ${p.no} ${p.description}`).slice(0, 3);
        desc.forEach((line, i) => fitText(ctx, line, gx + 18 * scale, detailY + (18 + i * 16) * scale, tableW / groups.length - 24 * scale));
      });
      y += topH - rowH * 2;

      drawCell(ctx, x0, y, seqW, rowH * 2, "ลำดับ", true);
      drawCell(ctx, x0 + seqW, y, itemW, rowH * 2, "รายการ", true);
      drawCell(ctx, x0 + seqW + itemW, y, laborValueW, rowH * 2, "มูลค่าค่าแรง", true);
      drawCell(ctx, x0 + seqW + itemW + laborValueW, y, dataLabelW, rowH * 2, "บรรทัดข้อมูล", true);
      drawCell(ctx, x0 + seqW + itemW + laborValueW + dataLabelW, y, progressW, rowH * 2, "ก้าวหน้า", true);
      drawCell(ctx, x0 + seqW + itemW + laborValueW + dataLabelW + progressW, y, noteW, rowH * 2, "หมายเหตุ", true);
      let monthX = x0 + leftW;
      monthGroups(dates).forEach((group) => {
        const w = group.count * dateW;
        drawCell(ctx, monthX, y, w, rowH, group.label, true, "#f3f5f3");
        monthX += w;
      });
      y += rowH;
      dates.forEach((date, index) => {
        const x = x0 + leftW + index * dateW;
        drawCell(ctx, x, y, dateW, rowH, dayNumber(date), true, isHoliday(date) ? "#c9c9c9" : "#f3f5f3");
      });
      y += rowH;

      for (const building of buildingsForView(view)) {
        drawCell(ctx, x0, y, tableW, rowH, `อาคาร ${building}`, false, "#ffffff", "#d71920", "left", true);
        y += rowH;
        const periods = periodsForBuilding(building);
        periods.forEach((period) => {
          period.items.forEach((item, itemIndex) => {
            const seq = itemIndex === 0 ? period.no : "";
            const leftRows = [
              ["แรงคนงาน(แผน)", (date) => itemPlanValue(item, date) || ""],
              ["แรงคนงาน(จริง)", (date) => itemActualUnits(item, date) || ""],
              ["มูลค่าค่าแรง", (date) => itemLaborCost(item, date) || ""]
            ];
            leftRows.forEach(([label, getter], subIndex) => {
              const fill = "#ffffff";
              drawCell(ctx, x0, y, seqW, rowH, subIndex === 0 ? seq : "", false, fill);
              drawCell(ctx, x0 + seqW, y, itemW, rowH, subIndex === 0 ? item.name : "", false, fill, "#111", "left");
              drawCell(ctx, x0 + seqW + itemW, y, laborValueW, rowH, subIndex === 0 ? money(item.laborValue, 0) : "", false, fill, "#111", "right");
              drawCell(ctx, x0 + seqW + itemW + laborValueW, y, dataLabelW, rowH, label, false, fill);
              drawCell(ctx, x0 + seqW + itemW + laborValueW + dataLabelW, y, progressW, rowH, subIndex === 0 ? `${money(item.progressPct, 0)}%` : "", false, fill);
              drawCell(ctx, x0 + seqW + itemW + laborValueW + dataLabelW + progressW, y, noteW, rowH, "", false, fill);
              dates.forEach((date, index) => {
                const value = getter(date);
                const x = x0 + leftW + index * dateW;
                const hasValue = Number(value) > 0;
                const planValue = subIndex === 0 && hasValue;
                const actualValue = subIndex === 1 && hasValue;
                let bg = isHoliday(date) ? "#c9c9c9" : "#ffffff";
                let color = "#111";
                if (planValue) {
                  bg = "#cfe8ff";
                  color = "#0f3f66";
                }
                if (actualValue) {
                  bg = "#ff2b1f";
                  color = "#fff";
                }
                drawCell(ctx, x, y, dateW, rowH, value ? (subIndex === 2 ? money(value, 0) : qty(value)) : "", false, bg, color);
              });
              y += rowH;
            });
          });
        });
      }

      const totals = [
        ["จำนวนแรงที่ใช้ตามแผน", (date) => totalPlanned(view, date), "plan"],
        ["จำนวนแรงที่ใช้จริง", (date) => totalActualUnits(view, date), "actual"],
        ["ค่าแรงที่ใช้ต่อวัน", (date) => totalLaborCost(view, date), 0],
        ["ค่าเครื่องจักรที่ใช้ต่อวัน", (date) => totalMachineCost(view, date), 0],
        ["รวมค่าใช้จ่ายต่อวัน", (date) => totalSpend(view, date), 0]
      ];
      if (reportPeriods.length) {
        totals.forEach(([label, getter, digits]) => {
          drawCell(ctx, x0, y, leftW, rowH, label, false, "#ffffff", "#111", "right", true);
          dates.forEach((date, index) => {
            const value = getter(date);
            const bg = isHoliday(date) ? "#c9c9c9" : "#ffffff";
            const text = digits === "plan" || digits === "actual" ? (value ? qty(value) : "0") : money(value, digits);
            drawCell(ctx, x0 + leftW + index * dateW, y, dateW, rowH, text, false, bg, "#111");
          });
          y += rowH;
        });
      }

      y += rowH;
      const s = summaryFor(view);
      const summaryW = 580 * scale;
      const valueW = 160 * scale;
      const sx = x0;
      const colors = ["#d9e6f7", "#ff9f9f", "#fff0a8", "#b790dc", "#ff9f9f", "#c8e0b8"];
      const summary = [
        ["มูลค่าค่าแรง", money(s.laborValue, 0)],
        [`ค่าแรงควบคุมที่ ${money(state.settings.controlPercent, 0)}%`, money(s.control, 0)],
        ["ค่าแรงสะสม ณ.ปัจจุบัน (A)", money(s.laborActual, 0)],
        ["ค่าเครื่องจักรสะสม ณ.ปัจจุบัน (B)", money(s.machineActual, 0)],
        ["(A) + (B)", money(s.total, 0)],
        ["สรุปค่าแรง ณ.ปัจจุบัน", pct(s.currentRatio)]
      ];
      summary.forEach((row, i) => {
        drawCell(ctx, sx, y, summaryW, rowH, row[0], false, colors[i], "#111", "right", true);
        drawCell(ctx, sx + summaryW, y, valueW, rowH, row[1], false, colors[i], "#111", "right", true);
        y += rowH;
      });

      const rx = sx + summaryW + valueW + 120 * scale;
      y -= summary.length * rowH;
      const manualRows = [
        ["ค่าแรงต้นทุนสะสมถึงงวดปัจจุบัน", money(s.manual.contractLaborCost, 0), "#d9e6f7"],
        ["ค่าแรง+ค่าเครื่องจักรสะสมถึงวัน update", money(s.manual.costToUpdate, 0), "#fff0a8"],
        ["สรุปค่าแรงทั้งโครงการ(ถ้าอนุมัติ ณ วันupdate)", pct(s.manualRatio), "#ff9f9f"],
        ["วันที่ Update", dateLabel(planUpdateDate()), "#e8e8e8"],
        ["หมายเหตุ", s.manual.note || "", "#c8e0b8"]
      ];
      manualRows.forEach((row) => {
        drawCell(ctx, rx, y, 360 * scale, rowH, row[0], false, row[2], "#111", "left", true);
        drawCell(ctx, rx + 360 * scale, y, 170 * scale, rowH, row[1], false, row[2], "#111", "right", true);
        y += rowH;
      });
    }

    function drawCell(ctx, x, y, w, h, text, header = false, fill = "#ffffff", color = "#111111", align = "center", bold = false) {
      ctx.fillStyle = fill;
      ctx.fillRect(x, y, w, h);
      ctx.strokeStyle = "#5c5c5c";
      ctx.strokeRect(x, y, w, h);
      ctx.fillStyle = color;
      ctx.font = `${bold || header ? "bold " : ""}${Math.max(9, h * 0.48)}px Tahoma, sans-serif`;
      ctx.textAlign = align;
      const tx = align === "left" ? x + 4 : align === "right" ? x + w - 4 : x + w / 2;
      fitText(ctx, text, tx, y + h / 2, w - 8, align);
    }

    function fitText(ctx, text, x, y, maxWidth, align = "left") {
      const value = String(text ?? "");
      if (!value) return;
      const originalFont = ctx.font;
      const sizeMatch = originalFont.match(/(\d+(?:\.\d+)?)px/);
      const originalSize = sizeMatch ? Number(sizeMatch[1]) : 10;
      let fontSize = originalSize;
      while (ctx.measureText(value).width > maxWidth && fontSize > 6) {
        fontSize -= 0.5;
        ctx.font = originalFont.replace(/(\d+(?:\.\d+)?)px/, `${fontSize}px`);
      }
      ctx.fillText(value, x, y, maxWidth);
      ctx.font = originalFont;
    }

    document.addEventListener("click", handleClick);
    document.addEventListener("input", handleInput);
    document.addEventListener("change", handleChange);
    document.addEventListener("pointerdown", handlePointerDown);
    document.addEventListener("pointermove", handlePointerMove);
    document.addEventListener("pointerup", handlePointerUp);
    document.addEventListener("pointercancel", handlePointerUp);
    document.addEventListener("dblclick", handleDoubleClick);
    document.addEventListener("keydown", handleKeyDown);
    $("#saveCellBtn").addEventListener("click", saveCellDraft);
    $("#clearCellBtn").addEventListener("click", clearCellDraft);

    renderAll();
  </script>
</body>
</html>
